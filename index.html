<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>員工專區</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root{
    --bg-1:#222831; --bg-2:#282E38; --panel:#393E46; --panel-2:#454B55;
    --line:#4F5761; --gold:#00ADB5; --green:#4f9b6f; --red:#c05a4f; --blue:#5b8db8;
    --text:#EEEEEE; --muted:#9CA3AC;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% -10%, var(--bg-2), var(--bg-1) 60%);
    color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; min-height:100dvh;
  }
  .material-icons{vertical-align:middle; line-height:1;}
  .app{ max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; padding-bottom:76px; }

  /* 頂欄 */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 10px 18px;
  }
  .topbar .store{ font-size:15px; font-weight:700; letter-spacing:2px; color:var(--gold); }
  .topbar .right{ display:flex; gap:6px; }
  .icon-btn{
    background:transparent; border:none; color:var(--muted); cursor:pointer; padding:6px;
    border-radius:50%; display:flex; align-items:center; position:relative;
  }
  .icon-btn:active{ background:#ffffff14; }
  .icon-btn .reddot{
    position:absolute; top:4px; right:4px; min-width:16px; height:16px; border-radius:9px;
    background:var(--red); color:#fff; font-size:10px; font-weight:700;
    display:flex; align-items:center; justify-content:center; padding:0 4px;
  }

  .page{ flex:1; padding:6px 16px 24px 16px; }
  .punch-hero{ margin:0 -16px -24px -16px; border-radius:16px 16px 0 0; }
  @media (min-width:900px){ .punch-hero{ margin:0 -32px -32px -32px; } }
  .page h2{ font-size:16px; font-weight:700; margin:14px 2px 10px 2px; display:flex; align-items:center; gap:7px; }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:16px; margin-bottom:12px;
  }
  .hint{ font-size:11.5px; color:var(--muted); }
  .pl-row{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:6px 0; font-size:14px; }
  .pl-row .lbl{ color:var(--muted); display:flex; align-items:center; gap:2px; }
  .pl-row .val{ color:var(--text); font-weight:500; font-variant-numeric:tabular-nums; }
  .pl-row.total{ font-size:15px; }
  .pl-row.total .lbl, .pl-row.total .val{ color:var(--text); font-weight:700; }
  .pl-sub{ display:flex; justify-content:space-between; padding:4px 0 4px 6px; font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .pl-note{ font-size:11px; color:var(--muted); margin:0 0 4px 6px; }
  .row-between{ display:flex; align-items:center; justify-content:space-between; gap:10px; }

  /* 首頁 */
  .profile{ display:flex; align-items:center; gap:14px; padding:8px 4px 16px 4px; }
  .avatar{
    width:100px; height:100px; border-radius:50%; background:var(--gold); color:#1c1305;
    display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:800; flex-shrink:0;
  }
  .profile .name{ font-size:24px; font-weight:500; letter-spacing:2px; }
  .profile .dept{ font-size:14px; font-weight:400; letter-spacing:0.5px; color:var(--muted); margin-top:2px; }
  .shift-card{ display:flex; align-items:center; gap:10px; }
  .shift-card .material-icons{ color:var(--gold); }
  .status-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:10px; }
  .status-cell{ background:var(--panel-2); border-radius:10px; padding:8px 4px; text-align:center; }
  .status-cell .lbl{ font-size:10.5px; color:var(--muted); }
  .status-cell .val{ font-family:'Roboto Mono',monospace; font-size:14px; font-weight:700; margin-top:2px; }
  .pending-card{ border-color:var(--gold); cursor:pointer; }
  .pending-card .material-icons{ color:var(--gold); }

  /* 打卡 */
  .clock-big{ text-align:center; margin:8px 0 16px 0; }
  .clock-big .time{ font-family:'Roboto Mono',monospace; font-size:52px; font-weight:700; letter-spacing:2px; }
  .clock-big .date{ font-size:13px; color:var(--muted); margin-top:2px; }
  .big-btn{
    width:100%; padding:19px 0; border-radius:14px; border:none; cursor:pointer;
    font-size:19px; font-weight:700; font-family:'Noto Sans TC',sans-serif; letter-spacing:3px;
    display:flex; align-items:center; justify-content:center; gap:10px; transition:transform .1s;
    margin-bottom:10px;
  }
  .big-btn:active{ transform:scale(0.97); }
  .big-btn.in{ background:var(--green); color:#082018; }
  .big-btn.out{ background:var(--gold); color:#1c1305; }
  .big-btn.done{ background:var(--line); color:var(--muted); cursor:default; }
  .sub-btn-row{ display:flex; gap:10px; }
  .sub-btn{
    flex:1; padding:13px 0; border-radius:11px; border:1px solid var(--line); background:var(--panel);
    color:var(--text); font-size:14.5px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
  }
  .sub-btn:active{ transform:scale(0.97); }
  .sub-btn:disabled{ opacity:.4; }
  .sub-btn .material-icons{ font-size:18px; color:var(--blue); }

  /* 表單 */
  .form-actions{ display:flex; gap:10px; margin-bottom:14px; }
  .form-actions button{
    flex:1; padding:14px 0; border-radius:12px; border:none; cursor:pointer;
    font-size:14px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:5px;
  }
  .form-actions .leave{ background:var(--green); color:#082018; }
  .form-actions .comp{ background:var(--gold); color:#1c1305; }
  .req-item{ padding:13px 14px; }
  .req-item .title-row{ display:flex; align-items:center; justify-content:space-between; }
  .req-item .type{ font-size:14.5px; font-weight:700; }
  .req-item .meta{ font-size:12px; color:var(--muted); margin-top:4px; line-height:1.6; }
  .status-badge{
    font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px;
  }
  .status-badge.pending{ background:#d9a44126; color:var(--gold); }
  .status-badge.ok{ background:#4f9b6f26; color:var(--green); }
  .status-badge.no{ background:#c05a4f26; color:#e79288; }
  .status-badge.cancel{ background:#ffffff12; color:var(--muted); }
  .req-actions{ display:flex; gap:8px; margin-top:10px; }
  .req-actions button{
    flex:1; padding:9px 0; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .btn-approve{ background:var(--green); border:none; color:#082018; }
  .btn-reject{ background:transparent; border:1px solid var(--red); color:#e79288; }
  .btn-cancel-req{ background:transparent; border:1px solid var(--line); color:var(--muted); }
  .balance-row{ display:flex; gap:10px; margin-bottom:12px; }
  .balance-cell{ flex:1; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center; }
  .balance-cell .num{ font-family:'Roboto Mono',monospace; font-size:21px; font-weight:700; color:var(--gold); }
  .balance-cell .lbl{ font-size:11px; color:var(--muted); margin-top:2px; }

  /* 即將推出 */
  .coming{ text-align:center; padding:70px 20px; color:var(--muted); }
  .coming .material-icons{ font-size:44px; color:var(--line); margin-bottom:10px; }

  /* 底部分頁列 */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:#222831f2; border-top:1px solid var(--line); backdrop-filter:blur(8px);
  }
  .tabbar-inner{ max-width:480px; margin:0 auto; display:flex; }
  .tab{
    flex:1; padding:9px 0 max(9px, env(safe-area-inset-bottom)) 0; text-align:center; cursor:pointer; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; gap:2px; font-size:10.5px; position:relative;
  }
  .tab .material-icons{ font-size:22px; }
  .tab.active{ color:var(--gold); font-weight:700; }
  .tab .reddot{
    position:absolute; top:5px; left:calc(50% + 8px); min-width:15px; height:15px; border-radius:8px;
    background:var(--red); color:#fff; font-size:9.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center; padding:0 4px;
  }

  /* 登入 */
  .login-wrap{ padding:10vh 24px 0 24px; max-width:400px; margin:0 auto; }
  .login-card{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:32px 26px; text-align:center; }
  .login-card .mark-icon{
    width:52px; height:52px; border-radius:14px; background:var(--gold); color:#1c1305;
    display:flex; align-items:center; justify-content:center; margin:0 auto 14px auto;
  }
  .login-card h2{ font-size:18px; font-weight:700; margin:0 0 4px 0; }
  .login-card .sub{ font-size:12px; color:var(--muted); margin-bottom:22px; }

  .field{ text-align:left; margin-bottom:13px; width:100%; max-width:100%; box-sizing:border-box; }
  label{ font-size:12px; color:var(--muted); display:block; margin-bottom:5px; }
  input,select,textarea{
    width:100%; padding:12px 13px; border-radius:9px; border:1px solid var(--line);
    background:#1B2027; color:var(--text); font-size:14px; font-family:'Noto Sans TC',sans-serif;
  }
  select{ appearance:none; }
  input[type=date],input[type=time],input[type=datetime-local],input[type=month]{
    padding-left:12px; padding-right:12px; color-scheme:dark; min-width:0; max-width:100%; width:100%;
    font-size:13px; box-sizing:border-box;
  }
  input[type=range]{
    width:auto; padding:0; border:none; background:transparent; height:20px;
  }
  input[type=date]::-webkit-calendar-picker-indicator,
  input[type=time]::-webkit-calendar-picker-indicator,
  input[type=datetime-local]::-webkit-calendar-picker-indicator,
  input[type=month]::-webkit-calendar-picker-indicator{
    margin-left:4px; padding:4px; filter:invert(0.75);
  }
  .primary-btn{
    width:100%; padding:13px 0; border-radius:9px; border:none; background:var(--gold); color:#1c1305;
    font-size:15px; font-weight:700; cursor:pointer; margin-top:4px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .ghost-btn{
    width:100%; padding:12px 0; border-radius:9px; border:1px solid var(--line); background:transparent;
    color:var(--muted); font-size:14px; cursor:pointer;
  }
  .err-text{ color:#f3c9c2; font-size:12.5px; margin-top:10px; min-height:16px; }

  /* Modal */
  .modal-bg{
    position:fixed; inset:0; height:100vh; height:100dvh; background:rgba(6,10,8,0.72); backdrop-filter:blur(2px);
    display:flex; align-items:flex-end; justify-content:center; z-index:60; overflow:hidden;
  }
  @media(min-width:520px){ .modal-bg{ align-items:center; padding:20px; } }
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:18px 18px 0 0;
    padding:20px 22px calc(20px + env(safe-area-inset-bottom)) 22px;
    width:100%; max-width:480px;
    max-height:85vh; max-height:85dvh; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
    box-sizing:border-box;
  }
  @media(min-width:520px){ .modal{ border-radius:18px; } }
  .modal h3{ font-size:16.5px; font-weight:700; margin:0 0 16px 0; display:flex; align-items:center; gap:8px; }
  .modal h3 .material-icons{ color:var(--gold); }
  .modal-actions{ display:flex; gap:10px; margin-top:16px; }
  .modal-actions button{ flex:1; padding:13px 0; border-radius:9px; font-size:14.5px; font-weight:700; cursor:pointer; border:none; }
  .modal-actions .go{ background:var(--gold); color:#1c1305; }
  .modal-actions .stay{ background:transparent; color:var(--muted); border:1px solid var(--line); }
  .grid-2m{ display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }

  .punch-confirm{ text-align:center; }
  .punch-confirm .action-label{ font-size:24px; font-weight:700; letter-spacing:2px; margin:10px 0; }
  .punch-confirm .action-label.in{ color:var(--green); }
  .punch-confirm .action-label.out{ color:var(--gold); }
  .punch-confirm .action-label.mid{ color:var(--blue); }
  .punch-confirm .time{ font-family:'Roboto Mono',monospace; font-size:32px; font-weight:700; margin-bottom:8px; }
  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:#282E38f0; border:1px solid var(--line); padding:12px 20px; border-radius:10px;
    font-size:13.5px; z-index:90; max-width:88vw; text-align:center; white-space:pre-line; line-height:1.6;
  }
  .toast.ok{ border-color:var(--green); }
  .toast.err{ border-color:var(--red); color:#f3c9c2; }
  .config-warn{
    background:#3a2317; border:1px solid #6b4326; color:#f0caa0; padding:14px 18px; border-radius:10px;
    max-width:560px; font-size:13px; margin:20px;
  }
  .config-warn code{ background:#00000040; padding:1px 5px; border-radius:3px; }

  /* ===== 桌機版（寬螢幕）：維持單一卡片樣式，整體放大 ===== */
  @media (min-width: 900px){
    body{ display:block; padding:40px 20px; }

    /* 登入畫面：直接置中在整個畫面，不包外層卡片 */
    .app:not(:has(.tabbar)){
      width:auto; max-width:none; height:auto; min-height:100vh; min-height:100dvh;
      background:transparent; border:none; box-shadow:none; margin:0; overflow:visible;
      display:flex; align-items:center; justify-content:center;
    }
    .app:not(:has(.tabbar)) .topbar{ position:fixed; top:0; left:0; padding:20px 28px; }
    .login-wrap{
      padding:20px 40px; margin:0; min-height:0; width:auto;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    .login-card{ width:360px; box-shadow:0 20px 50px rgba(0,0,0,.35); }

    /* 登入後：固定大小的卡片外殼 */
    .app:has(.tabbar){
      width:640px; max-width:640px; margin:0 auto; height:830px; min-height:0;
      background:var(--panel); border:1px solid var(--line); border-radius:22px;
      box-shadow:0 24px 60px rgba(0,0,0,.35); overflow:hidden; padding-bottom:0;
    }
    .topbar{ padding:22px 32px 14px 32px; flex-shrink:0; }
    .topbar .store{ font-size:17px; }
    .page{ padding:10px 32px 32px 32px; flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .tabbar{ position:static; border-radius:0 0 22px 22px; flex-shrink:0; }
    .tabbar-inner{ max-width:none; }
    .tab{ padding:14px 0 calc(14px + env(safe-area-inset-bottom)) 0; font-size:12px; }
    .tab .material-icons{ font-size:24px; }

    .clock-big .time{ font-size:60px; }
    .status-grid{ grid-template-columns:repeat(4,1fr); }
    .balance-row{ margin-left:0; margin-right:0; }
    .profile{ padding-top:14px; }
    .big-btn{ font-size:21px; padding:22px 0; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-status" style="padding:60px 20px;text-align:center;color:#93a598;font-family:sans-serif;font-size:13px;">頁面載入中，請稍候...</div>
<div id="boot-error" style="display:none; position:fixed; left:12px; right:12px; bottom:12px; max-width:640px; margin:0 auto; background:#3a1717; color:#fbd7d0; border:1px solid #7a3b34; padding:14px 18px; border-radius:8px; font-size:12px; font-family:monospace; white-space:pre-wrap; z-index:9999;"></div>

<script type="text/plain" id="app-src">
const {useState, useEffect, useMemo, useRef} = React;

/* ⚠️ 部署 Code.gs 為網頁應用程式後，把網址貼在這裡 */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzW7073VQtPGa9cIn-pBNdfLClDdkEn8eBGVzDSkv26ZZWiHGcD5wikhx7KL5l4mlsC/exec';

/* ⚠️ 打卡地圖功能需要 Google Maps API 金鑰，請填入你申請到的金鑰（申請步驟見下方 GOOGLE_MAPS_SETUP_NOTE） */
const GOOGLE_MAPS_API_KEY = 'AIzaSyCTj0NrEzqJPLXWG8ct7FQfJ1Q0CeAcKoA';
let mapsLoadPromise = null;
function loadGoogleMaps(){
  if(mapsLoadPromise) return mapsLoadPromise;
  mapsLoadPromise = new Promise((resolve, reject)=>{
    if(window.google && window.google.maps){ resolve(); return; }
    if(!GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY.indexOf('請填入') !== -1){ reject(new Error('尚未設定 Google Maps API 金鑰')); return; }
    window.__initGoogleMaps = ()=>resolve();
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=__initGoogleMaps`;
    s.onerror = ()=>reject(new Error('Google Maps 載入失敗，請確認金鑰是否正確'));
    document.head.appendChild(s);
  });
  return mapsLoadPromise;
}
const TOKEN_KEY = 'employee_session_token';
const SESSION_CACHE_KEY = 'employee_session_info';

let CURRENT_TOKEN = null;
try{ CURRENT_TOKEN = localStorage.getItem(TOKEN_KEY) || null; }catch(e){}
function setToken(t){
  CURRENT_TOKEN = t;
  try{ if(t) localStorage.setItem(TOKEN_KEY, t); else { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(SESSION_CACHE_KEY); } }catch(e){}
}
function isSessionError(msg){
  return typeof msg === 'string' && (msg.indexOf('登入已逾時') !== -1 || msg.indexOf('請先登入') !== -1);
}
function forceReLogin(){
  setToken(null);
  try{ location.reload(); }catch(e){}
}

async function apiGet(action, params={}){
  const qs = new URLSearchParams({action, token: CURRENT_TOKEN||'', ...params}).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  const json = await res.json();
  if(json.status !== 'success'){
    if(isSessionError(json.message)) forceReLogin();
    throw new Error(json.message || '發生錯誤');
  }
  return json.data;
}
async function apiPost(action, body={}){
  const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action, token: CURRENT_TOKEN, ...body})});
  const json = await res.json();
  if(json.status !== 'success'){
    if(isSessionError(json.message)) forceReLogin();
    throw new Error(json.message || '發生錯誤');
  }
  return json.data;
}
// 壓縮手機拍照/選圖的檔案，避免上傳失敗或太慢；回傳 {base64, mimeType}
function compressImageFile(file, maxDim=800, quality=0.75){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('讀取圖片失敗'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('圖片格式無法讀取'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg' });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function getLocation(){
  return new Promise((resolve) => {
    if(!navigator.geolocation){ resolve({lat:null,lng:null,error:'此裝置不支援定位'}); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat:pos.coords.latitude, lng:pos.coords.longitude, error:null}),
      err => resolve({lat:null, lng:null, error:'無法取得定位（' + err.message + '）'}),
      {enableHighAccuracy:true, timeout:8000, maximumAge:0}
    );
  });
}
function useClock(){
  const [now, setNow] = useState(new Date());
  useEffect(()=>{ const t = setInterval(()=>setNow(new Date()), 1000); return ()=>clearInterval(t); }, []);
  return now;
}
function pad(v){ return String(v).padStart(2,'0'); }
function stripHtml(html){
  if(!html) return '';
  const div = document.createElement('div');
  div.innerHTML = html;
  return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
}
function announcePreview(html, len){
  const text = stripHtml(html);
  return text.length > (len||40) ? text.slice(0, len||40) + '…' : text;
}
function announceDateShort(createdAt){
  if(!createdAt) return '';
  const datePart = createdAt.slice(0,10); // yyyy-MM-dd
  const now = new Date();
  const todayPart = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  if(datePart === todayPart) return '今天';
  if(datePart.slice(0,4) === String(now.getFullYear())) return datePart.slice(5).replace('-','/'); // MM/dd
  return datePart;
}
function hhmm(dt){
  if(!dt) return '—';
  const timePart = String(dt).split(' ')[1] || String(dt).split('T')[1];
  if(!timePart) return '—';
  const m = timePart.match(/^(\d{1,2}):(\d{2})/);
  if(!m) return '—';
  return m[1].padStart(2,'0') + ':' + m[2];
}
function formatDateTimeReadable(dtLocalValue){

function CustomDateTimePicker({value, onConfirm, onClose, dateOnly}){
  const initial = value ? new Date(dateOnly ? value+'T00:00' : value) : new Date();
  const [viewY, setViewY] = useState(initial.getFullYear());
  const [viewM, setViewM] = useState(initial.getMonth()); // 0-11
  const [selDate, setSelDate] = useState(`${initial.getFullYear()}-${String(initial.getMonth()+1).padStart(2,'0')}-${String(initial.getDate()).padStart(2,'0')}`);
  const [selHour, setSelHour] = useState(initial.getHours());
  const [selMin, setSelMin] = useState(Math.round(initial.getMinutes()/5)*5 % 60);
  const hourRef = useRef(null);
  const minRef = useRef(null);
  const ROW_H = 40;

  useEffect(()=>{
    // 開啟時捲動到目前選取的時間位置
    setTimeout(()=>{
      if(hourRef.current) hourRef.current.scrollTop = selHour * ROW_H;
      if(minRef.current) minRef.current.scrollTop = (selMin/5) * ROW_H;
    }, 0);
  }, []);

  function shiftMonth(delta){
    let y = viewY, m = viewM + delta;
    if(m < 0){ m = 11; y -= 1; } else if(m > 11){ m = 0; y += 1; }
    setViewY(y); setViewM(m);
  }
  const firstDowSun = new Date(viewY, viewM, 1).getDay();
  const daysInMonth = new Date(viewY, viewM+1, 0).getDate();
  const firstDow = (firstDowSun + 6) % 7; // 轉換成週一為0的排列
  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  function pickDay(d){
    setSelDate(`${viewY}-${String(viewM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  function onHourScroll(e){
    const idx = Math.round(e.target.scrollTop / ROW_H);
    setSelHour(Math.max(0, Math.min(23, idx)));
  }
  function onMinScroll(e){
    const idx = Math.round(e.target.scrollTop / ROW_H);
    setSelMin(Math.max(0, Math.min(11, idx)) * 5);
  }
  function confirm(){
    if(dateOnly){ onConfirm(selDate); return; }
    const hh = String(selHour).padStart(2,'0');
    const mm = String(selMin).padStart(2,'0');
    onConfirm(`${selDate}T${hh}:${mm}`);
  }
  const [dy,dm,dd] = selDate.split('-').map(Number);
  const dowText = '日一二三四五六'[new Date(dy,dm-1,dd).getDay()];

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:380}}>
        <div className="row-between" style={{marginBottom:14}}>
          <div style={{fontSize:15, fontWeight:700}}>{dy}/{String(dm).padStart(2,'0')}/{String(dd).padStart(2,'0')}（{dowText}）{!dateOnly && `${String(selHour).padStart(2,'0')}:${String(selMin).padStart(2,'0')}`}</div>
          <button className="go" style={{padding:'7px 16px', fontSize:13}} onClick={confirm}>確認</button>
        </div>

        <div className="row-between" style={{marginBottom:8}}>
          <button className="icon-btn" onClick={()=>shiftMonth(-1)}><span className="material-icons">chevron_left</span></button>
          <div style={{fontWeight:700, fontSize:14.5}}>{viewY} 年 {viewM+1} 月</div>
          <button className="icon-btn" onClick={()=>shiftMonth(1)}><span className="material-icons">chevron_right</span></button>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, textAlign:'center', fontSize:11, color:'var(--muted)', marginBottom:4}}>
          {['一','二','三','四','五','六','日'].map(d=><div key={d}>{d}</div>)}
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:16}}>
          {cells.map((d,idx)=>{
            if(!d) return <div key={idx}></div>;
            const ds = `${viewY}-${String(viewM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel = ds === selDate;
            return (
              <div key={idx} onClick={()=>pickDay(d)} style={{
                aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center',
                borderRadius:8, cursor:'pointer', fontSize:13,
                background: isSel ? 'var(--gold)' : 'transparent',
                color: isSel ? '#1c1305' : 'var(--text)', fontWeight: isSel ? 700 : 400
              }}>{d}</div>
            );
          })}
        </div>

        {!dateOnly && (
          <>
            <div style={{display:'flex', justifyContent:'center', gap:8, position:'relative'}}>
              <div style={{position:'absolute', top:ROW_H, left:0, right:0, height:ROW_H, background:'var(--panel-2)', borderRadius:8, pointerEvents:'none', zIndex:0}}></div>
              <div ref={hourRef} onScroll={onHourScroll} style={{height:ROW_H*3, overflowY:'scroll', scrollSnapType:'y mandatory', width:70, textAlign:'center', position:'relative', zIndex:1}}>
                <div style={{height:ROW_H}}></div>
                {Array.from({length:24}, (_,h)=>(
                  <div key={h} style={{height:ROW_H, lineHeight:ROW_H+'px', scrollSnapAlign:'start', fontSize: h===selHour?18:14, fontWeight: h===selHour?700:400, color: h===selHour?'var(--text)':'var(--muted)'}}>
                    {String(h).padStart(2,'0')}
                  </div>
                ))}
                <div style={{height:ROW_H}}></div>
              </div>
              <div style={{fontSize:18, alignSelf:'center', marginTop:ROW_H, position:'relative', zIndex:1}}>:</div>
              <div ref={minRef} onScroll={onMinScroll} style={{height:ROW_H*3, overflowY:'scroll', scrollSnapType:'y mandatory', width:70, textAlign:'center', position:'relative', zIndex:1}}>
                <div style={{height:ROW_H}}></div>
                {Array.from({length:12}, (_,i)=>i*5).map(m=>(
                  <div key={m} style={{height:ROW_H, lineHeight:ROW_H+'px', scrollSnapAlign:'start', fontSize: m===selMin?18:14, fontWeight: m===selMin?700:400, color: m===selMin?'var(--text)':'var(--muted)'}}>
                    {String(m).padStart(2,'0')}
                  </div>
                ))}
                <div style={{height:ROW_H}}></div>
              </div>
            </div>
            <div className="hint" style={{textAlign:'center', marginTop:10}}>上下滑動選擇時間（每5分鐘一格）</div>
          </>
        )}

        <div className="modal-actions">
          <button className="stay" onClick={onClose}>取消</button>
        </div>
      </div>
    </div>
  );
}

function tenureShort(hireDate, breakStart, breakEnd){
  if(!hireDate) return '';
  let h = new Date(hireDate);
  if(isNaN(h.getTime())) return '';
  let breakNote = '';
  if(breakStart && breakEnd){
    const [by,bm] = breakStart.split('-').map(Number);
    const [ey,em] = breakEnd.split('-').map(Number);
    if(by && bm && ey && em){
      const breakMonths = (ey-by)*12 + (em-bm) + 1;
      if(breakMonths > 0){
        h = new Date(h); h.setMonth(h.getMonth()+breakMonths);
        const by2 = Math.floor(breakMonths/12), bm2 = breakMonths%12;
        breakNote = `不含中斷${by2>0?by2+'年':''}${bm2>0?bm2+'個月':''}`;
      }
    }
  }
  const now = new Date();
  let months = (now.getFullYear()-h.getFullYear())*12 + (now.getMonth()-h.getMonth());
  if(now.getDate() < h.getDate()) months -= 1;
  if(months < 0) return '';
  const y = Math.floor(months/12), m = months%12;
  const tenure = y<=0 ? `${m}個月` : (m<=0 ? `${y}年` : `${y}年${m}個月`);
  return breakNote ? `${tenure}（${breakNote}）` : tenure;
}

/* ========================= 大頭照裁切/縮放 ========================= */
function AvatarCropModal({file, onConfirm, onCancel}){
  const BOX = 280; // 顯示用圓形範圍大小(px)
  const [imgSrc, setImgSrc] = useState(null);
  const [imgSize, setImgSize] = useState(null); // {w, h} 原始圖片尺寸
  const [scale, setScale] = useState(1);
  const [minScale, setMinScale] = useState(1);
  const [offset, setOffset] = useState({x:0, y:0});
  const dragRef = useRef({dragging:false, startX:0, startY:0, startOffset:{x:0,y:0}});
  const pinchRef = useRef({active:false, startDist:0, startScale:1});

  useEffect(()=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const s = Math.max(BOX/img.width, BOX/img.height);
      setMinScale(s); setScale(s); setOffset({x:0, y:0});
      setImgSize({w:img.width, h:img.height});
      setImgSrc(url);
    };
    img.src = url;
    return () => URL.revokeObjectURL(url);
  }, [file]);

  function clampOffset(o, s){
    if(!imgSize) return o;
    const w = imgSize.w*s, h = imgSize.h*s;
    const maxX = Math.max(0, (w-BOX)/2), maxY = Math.max(0, (h-BOX)/2);
    return { x: Math.min(maxX, Math.max(-maxX, o.x)), y: Math.min(maxY, Math.max(-maxY, o.y)) };
  }
  function touchDist(touches){
    const dx=touches[0].clientX-touches[1].clientX, dy=touches[0].clientY-touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }

  function onPointerDown(e){ dragRef.current = {dragging:true, startX:e.clientX, startY:e.clientY, startOffset:{...offset}}; }
  function onPointerMove(e){
    if(!dragRef.current.dragging) return;
    const dx = e.clientX - dragRef.current.startX, dy = e.clientY - dragRef.current.startY;
    setOffset(clampOffset({x:dragRef.current.startOffset.x+dx, y:dragRef.current.startOffset.y+dy}, scale));
  }
  function onPointerUp(){ dragRef.current.dragging = false; }

  function onTouchStart(e){
    if(e.touches.length===2){ pinchRef.current = {active:true, startDist:touchDist(e.touches), startScale:scale}; }
    else if(e.touches.length===1){ dragRef.current = {dragging:true, startX:e.touches[0].clientX, startY:e.touches[0].clientY, startOffset:{...offset}}; }
  }
  function onTouchMove(e){
    if(pinchRef.current.active && e.touches.length===2){
      e.preventDefault();
      const newScale = Math.max(minScale, Math.min(minScale*4, pinchRef.current.startScale * (touchDist(e.touches)/pinchRef.current.startDist)));
      setScale(newScale);
      setOffset(o=>clampOffset(o, newScale));
    } else if(dragRef.current.dragging && e.touches.length===1){
      const dx = e.touches[0].clientX - dragRef.current.startX, dy = e.touches[0].clientY - dragRef.current.startY;
      setOffset(clampOffset({x:dragRef.current.startOffset.x+dx, y:dragRef.current.startOffset.y+dy}, scale));
    }
  }
  function onTouchEnd(e){
    if(e.touches.length<2) pinchRef.current.active = false;
    if(e.touches.length===0) dragRef.current.dragging = false;
  }
  function onSliderChange(e){
    const s = Number(e.target.value);
    setScale(s);
    setOffset(o=>clampOffset(o, s));
  }

  function confirm(){
    if(!imgSize || !imgSrc) return;
    const OUT = 480;
    const canvas = document.createElement('canvas');
    canvas.width = OUT; canvas.height = OUT;
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.beginPath();
    ctx.arc(OUT/2, OUT/2, OUT/2, 0, Math.PI*2);
    ctx.closePath();
    ctx.clip();
    const ratio = OUT/BOX;
    const drawW = imgSize.w*scale*ratio, drawH = imgSize.h*scale*ratio;
    const drawX = OUT/2 - drawW/2 + offset.x*ratio;
    const drawY = OUT/2 - drawH/2 + offset.y*ratio;
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, drawX, drawY, drawW, drawH);
      ctx.restore();
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      onConfirm(dataUrl.split(',')[1], 'image/jpeg');
    };
    img.src = imgSrc;
  }

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:380}}>
        <h3><span className="material-icons">crop</span>調整大頭照</h3>
        <div className="hint" style={{marginBottom:12}}>拖曳照片調整位置，用下方拉桿或兩指縮放調整大小</div>
        <div
          style={{position:'relative', width:BOX, height:BOX, margin:'0 auto', borderRadius:'50%', overflow:'hidden', background:'#000', touchAction:'none', cursor:'grab'}}
          onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        >
          {imgSrc && imgSize && (
            <img src={imgSrc} draggable={false} style={{
              position:'absolute', left:'50%', top:'50%',
              width:imgSize.w*scale, height:imgSize.h*scale,
              transform:`translate(calc(-50% + ${offset.x}px), calc(-50% + ${offset.y}px))`,
              pointerEvents:'none'
            }} />
          )}
          <div style={{position:'absolute', inset:0, borderRadius:'50%', border:'2px solid rgba(255,255,255,0.6)', pointerEvents:'none'}}></div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:10, marginTop:16}}>
          <span className="material-icons" style={{fontSize:18, color:'var(--muted)'}}>photo_size_select_small</span>
          <input type="range" min={minScale} max={minScale*4} step={0.01} value={scale} onChange={onSliderChange} style={{flex:1}} />
          <span className="material-icons" style={{fontSize:22, color:'var(--muted)'}}>photo_size_select_large</span>
        </div>
        <div className="modal-actions">
          <button className="stay" onClick={onCancel}>取消</button>
          <button className="go" onClick={confirm} disabled={!imgSrc}>完成</button>
        </div>
      </div>
    </div>
  );
}

function ChangePasswordModal({onClose, showToast}){
  const [pw, setPw] = useState({oldPassword:'', newPassword:'', confirm:''});
  const [saving, setSaving] = useState(false);

  async function changePw(){
    if(!pw.newPassword || pw.newPassword.length < 4){ showToast('新密碼至少 4 碼', 'err'); return; }
    if(pw.newPassword !== pw.confirm){ showToast('兩次輸入的新密碼不一致', 'err'); return; }
    setSaving(true);
    try{
      await apiPost('changePassword', {oldPassword: pw.oldPassword, newPassword: pw.newPassword});
      showToast('密碼已更新', 'ok');
      onClose();
    }catch(e){ showToast(e.message, 'err'); }
    finally{ setSaving(false); }
  }

  return (
    <div className="modal-bg">
      <div className="modal">
        <h3><span className="material-icons">lock_reset</span>修改密碼</h3>
        <div className="field"><label>原密碼</label><input type="password" value={pw.oldPassword} onChange={e=>setPw({...pw,oldPassword:e.target.value})} /></div>
        <div className="field"><label>新密碼（至少4碼）</label><input type="password" value={pw.newPassword} onChange={e=>setPw({...pw,newPassword:e.target.value})} /></div>
        <div className="field"><label>再次輸入新密碼</label><input type="password" value={pw.confirm} onChange={e=>setPw({...pw,confirm:e.target.value})} /></div>
        <div className="modal-actions">
          <button className="stay" onClick={onClose}>取消</button>
          <button className="go" onClick={changePw} disabled={saving}>{saving?'儲存中...':'確認修改'}</button>
        </div>
      </div>
    </div>
  );
}

function PunchMap({companyLat, companyLng, radius, deviceLat, deviceLng}){
  const mapDivRef = useRef(null);
  const mapObjRef = useRef(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    let cancelled = false;
    loadGoogleMaps().then(()=>{
      if(cancelled || !mapDivRef.current) return;
      const hasCompany = companyLat && companyLng;
      const center = hasCompany ? {lat:Number(companyLat), lng:Number(companyLng)} : (deviceLat ? {lat:deviceLat, lng:deviceLng} : {lat:25.0330, lng:121.5654});
      const map = new google.maps.Map(mapDivRef.current, {
        center, zoom:17, disableDefaultUI:false, streetViewControl:false, mapTypeControl:false, fullscreenControl:false,
        styles:[
          {elementType:'geometry', stylers:[{color:'#222831'}]},
          {elementType:'labels.text.stroke', stylers:[{color:'#222831'}]},
          {elementType:'labels.text.fill', stylers:[{color:'#9CA3AC'}]},
          {featureType:'road', elementType:'geometry', stylers:[{color:'#393E46'}]},
          {featureType:'water', elementType:'geometry', stylers:[{color:'#2C3540'}]},
          {featureType:'poi', elementType:'geometry', stylers:[{color:'#2A3138'}]}
        ]
      });
      mapObjRef.current = map;
      if(hasCompany){
        new google.maps.Marker({
          position:{lat:Number(companyLat), lng:Number(companyLng)}, map, title:'公司位置',
          icon:{path:google.maps.SymbolPath.CIRCLE, scale:8, fillColor:'#00ADB5', fillOpacity:1, strokeColor:'#EEEEEE', strokeWeight:2}
        });
        new google.maps.Circle({
          center:{lat:Number(companyLat), lng:Number(companyLng)}, radius:Number(radius||200), map,
          fillColor:'#00ADB5', fillOpacity:0.12, strokeColor:'#00ADB5', strokeOpacity:0.6, strokeWeight:1.5
        });
      }
      if(deviceLat && deviceLng){
        new google.maps.Marker({
          position:{lat:deviceLat, lng:deviceLng}, map, title:'我的位置',
          icon:{path:google.maps.SymbolPath.CIRCLE, scale:7, fillColor:'#E6D59A', fillOpacity:1, strokeColor:'#222831', strokeWeight:2}
        });
      }
      setLoading(false);
    }).catch(e=>{ if(!cancelled){ setError(e.message); setLoading(false); } });
    return ()=>{ cancelled = true; };
  }, [companyLat, companyLng, radius, deviceLat, deviceLng]);

  if(error){
    return (
      <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', padding:20, textAlign:'center'}} className="hint">
        地圖無法顯示（{error}），不影響打卡功能正常使用。
      </div>
    );
  }
  return (
    <>
      {loading && <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}} className="hint">地圖載入中...</div>}
      <div ref={mapDivRef} style={{position:'absolute', inset:0, opacity:loading?0:1}}></div>
    </>
  );
}

function PunchPage({session, status, refreshStatus, showToast, settings}){
  const now = useClock();
  const [modal, setModal] = useState(null); // 'in'|'out'|'outgo'|'return'
  const [modalState, setModalState] = useState('confirm');
  const [deviceLoc, setDeviceLoc] = useState(null);

  useEffect(()=>{
    let cancelled = false;
    getLocation().then(loc=>{ if(!cancelled && loc.lat) setDeviceLoc(loc); });
    return ()=>{ cancelled = true; };
  }, []);

  const LABEL = {in:'上班打卡', out:'下班打卡', outgo:'外出', 'return':'返回'};
  const ACTION = {in:'clockIn', out:'clockOut', outgo:'clockOutgo', 'return':'clockReturn'};
  const CLS = {in:'in', out:'out', outgo:'mid', 'return':'mid'};

  async function confirmPunch(){
    setModalState('loading');
    const loc = await getLocation();
    if(loc.lat) setDeviceLoc(loc);
    try{
      const data = await apiPost(ACTION[modal], {employeeId: session.employeeId, lat: loc.lat, lng: loc.lng, source:'mobile'});
      const isOutOfRange = String(data.statusTag).indexOf('超出')===0;
      const msg = isOutOfRange ? `${LABEL[modal]}成功\n${data.statusTag}` : `${LABEL[modal]}成功`;
      showToast(msg, isOutOfRange ? 'err':'ok');
      setModal(null);
      refreshStatus();
    }catch(e){
      showToast(e.message, 'err');
      setModalState('confirm');
    }
  }

  const dateStr = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}　星期${'日一二三四五六'[now.getDay()]}`;
  const canOutgo = status?.clockedIn && !status?.clockedOut && !status?.outgoTime;
  const canReturn = status?.clockedIn && !status?.clockedOut && status?.outgoTime && !status?.returnTime;

  return (
    <div className="page">
      <div className="punch-hero" style={{position:'relative', overflow:'hidden', minHeight:640, background:'var(--bg-1)'}}>
        <PunchMap companyLat={settings?.lat} companyLng={settings?.lng} radius={settings?.radius} deviceLat={deviceLoc?.lat} deviceLng={deviceLoc?.lng} />

        <div style={{position:'absolute', left:8, right:8, top:8, background:'rgba(57,62,70,0.8)', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)', border:'1px solid var(--line)', borderRadius:14, padding:'12px 14px', boxShadow:'0 8px 20px rgba(0,0,0,.4)'}}>
          <div className="status-grid" style={{marginTop:0}}>
            <div className="status-cell"><div className="lbl">上班</div><div className="val">{hhmm(status?.checkInTime)}</div></div>
            <div className="status-cell"><div className="lbl">下班</div><div className="val">{hhmm(status?.checkOutTime)}</div></div>
            <div className="status-cell"><div className="lbl">外出</div><div className="val">{hhmm(status?.outgoTime)}</div></div>
            <div className="status-cell"><div className="lbl">返回</div><div className="val">{hhmm(status?.returnTime)}</div></div>
          </div>
          <div className="hint" style={{marginTop:8}}>打卡位置，如超出公司設定範圍仍會完成，仍須經過供管理者核對。</div>
        </div>

        <div style={{position:'absolute', left:8, right:8, bottom:8, background:'rgba(57,62,70,0.8)', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)', border:'1px solid var(--line)', borderRadius:14, padding:'14px', boxShadow:'0 10px 28px rgba(0,0,0,.4)'}}>
          <div className="clock-big" style={{margin:'2px 0 12px 0'}}>
            <div className="time">{pad(now.getHours())}:{pad(now.getMinutes())}:{pad(now.getSeconds())}</div>
            <div className="date">{dateStr}</div>
          </div>

          {!status ? (
            <div className="hint" style={{textAlign:'center'}}>載入打卡狀態中...</div>
          ) : !status.clockedIn ? (
            <button className="big-btn in" onClick={()=>{setModal('in'); setModalState('confirm');}}><span className="material-icons">login</span>上班打卡</button>
          ) : !status.clockedOut ? (
            <button className="big-btn out" onClick={()=>{setModal('out'); setModalState('confirm');}}><span className="material-icons">logout</span>下班打卡</button>
          ) : (
            <button className="big-btn done"><span className="material-icons">check_circle</span>今日已完成打卡</button>
          )}

          <div className="sub-btn-row">
            <button className="sub-btn" disabled={!canOutgo} onClick={()=>{setModal('outgo'); setModalState('confirm');}}>
              <span className="material-icons">directions_walk</span>外出
            </button>
            <button className="sub-btn" disabled={!canReturn} onClick={()=>{setModal('return'); setModalState('confirm');}}>
              <span className="material-icons">keyboard_return</span>返回
            </button>
          </div>
        </div>
      </div>

      {modal && (
        <div className="modal-bg" onClick={e=>{ if(e.target===e.currentTarget && modalState!=='loading') setModal(null); }}>
          <div className="modal punch-confirm">
            <div style={{fontSize:17, fontWeight:700}}>{session.employee?.name}</div>
            <div className={'action-label ' + CLS[modal]}>{LABEL[modal]}</div>
            <div className="time">{pad(now.getHours())}:{pad(now.getMinutes())}:{pad(now.getSeconds())}</div>
            <div className="hint" style={{minHeight:18, marginBottom:14}}>
              {modalState==='loading' ? <span><span className="spinner"></span> 定位中並送出紀錄...</span> : '請確認後按下確認'}
            </div>
            <div className="modal-actions" style={{marginTop:4, opacity:modalState==='loading'?0.5:1, pointerEvents:modalState==='loading'?'none':'auto'}}>
              <button className="stay" onClick={()=>setModal(null)}>取消</button>
              <button className="go" onClick={confirmPunch}>確認{LABEL[modal]}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 表單頁（請假／換補休／審核） ========================= */
function FormsPage({session, isManager, pending, refreshPending, showToast, settings}){
  const [myList, setMyList] = useState([]);
  const [balances, setBalances] = useState(null);
  const [loading, setLoading] = useState(true);
  const [leaveBox, setLeaveBox] = useState(null);
  const [compBox, setCompBox] = useState(null);
  const [reviewBox, setReviewBox] = useState(null); // {req, mode:'approve'|'reject', comment}
  const [busy, setBusy] = useState(false);
  const [colleagues, setColleagues] = useState([]);
  const [pickerFor, setPickerFor] = useState(null); // 'start' | 'end' | null
  const [menstrualStatus, setMenstrualStatus] = useState(null);
  const [myOvertime, setMyOvertime] = useState(null);

  const unit = Number(settings?.leaveUnit) || 1;
  const shift = session.employee?.shift;
  function safeHHMM(v, fallback){
    if(typeof v !== 'string') return fallback;
    const m = v.match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return fallback;
    return m[1].padStart(2,'0') + ':' + m[2];
  }
  const shiftStart = safeHHMM(shift?.workStart, safeHHMM(settings?.workStart, '09:00'));
  const shiftEnd = safeHHMM(shift?.workEnd, safeHHMM(settings?.workEnd, '18:00'));

  function roundToUnit(h){
    return Math.round(h / unit) * unit;
  }
  function computeHours(startDT, endDT){
    if(!startDT || !endDT) return '';
    const start = new Date(startDT);
    const end = new Date(endDT);
    if(isNaN(start.getTime()) || isNaN(end.getTime()) || end<=start) return '';
    let diff = (end-start)/3600000;
    // 若請假時段橫跨午休(12:00~13:00)，自動扣除班別設定的午休分鐘數
    const startMin = start.getHours()*60 + start.getMinutes();
    const endMin = end.getHours()*60 + end.getMinutes();
    if(startMin < 12*60 && endMin >= 13*60){
      const lunchMin = shift ? shift.lunchBreak : (settings?.lunchBreak || 60);
      diff -= (Number(lunchMin) || 0) / 60;
    }
    return roundToUnit(Math.max(0, diff));
  }
  function updateLeaveField(patch){
    const next = {...leaveBox, ...patch};
    const auto = computeHours(next.startDT, next.endDT);
    if(auto !== '') next.hours = auto;
    setLeaveBox(next);
  }

  function load(){
    setLoading(true);
    Promise.all([apiGet('listMyRequests'), apiGet('getLeaveBalances')])
      .then(([list, bal])=>{ setMyList(list); setBalances(bal); })
      .catch(e=>showToast(e.message,'err')).finally(()=>setLoading(false));
  }
  useEffect(load, []);
  useEffect(()=>{ apiGet('getColleagueList').then(setColleagues).catch(()=>{}); }, []);
  useEffect(()=>{ if(leaveBox) apiGet('getMyMenstrualLeaveStatus').then(setMenstrualStatus).catch(()=>{}); }, [!!leaveBox]);
  useEffect(()=>{
    if(compBox){
      const d = new Date();
      const month = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      apiGet('getMyOvertimeSummary', {month}).then(setMyOvertime).catch(()=>{});
    }
  }, [!!compBox]);

  async function submitLeave(){
    if(!leaveBox.leaveType){ showToast('請選擇假別','err'); return; }
    if(!leaveBox.startDT || !leaveBox.endDT){ showToast('請填寫起訖時間','err'); return; }
    if(new Date(leaveBox.endDT) <= new Date(leaveBox.startDT)){ showToast('結束時間必須晚於開始時間','err'); return; }
    const startTimeOnly = leaveBox.startDT.slice(11,16);
    const endTimeOnly = leaveBox.endDT.slice(11,16);
    if(startTimeOnly < shiftStart || endTimeOnly > shiftEnd){
      showToast(`請假時間需在班別時間內（${shiftStart}~${shiftEnd}），請重新選擇`, 'err');
      return;
    }
    if(!(Number(leaveBox.hours) > 0)){ showToast('請填寫時數','err'); return; }
    setBusy(true);
    try{
      let attachmentUrl = '';
      if(leaveBox.attachmentFile){
        const {base64, mimeType} = await compressImageFile(leaveBox.attachmentFile, 1000, 0.75);
        const uploaded = await apiPost('uploadLeaveAttachment', {imageBase64: base64, mimeType, leaveType: leaveBox.leaveType, date: leaveBox.startDT.slice(0,10)});
        attachmentUrl = uploaded.url;
      }
      await apiPost('submitRequest', {
        type:'請假', leaveType: leaveBox.leaveType,
        startTime: leaveBox.startDT.replace('T',' '),
        endTime: leaveBox.endDT.replace('T',' '),
        hours: Number(leaveBox.hours), reason: leaveBox.reason || '', delegateId: leaveBox.delegateId || '',
        attachmentUrl
      });
      showToast('請假申請已送出','ok');
      setLeaveBox(null); load();
    }catch(e){ showToast(e.message,'err'); }
    finally{ setBusy(false); }
  }
  async function submitComp(){
    if(!compBox.date){ showToast('請填寫加班日期','err'); return; }
    if(!(Number(compBox.hours) > 0)){ showToast('請填寫時數','err'); return; }
    setBusy(true);
    try{
      await apiPost('submitRequest', {type:'換補休', startTime: compBox.date + ' 00:00', hours: Number(compBox.hours), reason: compBox.reason || ''});
      showToast('換補休申請已送出','ok');
      setCompBox(null); load();
    }catch(e){ showToast(e.message,'err'); }
    finally{ setBusy(false); }
  }
  async function cancelReq(id){
    if(!confirm('確定取消這筆申請？')) return;
    try{ await apiPost('cancelRequest', {id}); showToast('已取消','ok'); load(); }
    catch(e){ showToast(e.message,'err'); }
  }
  async function doReview(){
    setBusy(true);
    try{
      await apiPost(reviewBox.mode==='approve'?'approveRequest':'rejectRequest', {id: reviewBox.req.id, comment: reviewBox.comment||''});
      showToast(reviewBox.mode==='approve'?'已核准':'已駁回','ok');
      setReviewBox(null); refreshPending(); load();
    }catch(e){ showToast(e.message,'err'); }
    finally{ setBusy(false); }
  }

  function reqSummary(r){
    if(r.type==='請假') return `${r.leaveType}　${r.startTime} ~ ${r.endTime}　${r.hours}小時${r.delegateName?'　代理人：'+r.delegateName:''}`;
    return `加班日期 ${String(r.startTime).split(' ')[0]}　${r.hours}小時`;
  }

  return (
    <div className="page">
      {balances && (
        <div className="balance-row">
          <div className="balance-cell"><div className="num">{balances.annualRemain}</div><div className="lbl">特休剩餘（小時）</div></div>
          <div className="balance-cell"><div className="num">{balances.compRemain}</div><div className="lbl">補休剩餘（小時）</div></div>
        </div>
      )}
      {balances && (balances.compExpiredHours > 0 || balances.compExpiringHours > 0) && (
        <div className="hint" style={{color:'var(--gold)', marginTop:-6, marginBottom:10}}>
          {balances.compExpiredHours > 0 ? `已過期 ${balances.compExpiredHours} 小時` : `即將到期 ${balances.compExpiringHours} 小時（${balances.compNearestExpire}前）`}
        </div>
      )}

      <div className="form-actions">
        <button className="leave" onClick={()=>{
          const today = new Date().toISOString().slice(0,10);
          const defStart = today+'T'+shiftStart, defEnd = today+'T'+shiftEnd;

            {reqSummary(r)}

      {leaveBox && (
        <div className="modal-bg">
          <div className="modal">
            <h3><span className="material-icons">event_available</span>請假申請</h3>
            <div className="field"><label>假別</label>

                <option value="">請選擇</option>

                  let extra = '';
                  if(t==='特休' && balances) extra = `（剩 ${balances.annualRemain} 小時）`;
                  if(t==='補休' && balances) extra = `（剩 ${balances.compRemain} 小時）`;
                  if(t==='生理假' && menstrualStatus) extra = `（今年已用 ${menstrualStatus.usedHours} hr，剩 ${menstrualStatus.remainingFullPayHours} hr 全薪）`;

                <div className="hint" style={{marginTop:6}}>
                  依勞基法第14條之1，生理假每年前3天（24小時）全薪，超過部分比照病假折半發給。你今年已使用 {menstrualStatus.usedHours} 小時，還有 {menstrualStatus.remainingFullPayHours} 小時全薪額度。

      {compBox && (
        <div className="modal-bg">

      {reviewBox && (
        <div className="modal-bg">
          <div className="modal">
            <h3><span className="material-icons">{reviewBox.mode==='approve'?'check_circle':'cancel'}</span>{reviewBox.mode==='approve'?'核准':'駁回'}申請</h3>
            <div className="card req-item" style={{marginBottom:12}}>

              <div className="meta">{reqSummary(reviewBox.req)}{reviewBox.req.reason && <><br/>事由：{reviewBox.req.reason}</>}{reviewBox.req.attachmentUrl && <><br/><a href={reviewBox.req.attachmentUrl} target="_blank" rel="noopener" style={{color:'var(--gold)'}}>查看附件</a></>}</div>

          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 行事曆 ========================= */
function CalendarPage({session, showToast}){
  const [month, setMonth] = useState(()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); });
  const [holidays, setHolidays] = useState([]);
  const [myLeaves, setMyLeaves] = useState([]);
  const [settings, setSettings] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    setLoading(true);
    Promise.all([apiGet('getHolidays'), apiGet('listMyRequests'), apiGet('getSettings')])
      .then(([h, reqs, s])=>{
        setHolidays(h);
        setMyLeaves(reqs.filter(r=>r.type==='請假' && r.status==='已核准'));
        setSettings(s);
      })
      .catch(e=>showToast(e.message,'err')).finally(()=>setLoading(false));
  }, []);

  const [y, m] = month.split('-').map(Number);
  const firstDowSun = new Date(y, m-1, 1).getDay();
  const firstDow = (firstDowSun + 6) % 7; // 轉換成週一為0的排列
  const daysInMonth = new Date(y, m, 0).getDate();
  const holidayMap = {}; holidays.forEach(h=>{ holidayMap[h.date] = h; });
  function leavesOnDate(dateStr){
    return myLeaves.filter(r=>{
      const s = r.startTime.slice(0,10), e = r.endTime.slice(0,10);
      return dateStr >= s && dateStr <= e;
    });
  }
  function shiftMonth(delta){
    const nd = new Date(y, m-1+delta, 1);
    setMonth(nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0'));
  }

  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const monthLeaves = myLeaves.filter(r=>r.startTime.slice(0,7)===month || r.endTime.slice(0,7)===month);
  const monthHolidays = holidays.filter(h=>h.date.indexOf(month)===0).sort((a,b)=>a.date.localeCompare(b.date));

  const shift = session.employee?.shift;

  return (
    <div className="page">
      <div className="card shift-card">
        <span className="material-icons">schedule</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, fontSize:14.5}}>{shift ? shift.name : '標準班'}　{shift ? shift.workStart : '09:00'}~{shift ? shift.workEnd : '18:00'}</div>
          <div className="hint">預設班別（若無另外排班）</div>
        </div>
      </div>

      <div className="card">
        <div className="row-between" style={{marginBottom:10}}>
          <button className="icon-btn" onClick={()=>shiftMonth(-1)}><span className="material-icons">chevron_left</span></button>
          <div style={{fontWeight:700, fontSize:15}}>{y} 年 {m} 月</div>
          <button className="icon-btn" onClick={()=>shiftMonth(1)}><span className="material-icons">chevron_right</span></button>
        </div>
        {loading ? <div className="hint" style={{textAlign:'center'}}>載入中...</div> : (
          <>
            <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, textAlign:'center', fontSize:11, color:'var(--muted)', marginBottom:4}}>
              {['一','二','三','四','五','六','日'].map(d=><div key={d}>{d}</div>)}
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4}}>
              {cells.map((d,idx)=>{
                if(!d) return <div key={idx}></div>;
                const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hol = holidayMap[dateStr];
                const leaves = leavesOnDate(dateStr);
                const isToday = dateStr === new Date().toISOString().slice(0,10);
                const dow = new Date(y, m-1, d).getDay();
                const isMandatoryRest = settings && dow === Number(settings.mandatoryRestDay);
                const isRestDay = settings && dow === Number(settings.restDay);
                const isCompanyHoliday = hol && hol.type === '公司休假日';
                const isNationalOrWeeklyOff = (hol && hol.type === '國定假日') || isMandatoryRest || isRestDay;
                let bg = '#5b8db826'; // 上班日：藍色底
                if(isCompanyHoliday) bg = '#9575cd26'; // 公司休假日：紫色底
                else if(isNationalOrWeeklyOff) bg = '#c05a4f26';
                return (
                  <div key={idx} style={{
                    aspectRatio:'1', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                    borderRadius:8, background:bg, fontSize:12.5, position:'relative',
                    border: isToday ? '1.5px solid var(--gold)' : '1px solid transparent'
                  }}>
                    <div>{d}</div>
                    {leaves.length>0 && <div style={{position:'absolute', bottom:4, width:5,height:5,borderRadius:3,background:'var(--green)'}}></div>}
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex', gap:12, marginTop:12, fontSize:11, color:'var(--muted)', flexWrap:'wrap'}}>
              <span><span style={{display:'inline-block',width:8,height:8,borderRadius:4,background:'var(--blue)',marginRight:4}}></span>上班日</span>
              <span><span style={{display:'inline-block',width:8,height:8,borderRadius:4,background:'var(--red)',marginRight:4}}></span>休息日／例假日／國定假日</span>
              <span><span style={{display:'inline-block',width:8,height:8,borderRadius:4,background:'#9575cd',marginRight:4}}></span>公司休假日</span>
              <span><span style={{display:'inline-block',width:5,height:5,borderRadius:3,background:'var(--green)',marginRight:4}}></span>已核准請假</span>
            </div>
          </>
        )}
      </div>

      {monthHolidays.length>0 && (
        <>
          <h2><span className="material-icons" style={{color:'var(--red)'}}>event_busy</span>本月假日</h2>
          {monthHolidays.map(h=>(
            <div className="card req-item" key={h.date}>
              <div className="title-row"><div className="type">{h.name || h.type}</div><span className={'status-badge '+(h.type==='國定假日'?'no':'pending')}>{h.type}</span></div>
              <div className="meta">{h.date}</div>
            </div>
          ))}
        </>
      )}
      {monthLeaves.length>0 && (
        <>
          <h2><span className="material-icons" style={{color:'var(--green)'}}>event_available</span>本月已核准請假</h2>
          {monthLeaves.map(r=>(
            <div className="card req-item" key={r.id}>
              <div className="title-row"><div className="type">{r.leaveType}</div><span className="status-badge ok">已核准</span></div>
              <div className="meta">{r.startTime} ~ {r.endTime}　{r.hours} 小時</div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function PayslipModal({onClose, showToast}){
  const [month, setMonth] = useState(()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); });
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [expanded, setExpanded] = useState({base:true, overtime:true, leave:true, sales26:true});
  function toggleSection(key){ setExpanded(prev=>({...prev, [key]: !prev[key]})); }

  function load(m){
    setLoading(true);
    apiGet('getMyPayslip', {month:m}).then(setData).catch(e=>{ showToast(e.message,'err'); setData(null); }).finally(()=>setLoading(false));
  }
  useEffect(()=>{ load(month); }, [month]);

  const money = v => Math.round(Number(v)||0).toLocaleString('zh-TW');
  const negMoney = v => { const rv = Math.round(Number(v)||0); return rv===0 ? money(0) : '-'+money(rv); };
  const n = v => Number(v)||0;
  const [my, mm] = month.split('-');

  const emp = data ? data.employee : {};
  const entry = data ? data.entry : {};
  const calc = data ? data.calc : {};

  const allowanceItems = data ? [
    {label:'伙食津貼', value:n(calc.effMealAllowance)},
    {label:'交通津貼', value:n(calc.effTransportAllowance)},
    {label:'職務加給', value:n(calc.effPositionAllowance)},
    {label:`全勤獎金${calc.fullAttendanceDeductRatio>0?`（依比例扣${(calc.fullAttendanceDeductRatio*100).toFixed(1)}%）`:(calc.fullAttendanceRatio<1?`（依在職比例${(calc.fullAttendanceRatio*100).toFixed(0)}%）`:'')}`, value:n(calc.fullAttendanceAdjusted), showAnyway:n(calc.effFullAttendanceBonus)>0 && calc.fullAttendanceDeductRatio>0}
  ].filter(it=>it.value>0 || it.showAnyway) : [];

  const overtimeItems = data ? [
    {label:`平日加班（${n(entry.otWeekday134)}/${n(entry.otWeekday167)}hr）`, value:n(calc.weekdayOtPay)},
    {label:`休息日出勤（${n(entry.otRestDayHours)}hr）`, value:n(calc.restDayPay)},
    {label:`國定假日出勤（${n(entry.otHolidayHours)}hr）`, value:n(calc.holidayPay)},
    {label:`例假日出勤（${n(entry.otMandatoryRestHours)}hr，需補休）`, value:n(calc.mandatoryRestPay)}
  ].filter(it=>it.value>0) : [];

  const leaveItems = data ? [
    {show:n(entry.personalLeave)>0, label:`事假（${n(entry.personalLeave)}hr）`, value:n(calc.hourly)*n(entry.personalLeave)},
    {show:n(entry.sickLeave)>0, label:`病假（${n(entry.sickLeave)}hr）${n(calc.sickUnpaidHours)>0?'（部分已達年度上限不給薪）':''}`, value:n(calc.hourly)*0.5*n(calc.sickHalfPayHours)+n(calc.hourly)*n(calc.sickUnpaidHours)},
    {show:n(entry.menstrualLeave)>0, label:`生理假（半薪${n(calc.menstrualHalfPayHours)}hr／全薪${n(calc.menstrualPaidHours)}hr不扣${n(calc.menstrualUnpaidHours)>0?`／已達上限${n(calc.menstrualUnpaidHours)}hr不給薪`:''}）`, value:n(calc.hourly)*0.5*n(calc.menstrualHalfPayHours)+n(calc.hourly)*n(calc.menstrualUnpaidHours)},
    {show:n(entry.disasterLeave)>0, label:`災防假（${n(entry.disasterLeave)}hr）`, value:0},
    {show:n(entry.otherLeave)>0, label:`其他假（${n(entry.otherLeave)}hr）`, value:n(calc.hourly)*n(entry.otherLeave)}
  ].filter(it=>it.show) : [];

  const sales26Items = data ? [
    {label:'業務費用', value:n(entry.businessExpense)},
    {label:'業績獎金', value:n(entry.salesPerformance)},
    {label:'其他獎金', value:n(entry.salesBonus26)},
    {label:'其他費用', value:n(entry.otherExpense26)},
    {label:'其他扣款', value:-n(entry.deduction26)}
  ].filter(it=>it.value!==0) : [];

  function SectionHeader({label, amount, amountColor, sectionKey, hasDetail, total}){
    return (
      <div className={total?'pl-row total':'pl-row'} style={{cursor: hasDetail?'pointer':'default'}} onClick={hasDetail?()=>toggleSection(sectionKey):undefined}>
        <span className="lbl">
          {label}
          {hasDetail && <span className="material-icons" style={{fontSize:18}}>{expanded[sectionKey]?'expand_less':'expand_more'}</span>}
        </span>
        <span className="val" style={amountColor?{color:amountColor}:undefined}>{amount}</span>
      </div>
    );
  }

  return (
    <div className="modal-bg">
      <div className="modal">
        <h3><span className="material-icons">receipt_long</span>我的薪資條</h3>
        <div className="field">
          <label>月份</label>
          <button type="button" className="ghost-btn" style={{textAlign:'center', display:'flex', justifyContent:'center', alignItems:'center', gap:8, background:'#1B2027', color:'var(--text)', border:'1px solid var(--line)'}} onClick={()=>setPickerOpen(true)}>
            <span>{my}年{Number(mm)}月</span>
            <span className="material-icons" style={{fontSize:18}}>event</span>
          </button>
        </div>
        {loading ? <div className="hint">載入中...</div> : !data ? (
          <div className="hint">查無資料</div>
        ) : data.hasRecord===false ? (
          <div className="coming" style={{padding:'30px 10px'}}>
            <div><span className="material-icons">event_busy</span></div>
            <div style={{fontSize:15, fontWeight:700, color:'var(--text)'}}>這個月尚無薪資資料</div>
            <div className="hint" style={{marginTop:6}}>管理者尚未儲存 {my}年{Number(mm)}月 的薪資紀錄</div>
          </div>
        ) : (
          <>
            <div className="balance-row">
              <div className="balance-cell"><div className="num">{money(data.calc.pay06)}</div><div className="lbl">{data.payDate06 ? data.payDate06.slice(5).replace('-','/') : '06日'}應付</div></div>
              <div className="balance-cell"><div className="num">{money(data.calc.pay26)}</div><div className="lbl">{data.payDate26 ? data.payDate26.slice(5).replace('-','/') : '26日'}應付</div></div>
            </div>
            <div className="card" style={{padding:14}}>
              <SectionHeader label="本薪" amount={money(calc.effBaseSalary)} sectionKey="base" hasDetail={allowanceItems.length>0} />
              {expanded.base && allowanceItems.length>0 && (
                <div style={{padding:'0 0 6px'}}>
                  <div className="pl-note">已含在本薪內，僅供對照</div>
                  {allowanceItems.map(it=>(
                    <div className="pl-sub" key={it.label}><span>{it.label}</span><span>{money(it.value)}</span></div>
                  ))}
                </div>
              )}

              {overtimeItems.length>0 && (
                <>
                  <SectionHeader label="加班費" amount={money(calc.overtimePay)} amountColor="var(--green)" sectionKey="overtime" hasDetail={true} />
                  {expanded.overtime && (
                    <div style={{padding:'0 0 6px'}}>
                      {overtimeItems.map(it=>(
                        <div className="pl-sub" key={it.label}><span>{it.label}</span><span>{money(it.value)}</span></div>
                      ))}
                    </div>
                  )}
                </>
              )}

              {n(calc.bonusTotal)>0 && <div className="pl-row"><span className="lbl">獎金合計</span><span className="val">{money(calc.bonusTotal)}</span></div>}
              {n(entry.annualLeaveSettlement)>0 && <div className="pl-row"><span className="lbl">特休結算</span><span className="val">{money(entry.annualLeaveSettlement)}</span></div>}
              <SectionHeader label="應發合計" amount={money(calc.payableTotal)} total={true} />
              <div style={{borderTop:'1px solid var(--line)', margin:'8px 0'}}></div>
              <div className="pl-row">
                <span className="lbl">勞保費{data.calc.insFullMonth===false && <span style={{fontSize:11}}>（按{data.calc.insLaborDays}天計）</span>}</span>
                <span className="val" style={{color:'var(--red)'}}>{negMoney(data.calc.laborFee)}</span>
              </div>
              <div className="pl-row">
                <span className="lbl">健保費{data.calc.insActiveAtMonthEnd===false && <span style={{fontSize:11}}>（月底已離職不收）</span>}{data.calc.insActiveAtMonthEnd!==false && Number(data.employee.dependentCount)>0 && <span style={{fontSize:11}}>（含眷屬{Math.min(Number(data.employee.dependentCount),3)}人）</span>}</span>
                <span className="val" style={{color:'var(--red)'}}>{negMoney(data.calc.healthFee)}</span>
              </div>

              {leaveItems.length>0 && (
                <>
                  <SectionHeader label="請假扣款" amount={negMoney(calc.leaveDeduct)} amountColor="var(--red)" sectionKey="leave" hasDetail={true} />
                  {expanded.leave && (
                    <div style={{padding:'0 0 6px'}}>
                      {leaveItems.map(it=>(
                        <div className="pl-sub" key={it.label}><span>{it.label}</span><span>{negMoney(it.value)}</span></div>
                      ))}
                    </div>
                  )}
                </>
              )}

              {n(entry.otherDeduction)>0 && <div className="pl-row"><span className="lbl">其他扣款</span><span className="val" style={{color:'var(--red)'}}>{negMoney(entry.otherDeduction)}</span></div>}
              <SectionHeader label="應扣合計" amount={negMoney(calc.deductTotal)} amountColor="var(--red)" total={true} />
            </div>

            {sales26Items.length>0 && (
              <div className="card" style={{padding:14, marginTop:10}}>
                <SectionHeader label="業務／獎金項目（26日）" amount="" sectionKey="sales26" hasDetail={true} />
                {expanded.sales26 && (
                  <div style={{marginTop:2}}>
                    {sales26Items.map(it=>(
                      <div className="pl-sub" key={it.label}>
                        <span>{it.label}</span>
                        <span style={{color: it.value<0?'var(--red)':undefined}}>{it.value<0? negMoney(-it.value) : money(it.value)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            <div className="hint" style={{marginTop:8, textAlign:'center'}}>合計 NT$ {money(calc.grandTotal)}</div>
          </>
        )}
        <div className="modal-actions"><button className="stay" onClick={onClose} style={{flex:1}}>關閉</button></div>
      </div>
      {pickerOpen && (
        <CustomMonthPicker
          value={month}
          onConfirm={(v)=>{ setMonth(v); setPickerOpen(false); }}
          onClose={()=>setPickerOpen(false)}
        />
      )}
    </div>
  );
}

/* ========================= 即將推出 ========================= */
function ComingSoon({icon, label}){
  return (
    <div className="page">
      <div className="coming">
        <div><span className="material-icons">{icon}</span></div>

        <div style={{fontSize:15, fontWeight:700, color:'var(--text)'}}>{label}</div>
        <div className="hint" style={{marginTop:6}}>功能即將推出，敬請期待</div>
      </div>
    </div>
  );
}

/* ========================= App ========================= */
function App(){
  const [configError] = useState(GAS_URL.indexOf('請填入') !== -1);
  const [session, setSession] = useState(null);
  const [checkingSession, setCheckingSession] = useState(true);
  const [tab, setTab] = useState('home');
  const [settings, setSettings] = useState(null);
  const [status, setStatus] = useState(null);
  const [pending, setPending] = useState([]);
  const [unreadAnnounceCount, setUnreadAnnounceCount] = useState(0);
  const [toast, setToast] = useState(null);
  const [pwOpen, setPwOpen] = useState(false);

  function showToast(msg, type){
    setToast({msg, type});
    setTimeout(()=>setToast(null), 3500);
  }

  useEffect(()=>{
    if(configError){ setCheckingSession(false); return; }
    if(!CURRENT_TOKEN){ setCheckingSession(false); return; }
    let cached = null;
    try{ cached = JSON.parse(localStorage.getItem(SESSION_CACHE_KEY) || 'null'); }catch(e){}
    if(cached && cached.employeeId){
      // 樂觀還原：本機已有登入紀錄就直接視為已登入，不用等一趟網路來回才顯示畫面
      // 如果 token 真的已經逾時，後續任何 API 呼叫都會偵測到並自動導回登入畫面
      setSession(cached);
    } else {
      setToken(null);
    }
    setCheckingSession(false);
  }, []);

  useEffect(()=>{
    if(!session) return;
    if(!settings) apiGet('getSettings').then(setSettings).catch(()=>{});
    refreshStatus();
    refreshPending();
    refreshProfile();
    refreshAnnounceUnread();
  }, [session?.token]);

  function refreshAnnounceUnread(){
    if(!session?.employeeId) return;
    apiGet('getMyAnnouncements').then(data=>setUnreadAnnounceCount(data.unreadCount || 0)).catch(()=>{});
  }

  function refreshProfile(){
    if(!session?.employeeId) return;
    apiGet('getMyProfile').then(data=>{
      setSession(prev=>{
        if(!prev) return prev;
        const next = {...prev, employee: data.employee, isManager: data.isManager};
        try{ localStorage.setItem(SESSION_CACHE_KEY, JSON.stringify(next)); }catch(e){}
        return next;
      });
    }).catch(()=>{}); // 背景刷新，失敗不影響現有畫面
  }

  function refreshStatus(){
    if(!session?.employeeId) return;
    apiGet('getTodayStatus', {employeeId: session.employeeId}).then(setStatus).catch(e=>showToast(e.message,'err'));
  }
  function refreshPending(){
    if(!session?.isManager) { setPending([]); return; }
    apiGet('listPendingApprovals').then(setPending).catch(()=>{});
  }

  function onLoggedIn(data){ setSession(data); setTab('home'); }
  function logout(){
    setToken(null);
    setSession(null); setStatus(null); setPending([]); setUnreadAnnounceCount(0); setTab('home');
  }

  if(configError){
    return <div className="config-warn">尚未設定 GAS 後端網址。請先部署 <code>Code.gs</code>，並將網址貼到本檔案頂端的 <code>GAS_URL</code> 常數中。</div>;
  }
  if(checkingSession){
    return <div style={{padding:80, textAlign:'center', color:'var(--muted)'}}>載入中...</div>;
  }

  const TABS = [
    {id:'home', label:'首頁', icon:'home'},
    {id:'punch', label:'打卡', icon:'how_to_reg'},
    {id:'forms', label:'表單', icon:'description'},
    {id:'schedule', label:'班表', icon:'calendar_month'},
    {id:'news', label:'公告', icon:'campaign'},
  ];

  return (
    <div className="app">
      {!session ? (
        <LoginScreen onLoggedIn={onLoggedIn} />
      ) : (
        <>
          <div className="topbar">
            <div className="store">{settings?.storeName || '員工專區'}</div>
            <div className="right">
              <button className="icon-btn" title="修改密碼" onClick={()=>setPwOpen(true)}><span className="material-icons">lock</span></button>
              <button className="icon-btn" title="登出" onClick={()=>{ if(confirm('確定要登出嗎？')) logout(); }}><span className="material-icons">logout</span></button>
            </div>
          </div>

          {tab==='home' && <HomePage session={session} setSession={setSession} status={status} pendingCount={pending.length} goForms={()=>setTab('forms')} goNews={()=>setTab('news')} showToast={showToast} />}
          {tab==='punch' && <PunchPage session={session} status={status} refreshStatus={refreshStatus} showToast={showToast} settings={settings} />}
          {tab==='forms' && <FormsPage session={session} isManager={!!session.isManager} pending={pending} refreshPending={refreshPending} showToast={showToast} settings={settings} />}
          {tab==='schedule' && <CalendarPage session={session} showToast={showToast} />}
          {tab==='news' && <NewsPage showToast={showToast} onMarkedRead={()=>setUnreadAnnounceCount(0)} />}

          <div className="tabbar">
            <div className="tabbar-inner">
              {TABS.map(t=>(
                <div key={t.id} className={'tab'+(tab===t.id?' active':'')} onClick={()=>setTab(t.id)}>
                  <span className="material-icons">{t.icon}</span>
                  {t.label}
                  {t.id==='forms' && pending.length>0 && <span className="reddot">{pending.length}</span>}
                  {t.id==='news' && unreadAnnounceCount>0 && <span className="reddot">{unreadAnnounceCount}</span>}
                </div>
              ))}
            </div>
          </div>
        </>
      )}
      {pwOpen && <ChangePasswordModal onClose={()=>setPwOpen(false)} showToast={showToast} />}
      {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
(function(){
  function showError(msg){
    var box = document.getElementById('boot-error');
    if(box){ box.style.display='block'; box.textContent = msg; }
  }
  window.addEventListener('error', function(e){
    showError('頁面發生錯誤：' + (e.message||e.error) + '\n(檔案:' + (e.filename||'') + ' 行:' + (e.lineno||'') + ')');
  });
  window.addEventListener('unhandledrejection', function(e){
    showError('未處理的錯誤：' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  function loadScript(src){
    return new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = function(){ reject(new Error(src + ' 載入失敗')); };
      document.head.appendChild(s);
    });
  }
  function loadWithFallback(urls, idx){
    idx = idx || 0;
    if(idx >= urls.length) return Promise.reject(new Error('所有來源皆載入失敗：' + urls.join(' / ')));
    return loadScript(urls[idx]).catch(function(){ return loadWithFallback(urls, idx+1); });
  }
  var CDN = {
    react: ['https://unpkg.com/react@18/umd/react.production.min.js', 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'],
    reactDom: ['https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'],
    babel: ['https://unpkg.com/@babel/standalone/babel.min.js', 'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js']
  };
  loadWithFallback(CDN.react)
    .then(function(){ return loadWithFallback(CDN.reactDom); })
    .then(function(){ return loadWithFallback(CDN.babel); })
    .then(function(){
      var src = document.getElementById('app-src').textContent;
      var compiled = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
      var statusEl = document.getElementById('boot-status');
      if(statusEl) statusEl.remove();
      (0, eval)(compiled);
    })
    .catch(function(err){
      showError('必要程式庫載入失敗，畫面因此空白。\n原因：' + err.message + '\n\n最常見情況：瀏覽器擴充功能（例如廣告攔截／隱私保護外掛）封鎖了 unpkg.com 或 jsdelivr.net，或目前網路無法連線到這兩個網域。\n\n請嘗試：\n1. 停用廣告攔截類擴充功能後重新整理本頁\n2. 改用無痕視窗開啟同一網址測試\n3. 確認網路能連上 unpkg.com 與 cdn.jsdelivr.net');
    });
})();
</script>
</body>
</html>
