<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>薪資計算系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2a24;
    --paper:#f6f4ee;
    --paper-2:#ffffff;
    --line:#d9d3c3;
    --brand:#2f5d4f;
    --brand-dark:#1c3a30;
    --accent:#b5652b;
    --danger:#a13d3d;
    --muted:#6b7268;
    --income:#2f5d4f;
    --outcome:#a13d3d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;
    line-height:1.5;
  }
  h1,h2,h3{font-family:'Noto Serif TC',serif; margin:0 0 6px 0; font-weight:700;}
  .mono{font-family:'Roboto Mono',monospace;}
  #root{min-height:100vh;}

  .app-shell{display:flex; min-height:100vh;}
  .sidebar{
    width:196px; flex-shrink:0;
    background:var(--brand-dark);
    color:#eee7d9;
    display:flex; flex-direction:column;
    padding:22px 0;
  }
  .brand{
    padding:0 18px 18px 18px;
    border-bottom:1px solid rgba(255,255,255,0.12);
    margin-bottom:10px;
  }
  .brand .mark{
    font-family:'Noto Serif TC',serif;
    font-size:20px; font-weight:700; color:#f3ead3;
    letter-spacing:1px;
  }
  .brand .sub{font-size:11px; color:#b9c9bf; margin-top:2px;}
  .navitem{
    padding:12px 18px; cursor:pointer; font-size:13.5px;
    border-left:3px solid transparent;
    color:#d9dfd5; display:flex; align-items:center; gap:8px;
    transition:background .12s;
  }
  .navitem:hover{background:rgba(255,255,255,0.06);}
  .navitem.active{
    background:rgba(255,255,255,0.1);
    border-left-color:var(--accent);
    color:#fff; font-weight:700;
  }
  .navitem .n{
    font-family:'Roboto Mono',monospace; font-size:11px; color:#93a89b;
    width:16px; display:inline-block;
  }
  .navitem.active .n{color:var(--accent);}
  .sidebar-foot{margin-top:auto; padding:14px 18px 0 18px; border-top:1px solid rgba(255,255,255,0.12);}
  .sidebar-foot button{
    width:100%; margin-top:6px; font-size:11.5px;
  }

  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    background:var(--paper-2); border-bottom:1px solid var(--line);
    padding:14px 26px; display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
  }
  .topbar .title{font-size:18px;}
  .topbar .desc{font-size:12px; color:var(--muted);}
  .content{padding:22px 26px 60px 26px; overflow-x:auto;}

  button{
    font-family:'Noto Sans TC',sans-serif; font-size:13px;
    background:var(--brand); color:#fff; border:none;
    padding:8px 14px; border-radius:3px; cursor:pointer;
    transition:background .12s;
  }
  button:hover{background:var(--brand-dark);}
  button.ghost{background:transparent; color:var(--brand); border:1px solid var(--brand);}
  button.ghost:hover{background:var(--brand); color:#fff;}
  button.danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  button.danger:hover{background:var(--danger); color:#fff;}
  button.sm{padding:4px 9px; font-size:12px;}
  button:disabled{opacity:.45; cursor:not-allowed;}

  input,select{
    font-family:'Noto Sans TC',sans-serif; font-size:13px;
    border:1px solid var(--line); border-radius:3px; padding:6px 8px;
    background:#fff; color:var(--ink);
  }
  input:focus,select:focus{outline:2px solid var(--brand); outline-offset:-1px;}
  input[type=number]{font-family:'Roboto Mono',monospace;}
  label{font-size:12px; color:var(--muted); display:block; margin-bottom:3px;}
  .field{margin-bottom:10px;}

  table{border-collapse:collapse; width:100%; background:var(--paper-2); font-size:12.5px;}
  th,td{border:1px solid var(--line); padding:6px 8px; text-align:right; white-space:nowrap;}
  th{background:#eef0e7; color:var(--brand-dark); font-weight:700; text-align:center;}
  td.left, th.left{text-align:left;}
  td input[type=number]{width:64px; text-align:right; padding:4px 5px;}
  tr.total-row td{background:#eef0e7; font-weight:700;}
  tr:hover td{background:#faf9f4;}
  .num-pos{color:var(--income);}
  .num-neg{color:var(--outcome);}

  .card{background:var(--paper-2); border:1px solid var(--line); border-radius:6px; padding:18px; margin-bottom:18px;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:0 18px;}
  .grid-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 18px;}
  .badge{
    display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px;
    background:#e4e9de; color:var(--brand-dark); font-weight:700;
  }
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px;}
  .toolbar .grow{flex:1;}
  .hint{font-size:11.5px; color:var(--muted); margin-top:4px;}
  .empty{padding:40px; text-align:center; color:var(--muted);}
  a.linklike{color:var(--brand); cursor:pointer; text-decoration:underline;}

  .payslip{
    background:#fff; border:1.5px solid var(--brand-dark); padding:18px 20px;
    max-width:640px; margin:0 auto 24px auto; page-break-after:always;
  }
  .payslip h2{font-size:15px; text-align:center; border-bottom:2px solid var(--brand-dark); padding-bottom:8px; margin-bottom:10px;}
  .payslip .meta{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:10px;}
  .payslip table{font-size:12px;}
  .payslip th{background:#eef0e7;}
  .payslip .grand{
    display:flex; justify-content:space-between; align-items:center;
    background:#eef0e7; padding:10px 14px; margin-top:10px; border-radius:4px;
    font-family:'Roboto Mono',monospace; font-size:16px; font-weight:700; color:var(--brand-dark);
  }
  .payslip .foot-note{font-size:11px; color:var(--muted); margin-top:10px;}

  .modal-bg{
    position:fixed; inset:0; background:rgba(20,26,20,.45);
    display:flex; align-items:flex-start; justify-content:center;
    padding:40px 16px; overflow:auto; z-index:50;
  }
  .modal{background:#fff; border-radius:6px; padding:22px 26px; width:640px; max-width:100%;}
  .modal h3{margin-bottom:14px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:16px; border-top:1px solid var(--line); padding-top:14px;}

  @media (max-width: 900px){
    .app-shell{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; overflow-x:auto; padding:10px;}
    .brand{display:none;}
    .navitem{border-left:none; border-bottom:3px solid transparent; white-space:nowrap;}
    .navitem.active{border-bottom-color:var(--accent);}
    .grid-2,.grid-3{grid-template-columns:1fr;}
  }

  @media print{
    .no-print{display:none !important;}
    .sidebar,.topbar,.toolbar{display:none !important;}
    body{background:#fff;}
    .content{padding:0;}
    .card{border:none; box-shadow:none;}
  }
</style>
</head>

function findInsurance(grade){
  if(!grade) return null;
  let exact = INSURANCE_TABLE.find(r => r.grade === Number(grade));
  if(exact) return exact;
  const sorted = [...INSURANCE_TABLE].sort((a,b)=>a.grade-b.grade);
  let candidate = sorted.find(r => r.grade >= Number(grade));
  return candidate || sorted[sorted.length-1];
}
function suggestGrade(salary){
  const s = Number(salary)||0;
  const sorted = [...INSURANCE_TABLE].filter(r=>r.grade>=11100).sort((a,b)=>a.grade-b.grade);
  const c = sorted.find(r => r.grade >= s);
  return c ? c.grade : sorted[sorted.length-1].grade;
}

function tenureText(hireDate){
  if(!hireDate) return '未設定到職日';
  const h = new Date(hireDate);
  if(isNaN(h.getTime())) return '到職日格式錯誤';
  const now = new Date();
  let months = (now.getFullYear()-h.getFullYear())*12 + (now.getMonth()-h.getMonth());
  if(now.getDate() < h.getDate()) months -= 1;
  const y = Math.floor(months/12), m = months%12;
  let leave = 0;
  const years = months/12;
  if(years >= 10) leave = Math.min(30, 15 + Math.floor(years-10));
  else if(years >= 5) leave = 15;
  else if(years >= 3) leave = 14;
  else if(years >= 2) leave = 10;
  else if(years >= 1) leave = 7;
  else if(months >= 6) leave = 3;
  return `到職年資約 ${y} 年 ${m} 個月，依勞基法第 38 條參考特休天數：約 ${leave} 天（僅供參考，請以實際規定核算）`;
}

function exportCSV(filename, headers, rows){
  const esc = v => '"' + String(v ?? '').replace(/"/g,'""') + '"';
  const lines = [headers.map(esc).join(',')].concat(rows.map(r=>r.map(esc).join(',')));
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ========================= 台灣勞基法相關常數（115年/2026年適用） ========================= */
const MIN_WAGE_MONTHLY = 29500;   // 每月最低工資（自2026/1/1起）
const MIN_WAGE_HOURLY = 196;      // 每小時最低工資（自2026/1/1起）
const MONTHLY_OT_CAP_DEFAULT = 46; // 平日延長工時月上限（可經工會/勞資會議同意延長至54，季上限138）

function emptyEntry(){
  return {
    otWeekday134:0, otWeekday167:0,      // 平日加班：前2hr 1.34倍／其後1.67倍
    otRestDayHours:0,                     // 休息日出勤總時數（依4/8/12hr級距自動算1.34/1.67/2.67倍）
    otHolidayHours:0,                     // 國定假日出勤時數（加發一日工資＋超過8hr比照平日加班費率）
    otMandatoryRestHours:0,               // 例假日出勤時數（原則禁止，僅天災事變等特殊狀況，2倍＋須補休）
    festivalBonus:0, yearEndBonus:0, otherBonus:0, performanceBonus:0,
    personalLeave:0, sickLeave:0, disasterLeave:0, otherLeave:0,
    annualLeaveSettlement:0,
    businessExpense:0, salesPerformance:0, otherExpense26:0, salesBonus26:0, deduction26:0,
    otherDeduction:0, note:''
  };
}

/* 休息日出勤：勞基法第24條第2項＋施行細則第20條之1 時數進位規則（4hr/8hr/12hr級距） */
function calcRestDayPay(hourly, hours){
  const h = n(hours);
  if(h<=0) return {pay:0, countedHours:0, overCap:false};
  const counted = h<=4 ? 4 : (h<=8 ? 8 : (h<=12 ? 12 : h));
  const t1 = Math.min(counted,2);
  const t2 = Math.min(Math.max(counted-2,0),6);
  const t3 = Math.max(counted-8,0);
  const pay = hourly*1.34*t1 + hourly*1.67*t2 + hourly*2.67*t3;
  return {pay, countedHours:counted, overCap: h>12};
}
/* 國定假日出勤：勞基法第37、39條，加發一日工資；超過8小時部分比照平日加班費率 */
function calcHolidayPay(hourly, dailyWage, hours){
  const h = n(hours);
  if(h<=0) return {pay:0};
  const base = dailyWage;
  const excess = Math.max(0, h-8);
  const ot134 = Math.min(excess,2);
  const ot167 = Math.max(excess-2,0);
  return {pay: base + hourly*1.34*ot134 + hourly*1.67*ot167};
}

/* ========================= 薪資計算核心 ========================= */
function calcForEmployee(emp, entryRaw){
  const entry = {...emptyEntry(), ...(entryRaw||{})};
  const base = n(emp.baseSalary);
  const hourly = base>0 ? base/240 : 0;
  const dailyWage = base>0 ? base/30 : 0;

  const weekdayOtPay = hourly*1.34*n(entry.otWeekday134) + hourly*1.67*n(entry.otWeekday167);
  const restDay = calcRestDayPay(hourly, entry.otRestDayHours);
  const holiday = calcHolidayPay(hourly, dailyWage, entry.otHolidayHours);
  const mandatoryRestPay = hourly*2*n(entry.otMandatoryRestHours);
  const overtimePay = weekdayOtPay + restDay.pay + holiday.pay + mandatoryRestPay;
  const monthlyOtHours = n(entry.otWeekday134) + n(entry.otWeekday167); // 46/54小時上限僅計平日加班

  const allowanceTotal = n(emp.mealAllowance)+n(emp.transportAllowance)+n(emp.positionAllowance)+n(emp.fullAttendanceBonus);
  const bonusTotal = n(entry.festivalBonus)+n(entry.yearEndBonus)+n(entry.otherBonus)+n(entry.performanceBonus);

  const payableA = base + allowanceTotal + bonusTotal + n(entry.annualLeaveSettlement);
  const payableTotal = payableA + overtimePay;

  const ins = findInsurance(emp.insuranceGrade);
  const laborFee = ins ? ins.empLabor : 0;
  const healthFee = ins ? ins.empHealth : 0;

  const leaveDeduct = hourly*1.0*n(entry.personalLeave) + hourly*0.5*n(entry.sickLeave) + hourly*0*n(entry.disasterLeave) + hourly*1.0*n(entry.otherLeave);
  const deductTotal = laborFee + healthFee + leaveDeduct + n(entry.otherDeduction);

  const pay06 = payableTotal - deductTotal;
  const pay26 = n(entry.businessExpense)+n(entry.salesPerformance)+n(entry.otherExpense26)+n(entry.salesBonus26)-n(entry.deduction26);
  const grandTotal = pay06 + pay26;

  const recurringPay = base + n(emp.mealAllowance)+n(emp.transportAllowance)+n(emp.positionAllowance); // 不含加班費、獎金、全勤（經常性但條件式），供最低工資比對參考
  const belowMinWage = base>0 && recurringPay < MIN_WAGE_MONTHLY;

  return {
    hourly, dailyWage, overtimePay, weekdayOtPay, restDayPay:restDay.pay, holidayPay:holiday.pay, mandatoryRestPay,
    restDayCountedHours: restDay.countedHours, restDayOverCap: restDay.overCap, monthlyOtHours,
    allowanceTotal, bonusTotal, payableA, payableTotal,
    laborFee, healthFee, leaveDeduct, deductTotal, pay06, pay26, grandTotal, belowMinWage
  };
}

const STORE_KEY = 'payroll_webapp_v1';
function loadStore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn('讀取本機儲存失敗', e); }
  return null;
}
function saveStore(data){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){ console.warn('寫入本機儲存失敗', e); }
}

        <div className="content">
          {tab==='employees' && <EmployeesTab employees={employees} setEmployees={setEmployees} />}
          {tab==='payroll' && <PayrollTab employees={activeEmployees} rows={rows} setEntry={setEntry} month={month} companyGroups={companyGroups} />}
          {tab==='attendance' && <AttendanceTab rows={rows} month={month} setEntry={setEntry} />}
          {tab==='payslip' && <PayslipTab employees={activeEmployees} monthEntries={monthEntries} month={month} />}
          {tab==='transfer' && <TransferTab rows={rows} month={month} />}
          {tab==='insurance' && <InsuranceTab />}
        </div>
      </div>
    </div>
  );
}

/* ========================= 員工資料 ========================= */
function EmployeesTab({employees, setEmployees}){
  const [editing, setEditing] = useState(null); // employee object or null
  const [isNew, setIsNew] = useState(false);

  function openNew(){
    setEditing({id:uid(), active:true, company:'', department:'', name:'', hireDate:'', insuranceGrade:0, baseSalary:0, mealAllowance:0, transportAllowance:0, positionAllowance:0, fullAttendanceBonus:0, bankName:'', bankAccount:'', note:''});
    setIsNew(true);
  }
  function openEdit(emp){ setEditing({...emp}); setIsNew(false); }
  function save(){
    if(!editing.name.trim()){ alert('請輸入姓名'); return; }
    setEmployees(prev => {
      if(isNew) return [...prev, editing];
      return prev.map(e => e.id===editing.id ? editing : e);
    });
    setEditing(null);
  }
  function remove(id){
    if(!confirm('確定要刪除這位員工的資料嗎？（歷史薪資紀錄仍會保留但不再顯示）')) return;
    setEmployees(prev => prev.filter(e=>e.id!==id));
  }
  function toggleActive(id){
    setEmployees(prev => prev.map(e => e.id===id ? {...e, active: e.active===false} : e));
  }

  const companies = [...new Set(employees.map(e=>e.company).filter(Boolean))];

  return (
    <div>
      <div className="toolbar">
        <button onClick={openNew}>＋ 新增員工</button>
        <span className="grow"></span>
        <span className="hint">共 {employees.length} 筆（含停用）</span>
      </div>

      {companies.length===0 && employees.length===0 && <div className="empty card">尚無員工資料，請點擊「＋ 新增員工」開始建立。</div>}

      {companies.concat(employees.some(e=>!e.company)?['(未分類)']:[]).map(co => (
        <div className="card" key={co}>
          <h3>{co} <span className="badge">{employees.filter(e=>(e.company||'(未分類)')===co).length} 人</span></h3>
          <table>
            <thead>
              <tr>
                <th className="left">狀態</th><th className="left">部門</th><th className="left">姓名</th><th>到職日</th>
                <th>投保級距</th><th>本薪</th><th>伙食</th><th>交通</th><th>職務加給</th><th>全勤</th><th className="left">銀行帳號</th><th>操作</th>
              </tr>
            </thead>
            <tbody>
              {employees.filter(e=>(e.company||'(未分類)')===co).map(emp=>(
                <tr key={emp.id} style={{opacity: emp.active===false ? 0.45 : 1}}>
                  <td className="left">{emp.active===false ? '停用' : '在職'}</td>
                  <td className="left">{emp.department}</td>
                  <td className="left"><b>{emp.name}</b></td>
                  <td>{emp.hireDate || '-'}</td>
                  <td>{emp.insuranceGrade || 0}</td>
                  <td>{money(emp.baseSalary)}</td>
                  <td>{money(emp.mealAllowance)}</td>
                  <td>{money(emp.transportAllowance)}</td>
                  <td>{money(emp.positionAllowance)}</td>
                  <td>{money(emp.fullAttendanceBonus)}</td>
                  <td className="left mono">{emp.bankAccount}</td>
                  <td>
                    <button className="ghost sm" onClick={()=>openEdit(emp)}>編輯</button>{' '}
                    <button className="ghost sm" onClick={()=>toggleActive(emp.id)}>{emp.active===false?'恢復':'停用'}</button>{' '}
                    <button className="danger sm" onClick={()=>remove(emp.id)}>刪除</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))}

      {editing && (
        <div className="modal-bg" onClick={(e)=>{ if(e.target===e.currentTarget) setEditing(null); }}>
          <div className="modal">
            <h3>{isNew ? '新增員工' : '編輯員工：' + editing.name}</h3>
            <div className="grid-2">
              <div className="field"><label>所屬公司</label><input list="co-list" value={editing.company} onChange={e=>setEditing({...editing, company:e.target.value})} placeholder="例：媽咪小站有限公司" />
                <datalist id="co-list">{companies.map(c=><option key={c} value={c} />)}</datalist>
              </div>
              <div className="field"><label>部門</label><input value={editing.department} onChange={e=>setEditing({...editing, department:e.target.value})} placeholder="例：業務部" /></div>
              <div className="field"><label>姓名 *</label><input value={editing.name} onChange={e=>setEditing({...editing, name:e.target.value})} /></div>
              <div className="field"><label>到職日</label><input type="date" value={editing.hireDate} onChange={e=>setEditing({...editing, hireDate:e.target.value})} /></div>

              <div className="field">
                <label>投保級距</label>
                <div style={{display:'flex', gap:6}}>
                  <select value={editing.insuranceGrade} onChange={e=>setEditing({...editing, insuranceGrade:Number(e.target.value)})} style={{flex:1}}>
                    <option value={0}>未設定</option>
                    {INSURANCE_TABLE.map(r=><option key={r.grade} value={r.grade}>{r.grade.toLocaleString()}</option>)}
                  </select>
                  <button type="button" className="ghost sm" onClick={()=>setEditing({...editing, insuranceGrade: suggestGrade(editing.baseSalary)})}>依本薪建議</button>
                </div>
              </div>
              <div className="field"><label>本薪</label><input type="number" value={editing.baseSalary} onChange={e=>setEditing({...editing, baseSalary:Number(e.target.value)})} /></div>

              <div className="field"><label>伙食津貼</label><input type="number" value={editing.mealAllowance} onChange={e=>setEditing({...editing, mealAllowance:Number(e.target.value)})} /></div>
              <div className="field"><label>交通津貼</label><input type="number" value={editing.transportAllowance} onChange={e=>setEditing({...editing, transportAllowance:Number(e.target.value)})} /></div>
              <div className="field"><label>職務加給</label><input type="number" value={editing.positionAllowance} onChange={e=>setEditing({...editing, positionAllowance:Number(e.target.value)})} /></div>
              <div className="field"><label>全勤獎金（固定）</label><input type="number" value={editing.fullAttendanceBonus} onChange={e=>setEditing({...editing, fullAttendanceBonus:Number(e.target.value)})} /></div>

              <div className="field"><label>銀行</label><input value={editing.bankName} onChange={e=>setEditing({...editing, bankName:e.target.value})} /></div>
              <div className="field"><label>銀行帳號</label><input value={editing.bankAccount} onChange={e=>setEditing({...editing, bankAccount:e.target.value})} /></div>
            </div>
            {editing.baseSalary>0 && (n(editing.baseSalary)+n(editing.mealAllowance)+n(editing.transportAllowance)+n(editing.positionAllowance)) < MIN_WAGE_MONTHLY && (
              <div className="hint" style={{color:'var(--danger)'}}>⚠ 本薪＋伙食＋交通＋職務加給合計 {money(n(editing.baseSalary)+n(editing.mealAllowance)+n(editing.transportAllowance)+n(editing.positionAllowance))} 元，低於2026年最低工資 {money(MIN_WAGE_MONTHLY)} 元，可能違反《最低工資法》（全勤獎金為條件式給予，不列入計算基準）</div>
            )}
            <div className="hint">依2026年新制，婚假、喪假、公假、產假、陪產假、生理假等法定假別不得作為扣發全勤獎金的理由，僅事假、遲到、曠工等得依公司規定扣發。</div>
            <div className="field"><label>備註</label><input value={editing.note} onChange={e=>setEditing({...editing, note:e.target.value})} style={{width:'100%'}} /></div>
            {editing.hireDate && <div className="hint">{tenureText(editing.hireDate)}</div>}
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setEditing(null)}>取消</button>
              <button onClick={save}>儲存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 薪資計算 / 明細總表 ========================= */
function NumCell({value, onChange}){
  return <input type="number" value={value} onChange={e=>onChange(Number(e.target.value))} />;
}

function PayrollTab({employees, rows, setEntry, month, companyGroups}){
  const importRef = useRef(null);
  function handleImportFile(ev){
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        const list = data.employees || [];
        let matched = 0, unmatched = [];
        list.forEach(item => {
          const emp = employees.find(e => e.name === item.name);
          if(!emp){ unmatched.push(item.name); return; }
          matched++;
          setEntry(emp.id, {
            otWeekday134: Number(item.otWeekday134)||0,
            otWeekday167: Number(item.otWeekday167)||0,
            otRestDayHours: Number(item.otRestDayHours)||0,
            otHolidayHours: Number(item.otHolidayHours)||0,
            otMandatoryRestHours: Number(item.otMandatoryRestHours)||0,
          });
        });
        let msg = `匯入完成，成功比對 ${matched} 位員工的加班時數（來源月份：${data.month||'未標示'}，套用到目前選擇的 ${month}）。`;
        if(unmatched.length) msg += `\n以下姓名在薪資系統中找不到對應員工，請確認姓名是否一致：${unmatched.join('、')}`;
        alert(msg);
      }catch(e){ alert('檔案格式錯誤，匯入失敗'); }
    };
    reader.readAsText(file);
    ev.target.value = '';
  }
  const totals = useMemo(()=>{
    const t = {base:0, overtime:0, allowance:0, bonus:0, payable:0, labor:0, health:0, leaveDeduct:0, otherDeduct:0, deduct:0, pay06:0, pay26:0, grand:0};
    rows.forEach(({emp, entry, calc})=>{
      t.base += n(emp.baseSalary);
      t.overtime += calc.overtimePay;
      t.allowance += calc.allowanceTotal;
      t.bonus += calc.bonusTotal;
      t.payable += calc.payableTotal;
      t.labor += calc.laborFee;
      t.health += calc.healthFee;
      t.leaveDeduct += calc.leaveDeduct;
      t.otherDeduct += n(entry.otherDeduction);
      t.deduct += calc.deductTotal;
      t.pay06 += calc.pay06;
      t.pay26 += calc.pay26;
      t.grand += calc.grandTotal;
    });
    return t;
  }, [rows]);

  const otCapAlerts = rows.filter(({calc})=>calc.monthlyOtHours > MONTHLY_OT_CAP_DEFAULT);
  const minWageAlerts = rows.filter(({calc})=>calc.belowMinWage);
  const restDayCapAlerts = rows.filter(({calc})=>calc.restDayOverCap);

  function doExport(){
    const headers = ['公司','部門','姓名','投保級距','本薪','平日加班費','休息日加班費','國定假日加班費','加班費合計','津貼合計','獎金合計','特休結算','應付小計','勞保自付','健保自付','請假扣款','其他扣款','應扣小計','06日應付','26日應付','應付總計'];
    const data = rows.map(({emp, entry, calc})=>[
      emp.company, emp.department, emp.name, emp.insuranceGrade, emp.baseSalary,
      Math.round(calc.weekdayOtPay), Math.round(calc.restDayPay), Math.round(calc.holidayPay), Math.round(calc.overtimePay),
      calc.allowanceTotal, calc.bonusTotal, n(entry.annualLeaveSettlement),
      Math.round(calc.payableTotal), calc.laborFee, calc.healthFee, Math.round(calc.leaveDeduct), n(entry.otherDeduction),
      Math.round(calc.deductTotal), Math.round(calc.pay06), Math.round(calc.pay26), Math.round(calc.grandTotal)
    ]);
    exportCSV(`薪資明細_${month}.csv`, headers, data);
  }

  return (
    <div>
      <div className="toolbar no-print">
        <span className="hint">加班費依勞基法第24條分類計算：平日前2hr 1.34倍／其後1.67倍；休息日依4/8/12小時級距算1.34/1.67/2.67倍；國定假日加發一日工資。請假扣款：事假100%、病假/生理假50%、災防假0%</span>
        <span className="grow"></span>
        <input ref={importRef} type="file" accept="application/json" style={{display:'none'}} onChange={handleImportFile} />
        <button className="ghost" onClick={()=>importRef.current.click()}>匯入出缺勤資料 (JSON)</button>
        <button className="ghost" onClick={()=>window.print()}>列印本頁</button>
        <button onClick={doExport}>匯出 CSV</button>
      </div>

      {(otCapAlerts.length>0 || minWageAlerts.length>0 || restDayCapAlerts.length>0) && (
        <div className="card no-print" style={{borderColor:'var(--danger)', background:'#fdf2f0'}}>
          <h3 style={{color:'var(--danger)', fontSize:14}}>⚠ 合規提醒</h3>
          {otCapAlerts.length>0 && <div className="hint">平日加班超過月上限 {MONTHLY_OT_CAP_DEFAULT} 小時：{otCapAlerts.map(r=>r.emp.name).join('、')}（依勞基法第32條，一般上限46小時，經工會或勞資會議同意可延長至54小時，但每3個月不得逾138小時；國定假日與例假加班不列入此上限）</div>}
          {restDayCapAlerts.length>0 && <div className="hint">休息日單日出勤超過12小時：{restDayCapAlerts.map(r=>r.emp.name).join('、')}，請確認是否合法並已依規定辦理</div>}
          {minWageAlerts.length>0 && <div className="hint">經常性給予（本薪＋伙食＋交通＋職務加給）低於2026年最低工資 {money(MIN_WAGE_MONTHLY)} 元：{minWageAlerts.map(r=>r.emp.name).join('、')}，請確認薪資結構是否合法（不含加班費、獎金與全勤獎金）</div>}
        </div>
      )}

      {rows.length===0 && <div className="empty card">尚無在職員工，請先至「員工資料」頁面新增。</div>}

      <div style={{overflowX:'auto'}}>
      <table>
        <thead>
          <tr>
            <th className="left" rowSpan="2">姓名 / 部門</th>
            <th rowSpan="2">本薪</th>
            <th colSpan="4">加班時數</th>
            <th rowSpan="2">加班費</th>
            <th colSpan="4">獎金</th>
            <th rowSpan="2">特休結算</th>
            <th rowSpan="2">應付小計</th>
            <th colSpan="4">請假時數</th>
            <th rowSpan="2">勞保</th>
            <th rowSpan="2">健保</th>
            <th rowSpan="2">其他扣款</th>
            <th rowSpan="2">應扣小計</th>
            <th rowSpan="2">06日應付</th>
            <th rowSpan="2">26日應付</th>
            <th rowSpan="2">應付總計</th>
          </tr>
          <tr>
            <th>平日1.34</th><th>平日1.67</th><th>休息日</th><th>國定假日</th>
            <th>三節</th><th>年終</th><th>績效</th><th>其他</th>
            <th>事假</th><th>病/生理</th><th>災防</th><th>其他</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(({emp, entry, calc})=>(
            <tr key={emp.id}>
              <td className="left"><b>{emp.name}</b><br/><span className="hint">{emp.department}</span></td>
              <td>{money(emp.baseSalary)}</td>
              <td><NumCell value={entry.otWeekday134} onChange={v=>setEntry(emp.id,{otWeekday134:v})} /></td>
              <td><NumCell value={entry.otWeekday167} onChange={v=>setEntry(emp.id,{otWeekday167:v})} /></td>
              <td><NumCell value={entry.otRestDayHours} onChange={v=>setEntry(emp.id,{otRestDayHours:v})} /></td>
              <td><NumCell value={entry.otHolidayHours} onChange={v=>setEntry(emp.id,{otHolidayHours:v})} /></td>
              <td className="num-pos">{money(calc.overtimePay)}</td>
              <td><NumCell value={entry.festivalBonus} onChange={v=>setEntry(emp.id,{festivalBonus:v})} /></td>
              <td><NumCell value={entry.yearEndBonus} onChange={v=>setEntry(emp.id,{yearEndBonus:v})} /></td>
              <td><NumCell value={entry.performanceBonus} onChange={v=>setEntry(emp.id,{performanceBonus:v})} /></td>
              <td><NumCell value={entry.otherBonus} onChange={v=>setEntry(emp.id,{otherBonus:v})} /></td>
              <td><NumCell value={entry.annualLeaveSettlement} onChange={v=>setEntry(emp.id,{annualLeaveSettlement:v})} /></td>
              <td className="num-pos"><b>{money(calc.payableTotal)}</b></td>
              <td><NumCell value={entry.personalLeave} onChange={v=>setEntry(emp.id,{personalLeave:v})} /></td>
              <td><NumCell value={entry.sickLeave} onChange={v=>setEntry(emp.id,{sickLeave:v})} /></td>
              <td><NumCell value={entry.disasterLeave} onChange={v=>setEntry(emp.id,{disasterLeave:v})} /></td>
              <td><NumCell value={entry.otherLeave} onChange={v=>setEntry(emp.id,{otherLeave:v})} /></td>
              <td>{money(calc.laborFee)}</td>
              <td>{money(calc.healthFee)}</td>
              <td><NumCell value={entry.otherDeduction} onChange={v=>setEntry(emp.id,{otherDeduction:v})} /></td>
              <td className="num-neg">{money(calc.deductTotal)}</td>
              <td>{money(calc.pay06)}</td>
              <td>
                <div style={{display:'flex', gap:3, flexWrap:'wrap', justifyContent:'flex-end'}}>
                  <NumCell value={entry.businessExpense} onChange={v=>setEntry(emp.id,{businessExpense:v})} />
                </div>
              </td>
              <td className="mono"><b>{money(calc.grandTotal)}</b></td>
            </tr>
          ))}
          <tr className="total-row">
            <td className="left">合計</td>
            <td>{money(totals.base)}</td>
            <td colSpan="4"></td>
            <td className="num-pos">{money(totals.overtime)}</td>
            <td colSpan="4"></td>
            <td></td>
            <td className="num-pos">{money(totals.payable)}</td>
            <td colSpan="4"></td>
            <td>{money(totals.labor)}</td>
            <td>{money(totals.health)}</td>
            <td></td>
            <td className="num-neg">{money(totals.deduct)}</td>
            <td>{money(totals.pay06)}</td>
            <td>{money(totals.pay26)}</td>
            <td className="mono">{money(totals.grand)}</td>
          </tr>
        </tbody>
      </table>
      </div>
      <div className="hint" style={{marginTop:8}}>「26日應付」欄位可於此表填入「業務費用」，完整的業績獎金／銷售獎金／扣款2 等 26 日發放項目請至「匯款明細表」頁籤內的明細編輯，或直接於此欄輸入業務費用做快速試算。</div>
    </div>
  );
}

                <td className="left">{tenureText(emp.hireDate)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

          <tr><td className="left">休息日出勤（{n(entry.otRestDayHours)} hr，計{calc.restDayCountedHours}hr）</td><td>{money(calc.restDayPay)}</td><td className="left"></td><td></td></tr>

function PayslipTab({employees, monthEntries, month}){
  const [selected, setSelected] = useState('all');
  const list = selected==='all' ? employees : employees.filter(e=>e.id===selected);
  return (
    <div>
      <div className="toolbar no-print">
        <label style={{marginBottom:0}}>選擇員工</label>
        <select value={selected} onChange={e=>setSelected(e.target.value)}>
          <option value="all">— 全部員工（可一次列印）—</option>
          {employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
        </select>
        <span className="grow"></span>
        <button onClick={()=>window.print()}>列印薪資條</button>
      </div>
      {list.length===0 && <div className="empty card">尚無員工資料</div>}
      {list.map(emp=>{
        const entry = monthEntries[emp.id] || emptyEntry();
        const calc = calcForEmployee(emp, entry);
        return <Payslip key={emp.id} emp={emp} entry={entry} calc={calc} month={month} />;
      })}
    </div>
  );
}

/* ========================= 匯款明細表 ========================= */
function TransferTab({rows, month}){
  const byCompany = useMemo(()=>{
    const g = {};
    rows.forEach(r => { (g[r.emp.company||'(未分類)'] = g[r.emp.company||'(未分類)']||[]).push(r); });
    return g;
  }, [rows]);

  function exportGroup(company, period, list){
    const headers = ['項次','姓名','銀行','帳號','金額','備註'];
    const data = list.map((r,idx)=>[idx+1, r.emp.name, r.emp.bankName, r.emp.bankAccount, Math.round(period==='06'?r.calc.pay06:r.calc.pay26), r.emp.note]);
    exportCSV(`匯款明細_${company}_${period}日_${month}.csv`, headers, data);
  }

  return (
    <div>
      <div className="toolbar no-print">
        <span className="hint">依公司與發薪日（06日／26日）分組列出應匯款人員與帳號，金額為 0 者仍會列出以利核對。</span>
        <span className="grow"></span>
        <button className="ghost" onClick={()=>window.print()}>列印全部</button>
      </div>

      {Object.keys(byCompany).length===0 && <div className="empty card">尚無資料</div>}

      {Object.entries(byCompany).map(([company, list])=>(
        <React.Fragment key={company}>
          {['06','26'].map(period=>{
            const active = list.filter(r => (period==='06'?r.calc.pay06:r.calc.pay26) !== 0);
            if(active.length===0) return null;
            const total = active.reduce((s,r)=>s+(period==='06'?r.calc.pay06:r.calc.pay26),0);
            return (
              <div className="card" key={company+period}>
                <div className="toolbar" style={{marginBottom:8}}>
                  <h3 style={{margin:0}}>{company} — {period}日 薪資轉帳明細表（{monthLabel(month)}）</h3>
                  <span className="grow"></span>
                  <button className="ghost sm no-print" onClick={()=>exportGroup(company, period, active)}>匯出 CSV</button>
                </div>
                <table>
                  <thead><tr><th>項次</th><th className="left">姓名</th><th className="left">銀行</th><th className="left">帳號</th><th>金額</th><th className="left">備註</th></tr></thead>
                  <tbody>
                    {active.map((r,idx)=>(
                      <tr key={r.emp.id}>
                        <td>{idx+1}</td>
                        <td className="left">{r.emp.name}</td>
                        <td className="left">{r.emp.bankName}</td>
                        <td className="left mono">{r.emp.bankAccount || '（未登錄帳號）'}</td>
                        <td className="mono">{money(period==='06'?r.calc.pay06:r.calc.pay26)}</td>
                        <td className="left">{r.emp.note}</td>
                      </tr>
                    ))}
                    <tr className="total-row"><td colSpan="4" className="left">總計</td><td className="mono">{money(total)}</td><td></td></tr>
                  </tbody>
                </table>
              </div>
            );
          })}
        </React.Fragment>
      ))}
    </div>
  );
}

<script>
(function(){
  function showError(msg){
    var box = document.getElementById('boot-error');
    if(box){ box.style.display='block'; box.textContent = msg; }
  }
  window.addEventListener('error', function(e){
    showError('頁面發生錯誤：' + (e.message||e.error) + '\n(檔案:' + (e.filename||'') + ' 行:' + (e.lineno||'') + ')');
  });
  window.addEventListener('unhandledrejection', function(e){
    showError('未處理的錯誤：' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  function loadScript(src){
    return new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = function(){ reject(new Error(src + ' 載入失敗')); };
      document.head.appendChild(s);
    });
  }
  function loadWithFallback(urls, idx){
    idx = idx || 0;
    if(idx >= urls.length) return Promise.reject(new Error('所有來源皆載入失敗：' + urls.join(' / ')));
    return loadScript(urls[idx]).catch(function(){ return loadWithFallback(urls, idx+1); });
  }

  var CDN = {
    react: ['https://unpkg.com/react@18/umd/react.production.min.js', 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'],
    reactDom: ['https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'],
    babel: ['https://unpkg.com/@babel/standalone/babel.min.js', 'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js']
  };

  loadWithFallback(CDN.react)
    .then(function(){ return loadWithFallback(CDN.reactDom); })
    .then(function(){ return loadWithFallback(CDN.babel); })
    .then(function(){
      var src = document.getElementById('app-src').textContent;
      var compiled = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
      var statusEl = document.getElementById('boot-status');
      if(statusEl) statusEl.remove();
      (0, eval)(compiled);
    })
    .catch(function(err){
      showError('必要程式庫載入失敗，畫面因此空白。\n原因：' + err.message + '\n\n最常見情況：瀏覽器擴充功能（例如廣告攔截／隱私保護外掛）封鎖了 unpkg.com 或 jsdelivr.net，或目前網路無法連線到這兩個網域。\n\n請嘗試：\n1. 停用廣告攔截類擴充功能後重新整理本頁\n2. 改用無痕視窗開啟同一網址測試\n3. 確認網路能連上 unpkg.com 與 cdn.jsdelivr.net');
    });
})();
</script>
