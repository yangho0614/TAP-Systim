<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>後台管理 · 出缺勤與薪資系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root{
    --ink:#22242C; --paper:#F2F2F2; --paper-2:#ffffff; --line:#DCDCDC;
    --brand:#00ADB5; --brand-dark:#222831; --accent:#00ADB5; --danger:#a13d3d; --muted:#6D7278;
    --income:#00858C; --outcome:#a13d3d;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Noto Sans TC',sans-serif; font-size:14px;}
  h1,h2,h3{font-family:'Noto Sans TC',sans-serif; font-weight:700; margin:0 0 6px 0;}
  .mono{font-family:'Roboto Mono',monospace;}
  .material-icons{font-size:19px; vertical-align:middle; line-height:1;}
  .app-shell{display:flex; min-height:100vh;}
  .sidebar{width:212px; flex-shrink:0; background:var(--brand-dark); color:#EEEEEE; padding:22px 0; display:flex; flex-direction:column;}
  .brand{padding:0 18px 18px 18px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:10px;}
  .brand .mark{font-family:'Noto Sans TC',sans-serif; font-size:19px; font-weight:700; color:#f3ead3;}
  .brand .sub{font-size:11px; color:#b9c9bf; margin-top:2px;}
  .navitem{padding:10px 18px; cursor:pointer; font-size:13px; border-left:3px solid transparent; color:#d9dfd5; display:flex; align-items:center; gap:9px;}
  .navitem:hover{background:rgba(255,255,255,.06);}
  .navitem.active{background:rgba(255,255,255,.1); border-left-color:var(--accent); color:#fff; font-weight:700;}
  .navitem .material-icons{font-size:18px; color:#A6ACB3;}
  .navitem.active .material-icons{color:var(--accent);}
  .nav-group-label{padding:14px 18px 4px 18px; font-size:10.5px; letter-spacing:1px; color:#8fa397; text-transform:uppercase;}
  .sidebar{transition:width .18s ease;}
  .sidebar.collapsed{width:64px;}
  .sidebar.collapsed .navitem{justify-content:center; padding:12px 0; gap:0;}
  .sidebar.collapsed .navitem .material-icons{font-size:21px;}
  .main{flex:1; min-width:0;}
  .topbar{background:var(--paper-2); border-bottom:1px solid var(--line); padding:12px 26px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;}
  .topbar h1{font-size:17px; display:flex; align-items:center; gap:8px;}
  .content{padding:22px 26px 60px 26px; overflow-x:auto;}
  button{font-size:13px; background:var(--brand); color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  button:hover{background:var(--brand-dark);}
  button.ghost{background:transparent; color:var(--brand); border:1px solid var(--brand);}
  button.ghost:hover{background:var(--brand); color:#fff;}
  button.danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  button.danger:hover{background:var(--danger); color:#fff;}
  button.sm{padding:4px 9px; font-size:12px;}
  button.icon-btn{background:transparent; color:var(--muted); padding:5px; border-radius:50%;}
  button.icon-btn:hover{background:#EDEDED; color:var(--brand-dark);}
  button:disabled{opacity:.45; cursor:not-allowed;}
  input,select{font-size:13px; border:1px solid var(--line); border-radius:6px; padding:7px 9px; background:#fff; color:var(--ink);}
  input[type=number]{font-family:'Roboto Mono',monospace;}
  input[type=date]::-webkit-calendar-picker-indicator{ margin-right:2px; padding:3px; }
  label{font-size:12px; color:var(--muted); display:block; margin-bottom:3px;}
  .field{margin-bottom:10px;}
  .field>input,.field>select{width:100%; box-sizing:border-box;}
  table{border-collapse:collapse; width:100%; background:var(--paper-2); font-size:12.5px;}
  thead{position:sticky; top:0; z-index:2;}
  th,td{border:1px solid var(--line); padding:6px 8px; text-align:right; white-space:nowrap;}
  th{background:#EDEDED; color:var(--brand-dark); text-align:center;}
  td.left,th.left{text-align:left;}
  td.center,th.center{text-align:center;}
  td input[type=number]{width:64px; text-align:right; padding:4px 5px;}
  tr.total-row td{background:#EDEDED; font-weight:700;}
  .num-pos{color:var(--income);}
  .num-neg{color:var(--outcome);}
  .freeze-1, .freeze-2{ position:sticky; z-index:3; background:#F2F0E8; }
  .freeze-1{ left:0; min-width:85px; }
  .freeze-2{ left:85px; min-width:80px; border-right:2px solid var(--brand); }
  th.freeze-1, th.freeze-2{ z-index:4; background:#EDEDED; }
  tr.total-row .freeze-1, tr.total-row .freeze-2{ background:#EDEDED; }
  .reg-freeze-1, .reg-freeze-2{ position:sticky; z-index:3; background:#F2F0E8; }
  .reg-freeze-1{ left:0; min-width:150px; max-width:150px; white-space:normal; text-align:center; vertical-align:middle; border-top:none; border-bottom:none; }
  .reg-freeze-2{ left:150px; min-width:90px; border-right:2px solid var(--brand); }
  th.reg-freeze-2{ z-index:4; background:#EDEDED; }
  .col-add{background:#EAF6ED;}
  .col-deduct{background:#FBEDEA;}
  .col-result{background:#FBF3D9; font-weight:700;}
  thead .col-add{background:#CDEAD4;}
  thead .col-deduct{background:#F5D6CE;}
  thead .col-result{background:#F3E0A0;}
  .card{background:var(--paper-2); border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:18px;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:0 18px;}
  .badge{display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:2px 9px; border-radius:20px; background:#D6F1F2; color:var(--brand-dark); font-weight:700;}
  .badge.warn{background:#f6d9ce; color:#7a3b1e;}
  .badge .material-icons{font-size:13px;}
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px;}
  .toolbar .grow{flex:1;}
  .hint{font-size:11.5px; color:var(--muted); margin-top:4px;}
  .row-between{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .empty{padding:40px; text-align:center; color:var(--muted);}
  .modal-bg{position:fixed; inset:0; background:rgba(20,26,20,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; z-index:50;}
  .modal{background:#fff; border-radius:10px; padding:22px 26px; width:640px; max-width:100%;}
  .modal h3{margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:16px; border-top:1px solid var(--line); padding-top:14px;}
  .config-warn{background:#3a2317; border:1px solid #6b4326; color:#f0caa0; padding:14px 18px; border-radius:10px; max-width:640px; font-size:13px; margin-bottom:20px;}
  .config-warn code{background:#00000030; padding:1px 5px; border-radius:3px;}
  .flag{color:var(--danger); font-weight:700;}

  .payslip{
    background:#fff; border:1.5px solid var(--brand-dark); padding:18px 20px;
    max-width:640px; margin:0 auto 24px auto; page-break-after:always;
  }
  .payslip h2{font-size:15px; text-align:center; border-bottom:2px solid var(--brand-dark); padding-bottom:8px; margin-bottom:10px;}
  .payslip .meta{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:10px;}
  .payslip table{font-size:12px;}
  .payslip th{background:#EDEDED;}
  .payslip .grand{
    display:grid; grid-template-columns:1fr 1fr 1.2fr; gap:10px;
    background:#EDEDED; padding:10px 14px; margin-top:10px; border-radius:4px;
  }
  .payslip .grand-item{display:flex; flex-direction:column; align-items:center; gap:2px;}
  .payslip .grand-label{font-size:11.5px; color:var(--muted);}
  .payslip .grand-num{font-family:'Roboto Mono',monospace; font-size:15px; font-weight:700; color:var(--brand-dark);}
  .payslip .grand-total{border-left:1px solid var(--line); padding-left:10px;}
  .payslip .grand-total .grand-num{font-size:18px; color:var(--brand);}
  .payslip .foot-note{font-size:11px; color:var(--muted); margin-top:10px;}

  /* 登入畫面 */
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% -10%, #282E38, #1a1e24 65%);
    padding:20px;
  }
  .login-card{
    background:#fff; border-radius:14px; padding:38px 34px; width:360px; max-width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,.35); text-align:center;
  }
  .login-card .mark-icon{
    width:52px; height:52px; border-radius:14px; background:var(--brand); color:#fff;
    display:flex; align-items:center; justify-content:center; margin:0 auto 14px auto;
  }
  .login-card h2{font-size:17px; margin-bottom:4px;}
  .login-card .sub{font-size:12px; color:var(--muted); margin-bottom:22px;}
  .login-card .field{text-align:left;}
  .login-card input{width:100%; padding:11px 12px;}
  .login-card button{width:100%; justify-content:center; padding:11px 0; font-size:14px; margin-top:6px;}
  .login-card .err{color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px;}

  @media print{
    .no-print{display:none !important;}
    .sidebar,.topbar,.toolbar{display:none !important;}
    body{background:#fff;}
    .content{padding:0;}
    .card{border:none;}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-status" style="padding:60px 20px;text-align:center;color:#6b7268;font-family:sans-serif;font-size:13px;">頁面載入中，請稍候...</div>
<div id="boot-error" style="display:none; position:fixed; left:12px; right:12px; bottom:12px; max-width:640px; margin:0 auto; background:#3a1717; color:#fbd7d0; border:1px solid #7a3b34; padding:14px 18px; border-radius:8px; font-size:12px; font-family:monospace; white-space:pre-wrap; z-index:9999;"></div>

<script type="text/plain" id="app-src">
const {useState, useEffect, useMemo, useRef} = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzW7073VQtPGa9cIn-pBNdfLClDdkEn8eBGVzDSkv26ZZWiHGcD5wikhx7KL5l4mlsC/exec';
const TOKEN_KEY = 'admin_session_token';

let CURRENT_TOKEN = null;
try{ CURRENT_TOKEN = localStorage.getItem(TOKEN_KEY) || null; }catch(e){}
function setToken(t){
  CURRENT_TOKEN = t;
  try{ if(t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }catch(e){}
}
function isSessionError(msg){
  return typeof msg === 'string' && (msg.indexOf('登入已逾時') !== -1 || msg.indexOf('請先登入') !== -1);
}
function forceReLogin(){
  setToken(null);
  try{ location.reload(); }catch(e){}
}

// 連線失敗自動重試1次，避免手機瀏覽器偶發的網路中斷（例如冷啟動、切背景）就直接跳錯誤訊息
async function fetchWithRetry(url, options, retries=1, delayMs=1000){
  for(let i=0; i<=retries; i++){
    try{ return await fetch(url, options); }
    catch(e){ if(i===retries) throw e; await new Promise(r=>setTimeout(r, delayMs)); }
  }
}
async function apiGet(action, params={}){
  const qs = new URLSearchParams({action, token: CURRENT_TOKEN||'', ...params}).toString();
  const res = await fetchWithRetry(`${GAS_URL}?${qs}`);
  const json = await res.json();
  if(json.status !== 'success'){
    if(isSessionError(json.message)) forceReLogin();
    throw new Error(json.message || '發生錯誤');
  }
  return json.data;
}
async function apiPost(action, body={}){
  const res = await fetchWithRetry(GAS_URL, {method:'POST', body: JSON.stringify({action, token: CURRENT_TOKEN, ...body})});
  const json = await res.json();
  if(json.status !== 'success'){
    if(isSessionError(json.message)) forceReLogin();
    throw new Error(json.message || '發生錯誤');
  }
  return json.data;
}
function todayMonth(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(m){
  if(!m) return '';
  const [y,mo] = m.split('-');
  return y + '年' + Number(mo) + '月';
}
function exportCSV(filename, headers, rows){
  const esc = v => '"' + String(v ?? '').replace(/"/g,'""') + '"';
  const lines = [headers.map(esc).join(',')].concat(rows.map(r=>r.map(esc).join(',')));
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}
const n = v => { const x = Number(v); return isNaN(x) ? 0 : x; };
const money = v => Math.round(n(v)).toLocaleString('zh-TW');
function isAbnormalStatus(status){
  const s = String(status||'');
  return s.indexOf('超出')===0 || s.indexOf('遲到')===0 || s.indexOf('早退')===0 || s.indexOf('未取得定位')===0 || s.indexOf('未設定地理圍籬')===0;
}
function stripHtml(html){
  if(!html) return '';
  const div = document.createElement('div');
  div.innerHTML = html;
  return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
}
// 公告內容裡用「插入連結」做出來的<a>標籤，預設沒有target屬性；顯示前統一補上，確保一律開新視窗
function linkifyBlank(html){
  if(!html) return html;
  return html.replace(/<a\s+(?![^>]*target=)/gi, '<a target="_blank" rel="noopener noreferrer" ');
}
const CATEGORY_COLORS = ['#00ADB5', '#4f9b6f', '#c05a4f', '#5b8db8', '#8b6fa8', '#c98a4b'];
const NOTE_PRESETS = ['員工忘記打卡，已口頭確認時間', '設備／網路異常，事後補登', '主管同意調整'];
/* ⚠️ 地址轉座標（地理編碼）需要 Google Cloud 專案裡另外啟用「Geocoding API」，跟地圖顯示是不同服務 */
const GOOGLE_MAPS_API_KEY = 'AIzaSyCTj0NrEzqJPLXWG8ct7FQfJ1Q0CeAcKoA';
async function geocodeAddress(address){
  if(!address || !address.trim()) throw new Error('請輸入地址');
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address.trim())}&key=${GOOGLE_MAPS_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.status !== 'OK' || !data.results || !data.results[0]){
    if(data.status === 'REQUEST_DENIED') throw new Error('地址查詢失敗：Google的「Geocoding API」可能還沒啟用，請到 Google Cloud Console 開啟後再試');
    if(data.status === 'ZERO_RESULTS') throw new Error('查無此地址，請確認地址是否正確');
    throw new Error('地址查詢失敗（' + data.status + '）');
  }
  const loc = data.results[0].geometry.location;
  return { lat: loc.lat, lng: loc.lng, formattedAddress: data.results[0].formatted_address };
}
// 共用的「輸入地址→查詢座標」元件，供地理圍籬設定跟打卡補登/修改共用
function AddressGeocodeField({lat, lng, onFound}){
  const [address, setAddress] = useState('');
  const [loading, setLoading] = useState(false);
  async function doSearch(){
    setLoading(true);
    try{
      const r = await geocodeAddress(address);
      onFound(r.lat, r.lng, r.formattedAddress);
    }catch(e){ alert(e.message); }
    finally{ setLoading(false); }
  }
  return (
    <div className="field">
      <label>地址（輸入後自動查詢座標，不用手動查GPS）</label>
      <div style={{display:'flex', gap:8}}>
        <input value={address} onChange={e=>setAddress(e.target.value)} placeholder="例如：台中市南屯區文心路一段100號" style={{flex:1}} onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); doSearch(); } }} />
        <button type="button" className="ghost sm" onClick={doSearch} disabled={loading}>{loading?'查詢中...':'查詢座標'}</button>
      </div>
      {lat && lng && <div className="hint" style={{marginTop:4}}>目前座標：{Number(lat).toFixed(6)}, {Number(lng).toFixed(6)}</div>}
    </div>
  );
}
function attachIcon(name){
  const s = String(name||'').toLowerCase();
  if(s.endsWith('.pdf')) return 'picture_as_pdf';
  if(s.endsWith('.doc') || s.endsWith('.docx')) return 'description';
  if(s.endsWith('.xls') || s.endsWith('.xlsx')) return 'table_chart';
  if(s.endsWith('.ppt') || s.endsWith('.pptx')) return 'slideshow';
  return 'insert_drive_file';
}
function fileSizeText(bytes){
  if(!bytes) return '';
  if(bytes < 1024*1024) return Math.round(bytes/1024) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}
function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(String(reader.result).split(',')[1]);
    reader.onerror = ()=>reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}
// 數字格式化到指定小數位，但小數是0就不顯示（例如22.0→22，17.5維持17.5）
function trimNum(v, decimals){
  const num = Number(v)||0;
  const fixed = num.toFixed(decimals);
  return fixed.replace(/\.?0+$/, '') || '0';
}
// 西元日期字串轉民國年份標示，例如 2023-09-25 → (民國112年) 2023-09-25
function rocDate(dateStr){
  if(!dateStr) return '';
  const y = Number(String(dateStr).slice(0,4));
  if(!y) return dateStr;
  return `(民國${y-1911}年) ${dateStr}`;
}
function tenureShortText(hireDate, breakStart, breakEnd){
  if(!hireDate) return '-';
  let h = new Date(hireDate);
  if(isNaN(h.getTime())) return '-';
  if(breakStart && breakEnd){
    const [by,bm] = String(breakStart).split('-').map(Number);
    const [ey,em] = String(breakEnd).split('-').map(Number);
    if(by && bm && ey && em){
      const breakMonths = (ey-by)*12 + (em-bm) + 1;
      if(breakMonths > 0) h = new Date(h.setMonth(h.getMonth()+breakMonths));
    }
  }
  const now = new Date();
  let months = (now.getFullYear()-h.getFullYear())*12 + (now.getMonth()-h.getMonth());
  if(now.getDate() < h.getDate()) months -= 1;
  months = Math.max(0, months);
  const y = Math.floor(months/12), m = months%12;
  return y>0 ? `${y}年${m}個月` : `${m}個月`;
}
function tenureText(hireDate, breakStart, breakEnd){
  if(!hireDate) return '未設定到職日';
  let h = new Date(hireDate);
  if(isNaN(h.getTime())) return '到職日格式錯誤';
  let breakNote = '';
  if(breakStart && breakEnd){
    const [by,bm] = String(breakStart).split('-').map(Number);
    const [ey,em] = String(breakEnd).split('-').map(Number);
    if(by && bm && ey && em){
      const breakMonths = (ey-by)*12 + (em-bm) + 1;
      if(breakMonths > 0){
        h = new Date(h); h.setMonth(h.getMonth()+breakMonths);
        const by2 = Math.floor(breakMonths/12), bm2 = breakMonths%12;
        breakNote = `（已扣除中斷${by2>0?by2+'年':''}${bm2>0?bm2+'個月':''}）`;
      }
    }
  }
  const now = new Date();
  let months = (now.getFullYear()-h.getFullYear())*12 + (now.getMonth()-h.getMonth());
  if(now.getDate() < h.getDate()) months -= 1;
  months = Math.max(0, months);
  const y = Math.floor(months/12), m = months%12;
  let leave = 0;
  const years = months/12;
  if(years >= 10) leave = Math.min(30, 16 + Math.floor(years-10));
  else if(years >= 5) leave = 15;
  else if(years >= 3) leave = 14;
  else if(years >= 2) leave = 10;
  else if(years >= 1) leave = 7;
  else if(months >= 6) leave = 3;
  return `到職年資約 ${y} 年 ${m} 個月${breakNote}，依勞基法第 38 條參考特休天數：約 ${leave} 天（僅供參考，請以實際規定核算）`;
}

  let exact = INSURANCE_TABLE.find(r => r.grade === Number(grade));
  if(exact) return exact;
  const sorted = [...INSURANCE_TABLE].sort((a,b)=>a.grade-b.grade);
  let candidate = sorted.find(r => r.grade >= Number(grade));
  return candidate || sorted[sorted.length-1];
}
function suggestGrade(salary){
  const s = Number(salary)||0;
  const sorted = [...INSURANCE_TABLE].filter(r=>r.grade>=11100).sort((a,b)=>a.grade-b.grade);

  return c ? c.grade : sorted[sorted.length-1].grade;
}

function calcRestDayPay(hourly, hours){
  const h = n(hours);
  if(h<=0) return {pay:0, countedHours:0, overCap:false};
  const counted = h<=4 ? 4 : (h<=8 ? 8 : (h<=12 ? 12 : h));
  const t1 = Math.min(counted,2);
  const t2 = Math.min(Math.max(counted-2,0),6);
  const t3 = Math.max(counted-8,0);
  const pay = hourly*1.34*t1 + hourly*1.67*t2 + hourly*2.67*t3;
  return {pay, countedHours:counted, overCap: h>12};
}
function calcHolidayPay(hourly, dailyWage, hours){
  const h = n(hours);
  if(h<=0) return {pay:0};
  const excess = Math.max(0, h-8);
  const ot134 = Math.min(excess,2);
  const ot167 = Math.max(excess-2,0);
  return {pay: dailyWage + hourly*1.34*ot134 + hourly*1.67*ot167};
}
function calcMandatoryRestPay(hourly, dailyWage, hours, mode){
  const h = n(hours);
  if(h<=0) return 0;
  if(mode === 'legal'){
    return calcHolidayPay(hourly, dailyWage, h).pay; // 依勞基法：加發一日工資＋超過8小時比照平日加班費
  }
  return hourly*2*h; // 優於勞基法：時薪×2
}

function getInsuranceStatusForMonth(hireDate, resignDate, month){
  const parts = String(month||'').split('-').map(Number);
  const y = parts[0], m = parts[1];
  if(!y || !m) return {laborDays:30, activeAtMonthEnd:true, fullMonth:true};
  const monthStart = new Date(y, m-1, 1);
  const monthEnd = new Date(y, m, 0);
  let start = monthStart;
  if(hireDate){ const h = new Date(hireDate); if(!isNaN(h.getTime()) && h>monthStart) start = h; }
  let end = monthEnd;
  let activeAtMonthEnd = true;
  if(resignDate){ const r = new Date(resignDate); if(!isNaN(r.getTime()) && r<monthEnd){ end = r; activeAtMonthEnd = false; } }
  if(start>end) return {laborDays:0, activeAtMonthEnd:false, fullMonth:false};
  const laborDays = Math.floor((end-start)/86400000)+1;
  const fullMonth = (start.getTime()===monthStart.getTime()) && (end.getTime()===monthEnd.getTime());
  return {laborDays, activeAtMonthEnd, fullMonth};
}

  const payableA = base + bonusTotal + n(entry.annualLeaveSettlement) + fullAttendanceAdjustment;
  const payableTotal = payableA + overtimePay;


  const MENSTRUAL_FULL_PAY_HOURS = 24; // 每年前3天(以8hr/天計)生理假全薪
  const SICK_LEAVE_ANNUAL_CAP_HOURS = 240; // 病假年度30天(以8hr/天計)上限，生理假超過3天部分需併入計算
  const menstrualUsedBefore = n(leaveBaseline && leaveBaseline.menstrual);
  const sickUsedBefore = n(leaveBaseline && leaveBaseline.sick);
  const remainFullPay = Math.max(0, MENSTRUAL_FULL_PAY_HOURS - menstrualUsedBefore);
  const menstrualPaidHours = Math.min(n(entry.menstrualLeave), remainFullPay);
  const menstrualOverageThisMonth = n(entry.menstrualLeave) - menstrualPaidHours;

  // 病假＋生理假(超過3天部分)共用年度30天上限；超過部分不給薪(0%)，未超過部分半薪(50%)
  const menstrualOverageBefore = Math.max(0, menstrualUsedBefore - MENSTRUAL_FULL_PAY_HOURS);
  const combinedUsedBefore = sickUsedBefore + menstrualOverageBefore;
  let sickCapRemaining = Math.max(0, SICK_LEAVE_ANNUAL_CAP_HOURS - combinedUsedBefore);
  const sickHalfPayHours = Math.min(n(entry.sickLeave), sickCapRemaining);
  const sickUnpaidHours = n(entry.sickLeave) - sickHalfPayHours;
  sickCapRemaining = Math.max(0, sickCapRemaining - sickHalfPayHours);
  const menstrualHalfPayHours = Math.min(menstrualOverageThisMonth, sickCapRemaining);
  const menstrualUnpaidHours = menstrualOverageThisMonth - menstrualHalfPayHours;
  const menstrualHalfHours = menstrualOverageThisMonth; // 沿用舊欄位名稱：本月生理假超過3天(全薪)的部分小時數
  const sickCapExceeded = (sickUnpaidHours + menstrualUnpaidHours) > 0;

  const leaveDeduct = hourly*1.0*n(entry.personalLeave)
    + hourly*0.5*sickHalfPayHours + hourly*1.0*sickUnpaidHours
    + hourly*0.5*menstrualHalfPayHours + hourly*1.0*menstrualUnpaidHours
    + hourly*0*n(entry.disasterLeave) + hourly*1.0*n(entry.otherLeave);
  const deductTotal = laborFee + healthFee + leaveDeduct + n(entry.otherDeduction);

  const pay06 = payableTotal - deductTotal;
  const pay26 = n(entry.businessExpense)+n(entry.salesPerformance)+n(entry.otherExpense26)+n(entry.salesBonus26)-n(entry.deduction26);
  const grandTotal = pay06 + pay26;

  const recurringPay = base; // 本薪已包含伙食/交通/職務加給，不重複相加
  const belowMinWage = base>0 && recurringPay < MIN_WAGE_MONTHLY;

  return {
    hourly, dailyWage, overtimePay, weekdayOtPay, restDayPay:restDay.pay, holidayPay:holiday.pay, mandatoryRestPay,
    restDayCountedHours: restDay.countedHours, restDayOverCap: restDay.overCap, monthlyOtHours,
    allowanceTotal, bonusTotal, payableA, payableTotal,
    laborFee, healthFee, leaveDeduct, deductTotal, menstrualPaidHours, menstrualHalfHours,
    sickHalfPayHours, sickUnpaidHours, menstrualHalfPayHours, menstrualUnpaidHours, sickCapExceeded,
    pay06, pay26, grandTotal, belowMinWage,
    insLaborDays: insStatus.laborDays, insFullMonth: insStatus.fullMonth, insActiveAtMonthEnd: insStatus.activeAtMonthEnd,
    locked: isLocked, effBaseSalary: base, effMealAllowance: effMeal, effTransportAllowance: effTransport,
    effPositionAllowance: effPosition, effFullAttendanceBonus: effFullAttendance,
    fullAttendanceDeductRatio, fullAttendanceRatio, fullAttendanceAdjusted: adjustedFullAttendance, fullAttendanceAdjustment
  };
}

function LoginScreen({onLoggedIn, storeName}){
  const [account, setAccount] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(ev){
    ev.preventDefault();
    setErr(''); setLoading(true);
    try{
      const data = await apiPost('login', {account, password});
      if(data.role !== 'admin'){ setErr('此帳號沒有後台管理權限'); setLoading(false); return; }
      setToken(data.token);
      onLoggedIn(data);
    }catch(e){ setErr(e.message); }
    finally{ setLoading(false); }
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="mark-icon"><span className="material-icons" style={{fontSize:28}}>admin_panel_settings</span></div>
        <h2>後台管理登入</h2>
        <div className="sub">{storeName || '出缺勤與薪資系統'}</div>
        <form onSubmit={submit}>
          <div className="field">
            <label>帳號</label>
            <input value={account} onChange={e=>setAccount(e.target.value)} autoFocus />
          </div>
          <div className="field">
            <label>密碼</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} />
          </div>
          <button type="submit" disabled={loading}>
            <span className="material-icons" style={{fontSize:18}}>login</span>
            {loading ? '登入中...' : '登入'}
          </button>
          <div className="err">{err}</div>
        </form>
      </div>
    </div>
  );
}

// 年份/月份兩段式下拉選單，取代原生 <input type="month">（避免行動裝置瀏覽器渲染不一致）
function YearMonthPicker({value, onChange}){
  const [y, m] = value.split('-');
  const thisYear = new Date().getFullYear();
  const years = [];
  for(let yy = thisYear + 1; yy >= thisYear - 5; yy--) years.push(String(yy));
  return (
    <div style={{display:'flex', gap:6}}>
      <select value={y} onChange={e=>onChange(e.target.value+'-'+m)}>
        {years.map(yy=><option key={yy} value={yy}>{yy}年</option>)}
      </select>
      <select value={m} onChange={e=>onChange(y+'-'+e.target.value)}>
        {Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0')).map(mm=><option key={mm} value={mm}>{Number(mm)}月</option>)}
      </select>
    </div>
  );
}

      setMenstrualBaseline(map);

      setMenstrualBaseline(map);

        });

  }), [employees, payrollEntries, settings, menstrualBaseline, month]);

  const needsMonth = ['records','requests','attendance','payroll','payslip','transfer'].includes(tab);

              <div className={'navitem'+(tab===item.id?' active':'')} onClick={()=>setTab(item.id)} title={sidebarCollapsed?item.label:''}>
                <span className="material-icons">{item.icon}</span>{!sidebarCollapsed && item.label}

        <div style={{padding:'14px 18px', marginTop:'auto', display:'flex', flexDirection:'column', gap:8}}>

            <span className="material-icons" style={{fontSize:16}}>logout</span>{!sidebarCollapsed && '登出'}
          </button>

      <div className="main">
        <div className="topbar">
          <h1><span className="material-icons">{NAV.find(x=>x.id===tab)?.icon}</span>{NAV.find(x=>x.id===tab)?.label}</h1>
          <div style={{display:'flex', gap:10, alignItems:'center'}}>
            {dirty && <span className="badge warn"><span className="material-icons">warning</span>尚有未儲存的薪資異動</span>}
            {needsMonth && (
              <>
                <label style={{marginBottom:0}}>月份</label>

          </div>
          <div className="field"><label>姓名 *</label><input value={editing.name} onChange={e=>setEditing({...editing, name:e.target.value})} /></div>
          <div className="field"><label>手機</label><input value={editing.phone} onChange={e=>setEditing({...editing, phone:e.target.value})} placeholder="09xxxxxxxx" /></div>
          <div className="field"><label>身分證字號</label><input value={editing.nationalId} onChange={e=>setEditing({...editing, nationalId:e.target.value})} placeholder="A123456789" /></div>
          <div className="field"><label>性別</label>
            <select value={editing.gender||''} onChange={e=>setEditing({...editing, gender:e.target.value})}>
              <option value="">不提供</option>
              <option value="女">女</option>
              <option value="男">男</option>
            </select>
          </div>
          <div className="field" style={{gridColumn:'span 2'}}><label>戶籍地</label><input value={editing.householdAddress} onChange={e=>setEditing({...editing, householdAddress:e.target.value})} style={{width:'100%'}} /></div>
          <div className="field"><label>到職日</label><input type="date" value={editing.hireDate} onChange={e=>setEditing({...editing, hireDate:e.target.value})} /></div>
          <div className="field">
            <label>離職日</label>
            <input type="date" value={editing.resignDate||''} onChange={e=>{ setEditing({...editing, resignDate:e.target.value, status: e.target.value ? '離職' : editing.status}); setResignPreview(null); }} />
            <div className="hint" style={{marginTop:4}}>有填離職日時，勞保費當月按在職天數比例計算，健保費則看月底當天是否仍在職（在職才收整月保費）</div>
            {editing.resignDate && editing.hireDate && !isNew && (
              <div style={{marginTop:6}}>
                <button type="button" className="ghost sm" disabled={resignPreviewLoading} onClick={loadResignPreview}>
                  <span className="material-icons" style={{fontSize:14}}>calculate</span>{resignPreviewLoading?'試算中...':'試算特休結算'}
                </button>
                {resignPreview && (
                  <div className="hint" style={{marginTop:6, background:'var(--bg-soft, #f5f5f5)', padding:8, borderRadius:6, lineHeight:1.7}}>
                    週年制重新計算期間：{resignPreview.periodStart} ～ {resignPreview.periodEnd}<br/>
                    應有 {resignPreview.entitledDays} 天，已休 {resignPreview.usedDays} 天，可結算 {resignPreview.settleDays} 天（{resignPreview.settleHours}小時）<br/>
                    {resignPreview.overUsed && <span style={{color:'var(--danger)'}}>⚠ 已超休 {resignPreview.overDays} 天，公司不能扣薪，結算金額以0計<br/></span>}
                    以本薪 {money(editing.baseSalary)} 估算，結算金額約 <b>{money(resignPreview.settlePay)}</b> 元
                    <div style={{marginTop:4, color:'var(--muted, #888)'}}>正式金額請至「薪資結算」頁該員工當月薪資列，按同樣的試算按鈕帶入。</div>
                  </div>
                )}
              </div>
            )}
          </div>
          <div className="field">
            <label>年資中斷起（選填）</label>
            <input type="month" value={editing.tenureBreakStart||''} onChange={e=>setEditing({...editing, tenureBreakStart:e.target.value})} />
          </div>
          <div className="field">
            <label>年資中斷迄（選填）</label>
            <input type="month" value={editing.tenureBreakEnd||''} onChange={e=>setEditing({...editing, tenureBreakEnd:e.target.value})} />
            <div className="hint" style={{marginTop:4}}>員工曾離職又復職時填寫，這段期間會從特休年資中扣除，不影響上面的到職日顯示</div>
          </div>

          <div className="field"><label>班別</label>
            <select value={editing.shiftId} onChange={e=>setEditing({...editing, shiftId:e.target.value})}>
              <option value="">依系統預設班別</option>
              {shifts.map(s=><option key={s.id} value={s.id}>{s.name}（{s.workStart}-{s.workEnd}）</option>)}
            </select>
          </div>
          <div className="field">
            <label>投保級距</label>
            <div style={{display:'flex', gap:6}}>
              <select value={editing.insuranceGrade} onChange={e=>setEditing({...editing, insuranceGrade:Number(e.target.value)})} style={{flex:1}}>
                <option value={0}>未設定</option>
                {INSURANCE_TABLE.map(r=><option key={r.grade} value={r.grade}>{r.grade.toLocaleString()}</option>)}
              </select>
              <button type="button" className="ghost sm" onClick={()=>setEditing({...editing, insuranceGrade: suggestGrade(editing.baseSalary)})}>依本薪建議</button>
            </div>
          </div>
          <div className="field">
            <label>健保眷屬人數</label>
            <input type="number" min="0" value={editing.dependentCount} onChange={e=>setEditing({...editing, dependentCount:Number(e.target.value)})} />
            <div className="hint" style={{marginTop:4}}>眷屬保費同本人金額，超過3人一律以3人計算</div>
          </div>
          <div className="field"><label>本薪</label><input type="number" value={editing.baseSalary} onChange={e=>setEditing({...editing, baseSalary:Number(e.target.value)})} /></div>

          <div className="field"><label>伙食津貼</label><input type="number" value={editing.mealAllowance} onChange={e=>setEditing({...editing, mealAllowance:Number(e.target.value)})} /></div>
          <div className="field"><label>交通津貼計算方式</label>
            <select value={editing.transportAllowanceMode||'fixed'} onChange={e=>setEditing({...editing, transportAllowanceMode:e.target.value})}>
              <option value="fixed">固定金額（每月）</option>
              <option value="daily">依出勤天數計算</option>
            </select>
          </div>
          <div className="field"><label>{editing.transportAllowanceMode==='daily' ? '每日補貼金額' : '交通津貼'}</label><input type="number" value={editing.transportAllowance} onChange={e=>setEditing({...editing, transportAllowance:Number(e.target.value)})} />
            {editing.transportAllowanceMode==='daily' && <div className="hint" style={{marginTop:4}}>系統會用「套用出缺勤時數」抓當月實際出勤天數 × 這個金額，自動算出當月交通津貼</div>}
          </div>
          <div className="field"><label>職務加給</label><input type="number" value={editing.positionAllowance} onChange={e=>setEditing({...editing, positionAllowance:Number(e.target.value)})} /></div>
          <div className="field"><label>全勤獎金（固定）</label><input type="number" value={editing.fullAttendanceBonus} onChange={e=>setEditing({...editing, fullAttendanceBonus:Number(e.target.value)})} /></div>

          <div className="field"><label>銀行</label><input value={editing.bankName} onChange={e=>setEditing({...editing, bankName:e.target.value})} /></div>
          <div className="field"><label>銀行帳號</label><input value={editing.bankAccount} onChange={e=>setEditing({...editing, bankAccount:e.target.value})} /></div>
        </div>
        {editing.baseSalary>0 && (n(editing.baseSalary)+n(editing.mealAllowance)+n(editing.transportAllowance)+n(editing.positionAllowance)) < MIN_WAGE_MONTHLY && (
          <div className="hint" style={{color:'var(--danger)'}}>⚠ 本薪＋伙食＋交通＋職務加給合計 {money(n(editing.baseSalary)+n(editing.mealAllowance)+n(editing.transportAllowance)+n(editing.positionAllowance))} 元，低於2026年最低工資 {money(MIN_WAGE_MONTHLY)} 元，可能違反《最低工資法》（全勤獎金為條件式給予，不列入計算基準）</div>
        )}
        <div className="hint">依2026年新制《勞工請假規則》第9條，婚假、喪假、公傷病假、公假、生理假、家庭照顧事假等法定假別不得作為扣發全勤獎金的理由。病假、事假、遲到、早退依「設定」頁的比例規則自動扣除（不是全有全無），這裡填的是正常整月應發的金額。</div>
        <div className="field"><label>備註</label><input value={editing.note} onChange={e=>setEditing({...editing, note:e.target.value})} style={{width:'100%'}} /></div>
        <label style={{display:'flex', alignItems:'center', gap:6, fontSize:13, color:'var(--ink)', marginTop:6}}>
          <input type="checkbox" checked={editing.canBeDelegate !== false} onChange={e=>setEditing({...editing, canBeDelegate:e.target.checked})} style={{width:'auto'}} />
          可被員工指定為請假代理人
        </label>
        <label style={{display:'flex', alignItems:'center', gap:6, fontSize:13, color:'var(--ink)', marginTop:6}}>
          <input type="checkbox" checked={editing.exemptFromAttendance === true} onChange={e=>setEditing({...editing, exemptFromAttendance:e.target.checked})} style={{width:'auto'}} />
          免打卡（不列入出缺勤彙總與薪資自動試算，薪資項目需手動填寫，如業務費用）
        </label>
        {editing.hireDate && <div className="hint">{tenureText(editing.hireDate, editing.tenureBreakStart, editing.tenureBreakEnd)}</div>}
        <div className="modal-actions">
          <button className="ghost" onClick={()=>setEditing(null)}>取消</button>
          <button onClick={onSave} disabled={saving}>{saving?'儲存中...':'儲存'}</button>
        </div>
      </div>
    </div>
  );
}

    <div>
      <div className="toolbar">
        <button onClick={onNew}><span className="material-icons">person_add</span>新增員工</button>
        <span className="grow"></span>

            <div className="card" key={co} style={{overflowX:'auto'}}>
              <h3><span className="material-icons" style={{fontSize:17, color:'var(--brand)'}}>business</span> {co} <span className="badge">{employees.filter(e=>(e.company||'(未分類)')===co).length} 人</span></h3>
              <table style={{tableLayout:'fixed', minWidth:1100}}>
                <colgroup>
                  <col style={{width:'9%'}} /><col style={{width:'11%'}} /><col style={{width:'11%'}} />
                  <col style={{width:'8%'}} /><col style={{width:'9%'}} /><col style={{width:'9%'}} />
                  <col style={{width:'8%'}} /><col style={{width:'9%'}} /><col style={{width:'9%'}} />
                  <col style={{width:'12%'}} /><col style={{width:'15%'}} />
                </colgroup>
                <thead>
                  <tr>
                    <th className="left">部門</th><th className="left">姓名</th><th className="left">手機</th><th>班別</th><th>到職日</th>
                    <th>年資</th><th>投保級距</th><th>投保眷屬人數</th><th>本薪</th><th className="left">銀行帳號</th><th style={{whiteSpace:'normal'}}>操作</th>
                  </tr>
                </thead>

                      <td className="left mono">{emp.phone}</td>
                      <td>{emp.shift ? emp.shift.name : <span className="hint">預設</span>}</td>
                      <td>{emp.hireDate || '-'}</td>
                      <td>{tenureShortText(emp.hireDate, emp.tenureBreakStart, emp.tenureBreakEnd)}</td>
                      <td>{emp.insuranceGrade || 0}</td>
                      <td>{emp.dependentCount || 0}</td>
                      <td>{money(emp.baseSalary)}</td>
                      <td className="left mono">{emp.bankAccount}</td>
                      <td style={{whiteSpace:'normal'}}>
                        <button className="ghost sm" onClick={()=>onEdit(emp)}><span className="material-icons" style={{fontSize:14}}>edit</span>編輯</button>{' '}
                        <button className="ghost sm" onClick={()=>setAccountBox({employeeId:emp.id, name:emp.name, account:emp.phone||'', password: Math.random().toString(36).slice(2,8)})}><span className="material-icons" style={{fontSize:14}}>vpn_key</span>帳號</button>{' '}
                        <button className="danger sm" onClick={()=>{ alert(`請在編輯視窗中手動填寫「${emp.name}」的離職日，儲存後即會標記為離職。`); onEdit(emp); }}><span className="material-icons" style={{fontSize:14}}>person_remove</span>離職</button>
                      </td>
                    </tr>
                  ))}

              </table>
            </div>
          ))}
        </>

      {accountBox && (
        <div className="modal-bg">
          <div className="modal" style={{width:400}}>
            <h3><span className="material-icons">vpn_key</span>建立登入帳號：{accountBox.name}</h3>
            <div className="field"><label>帳號（建議用手機號碼或員工編號）</label><input value={accountBox.account} onChange={e=>setAccountBox({...accountBox, account:e.target.value})} /></div>
            <div className="field"><label>初始密碼</label><input value={accountBox.password} onChange={e=>setAccountBox({...accountBox, password:e.target.value})} /></div>
            <div className="hint">建立後請把帳號密碼告訴員工，員工登入後可自行修改密碼。</div>

}

function RecordsTab({employees, month}){
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [manual, setManual] = useState(null);
  const [editing, setEditing] = useState(null);
  const [filterCompany, setFilterCompany] = useState('全部');
  const [filterName, setFilterName] = useState('全部');
  const [onlyAbnormal, setOnlyAbnormal] = useState(false);

  function load(){ setLoading(true); apiGet('getRecords', {month}).then(setRecords).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, [month]);

  async function saveManual(){
    try{ await apiPost('addManualRecord', manual); setManual(null); load(); }catch(e){ alert(e.message); }
  }
  async function saveEdit(){
    try{ await apiPost('adjustRecord', editing); setEditing(null); load(); }catch(e){ alert(e.message); }
  }
  async function removeRecord(id){
    if(!confirm('確定刪除這筆紀錄？')) return;
    try{ await apiPost('deleteRecord', {id}); load(); }catch(e){ alert(e.message); }
  }

  const empMap = {}; employees.forEach(e=>{ empMap[e.id] = e; });
  const companies = ['全部', ...Array.from(new Set(employees.map(e=>e.company||'(未分類)')))];
  const namesInCompany = filterCompany==='全部' ? employees : employees.filter(e=>(e.company||'(未分類)')===filterCompany);
  const namesWithRecords = new Set(records.map(r=>r.name)); // 免打卡員工若本月確實有紀錄（例如手動補登），還是要能被篩選到
  const eligibleForFilter = namesInCompany.filter(e=>!e.exemptFromAttendance || namesWithRecords.has(e.name));
  const names = ['全部', ...Array.from(new Set(eligibleForFilter.map(e=>e.name)))];

  const filtered = records.filter(r=>{
    const emp = empMap[r.employeeId];
    const empCompany = emp ? (emp.company||'(未分類)') : '(未分類)';
    if(filterCompany!=='全部' && empCompany!==filterCompany) return false;
    if(filterName!=='全部' && r.name!==filterName) return false;
    if(onlyAbnormal && !isAbnormalStatus(r.checkInStatus) && !isAbnormalStatus(r.checkOutStatus) && !isAbnormalStatus(r.outgoStatus) && !isAbnormalStatus(r.returnStatus)) return false;
    return true;
  });

  function punchCell(time, status){
    const t = (time||'').split(' ')[1] || '-';
    return (
      <td className="center">
        <div className="mono">{t}</div>
        {isAbnormalStatus(status) && <div className="flag" style={{fontSize:11, marginTop:2}}>{status}</div>}
      </td>
    );
  }

  return (
    <div>
      <div className="toolbar" style={{flexWrap:'wrap', gap:8}}>
        <select value={filterCompany} onChange={e=>{ setFilterCompany(e.target.value); setFilterName('全部'); }} style={{width:'auto'}}>
          {companies.map(c=><option key={c} value={c}>{c==='全部'?'全部公司':c}</option>)}
        </select>
        <select value={filterName} onChange={e=>setFilterName(e.target.value)} style={{width:'auto'}}>
          {names.map(n=><option key={n} value={n}>{n==='全部'?'全部姓名':n}</option>)}
        </select>
        <label style={{display:'flex', alignItems:'center', gap:5, fontSize:13, color:'var(--ink)'}}>
          <input type="checkbox" checked={onlyAbnormal} onChange={e=>setOnlyAbnormal(e.target.checked)} style={{width:'auto'}} />只顯示異常記錄
        </label>
        <span className="grow"></span>
        <button className="ghost sm" onClick={()=>setManual({employeeId:'', name:'', companyFilter:'全部', date: month+'-01', checkIn:'', checkOut:'', note:''})}>＋ 補登紀錄</button>
        <button className="ghost sm" onClick={load}>重新整理</button>
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        {loading ? <div className="hint">載入中...</div> : (
          <table style={{tableLayout:'fixed', minWidth:1080}}>
            <colgroup>
              <col style={{width:'9%'}} /><col style={{width:'11%'}} /><col style={{width:'9%'}} />
              <col style={{width:'9%'}} /><col style={{width:'9%'}} /><col style={{width:'9%'}} /><col style={{width:'9%'}} />
              <col style={{width:'8%'}} /><col style={{width:'13%'}} /><col style={{width:'14%'}} />
            </colgroup>
            <thead><tr><th className="center">姓名</th><th className="center">公司</th><th className="center">日期</th><th>上班</th><th>下班</th><th>外出</th><th>返回</th><th className="center">來源</th><th className="left">備註</th><th className="center">操作</th></tr></thead>
            <tbody>
              {filtered.map(r=>{
                const emp = empMap[r.employeeId];
                return (
                <tr key={r.id}>
                  <td className="center"><b>{r.name}</b></td>
                  <td className="center">{emp ? (emp.company||'(未分類)') : '-'}</td>
                  <td className="center">{r.date}</td>
                  {punchCell(r.checkIn, r.checkInStatus)}
                  {punchCell(r.checkOut, r.checkOutStatus)}
                  {punchCell(r.outgo, r.outgoStatus)}
                  {punchCell(r.returnTime, r.returnStatus)}
                  <td className="center">{r.source}</td>
                  <td className="left">{r.note}</td>
                  <td><button className="ghost sm" onClick={()=>setEditing({id:r.id, checkIn:r.checkIn, checkOut:r.checkOut, note:r.note, lat:r.checkInLat||r.checkOutLat||'', lng:r.checkInLng||r.checkOutLng||''})}>修改</button>{' '}
                      <button className="danger sm" onClick={()=>removeRecord(r.id)}>刪除</button></td>
                </tr>
                );
              })}
              {filtered.length===0 && <tr><td colSpan="10" className="hint" style={{textAlign:'center'}}>{records.length===0?'本月尚無打卡紀錄':'沒有符合篩選條件的紀錄'}</td></tr>}
            </tbody>
          </table>
        )}
      </div>

      {manual && (
        <div className="modal-bg">
          <div className="modal">
            <h3>補登打卡紀錄</h3>
            <div className="field"><label>公司</label>
              <select value={manual.companyFilter||'全部'} onChange={e=>setManual({...manual, companyFilter:e.target.value, employeeId:'', name:''})}>
                {companies.map(c=><option key={c} value={c}>{c==='全部'?'全部公司':c}</option>)}
              </select>
            </div>
            <div className="field"><label>員工</label>
              <select value={manual.employeeId} onChange={e=>{ const emp=employees.find(x=>x.id===e.target.value); setManual({...manual, employeeId:e.target.value, name: emp?emp.name:''}); }}>
                <option value="">請選擇</option>
                {employees.filter(e=>(manual.companyFilter||'全部')==='全部' || (e.company||'(未分類)')===manual.companyFilter).map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
            </div>
            <div className="grid-2">
              <div className="field"><label>日期</label><input type="date" value={manual.date} onChange={e=>setManual({...manual,date:e.target.value})} /></div>
              <div className="field"></div>
              <div className="field"><label>上班時間</label><input type="datetime-local" onChange={e=>setManual({...manual, checkIn:e.target.value.replace('T',' ')+':00'})} /></div>
              <div className="field"><label>下班時間</label><input type="datetime-local" onChange={e=>setManual({...manual, checkOut:e.target.value.replace('T',' ')+':00'})} /></div>
            </div>
            <div className="field">
              <label>備註</label>
              <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:6}}>
                {NOTE_PRESETS.map(p=>(
                  <button key={p} type="button" className="ghost sm" onClick={()=>setManual({...manual, note: manual.note ? manual.note+'；'+p : p})}>{p}</button>
                ))}
              </div>
              <textarea value={manual.note} onChange={e=>setManual({...manual,note:e.target.value})} rows="3" placeholder="例如：員工反映忘記打卡，經口頭確認補登" style={{width:'100%', fontFamily:'inherit', fontSize:13, padding:8, borderRadius:6, border:'1px solid var(--line)'}}></textarea>
            </div>
            <AddressGeocodeField lat={manual.lat} lng={manual.lng} onFound={(lat,lng)=>setManual({...manual, lat, lng})} />
            <div className="hint" style={{marginTop:-6, marginBottom:10}}>選填，如果知道員工當時實際所在地點，可以輸入地址核對是否在打卡範圍內。</div>
            <div className="modal-actions"><button className="ghost" onClick={()=>setManual(null)}>取消</button><button onClick={saveManual}>儲存</button></div>
          </div>
        </div>
      )}
      {editing && (
        <div className="modal-bg">
          <div className="modal">
            <h3>修改打卡紀錄</h3>
            <div className="grid-2">
              <div className="field"><label>上班時間</label><input type="datetime-local" defaultValue={(editing.checkIn||'').replace(' ','T').slice(0,16)} onChange={e=>setEditing({...editing, checkIn:e.target.value.replace('T',' ')+':00'})} /></div>
              <div className="field"><label>下班時間</label><input type="datetime-local" defaultValue={(editing.checkOut||'').replace(' ','T').slice(0,16)} onChange={e=>setEditing({...editing, checkOut:e.target.value.replace('T',' ')+':00'})} /></div>

                ))}

            </div>
            <AddressGeocodeField lat={editing.lat} lng={editing.lng} onFound={(lat,lng)=>setEditing({...editing, lat, lng})} />
            <div className="hint" style={{marginTop:-6, marginBottom:10}}>選填，如果要修正這筆紀錄的定位，可以輸入正確地址後儲存，狀態欄會依新座標重新比對是否超出範圍。</div>
            <div className="modal-actions"><button className="ghost" onClick={()=>setEditing(null)}>取消</button><button onClick={saveEdit}>儲存</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

                  <td>{e.earlyLeaveCount}</td><td>{e.earlyLeaveMinutes}</td>
                  <td className={e.otCapExceeded?'flag':''}>{e.otWeekday134}</td>
                  <td className={e.otCapExceeded?'flag':''}>{e.otWeekday167}</td>
                  <td className={e.dailyOtWarning?'flag':''} title={e.dailyOtExceedDays.join('、')}>
                    {e.dailyOtWarning ? <span className="material-icons" style={{fontSize:15, verticalAlign:'middle'}}>warning</span> : '-'}
                    {e.dailyOtWarning ? ` ${e.dailyOtExceedDays.length}天` : ''}
                  </td>
                  <td className={e.otRestDayHours>0 ? (e.otCapExceeded?'flag':'') : ''}>{e.otRestDayHours}</td>
                  <td>{e.otHolidayHours}</td>
                  <td className={e.otMandatoryRestHours>0?'flag':''}>
                    {e.otMandatoryRestHours}
                    {e.mandatoryRestDates.length>0 && (
                      <button className="ghost sm" style={{marginLeft:6, padding:'2px 6px', fontSize:11}} onClick={()=>setMakeupBox({employeeId:e.employeeId, name:e.name, dates:e.mandatoryRestDates, unresolvedDates:e.mandatoryRestUnresolvedDates})}>
                        {e.mandatoryRestWarning ? '待補假' : '已補假'}

        <span className="flag">紅字</span>代表該員工當月平日加班已超過設定的月上限，或有例假日出勤紀錄尚未完成補假登記，請優先確認合法性。

      {makeupBox && (
        <div className="modal-bg">
