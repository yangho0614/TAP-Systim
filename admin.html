            <h3><span className="material-icons">event_repeat</span>{makeupBox.name} － 例假日補假登記</h3>
            <div className="hint" style={{marginBottom:10}}>依勞基法第40條，例假日出勤事後須完成補假，請登記每一天實際補假的日期。</div>
            <MakeupList employeeId={makeupBox.employeeId} dates={makeupBox.dates} onSaved={()=>{ load(); }}/>
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setMakeupBox(null)}>關閉</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MakeupList({employeeId, dates, onSaved}){
  const [existing, setExisting] = useState(null);
  useEffect(()=>{
    apiGet('getMandatoryRestMakeups').then(list=>{
      const map = {};
      list.filter(m=>m.employeeId===employeeId).forEach(m=>{ map[m.workDate] = m.makeupDate || ''; });
      setExisting(map);
    }).catch(()=>setExisting({}));
  }, []);
  if(existing===null) return <div className="hint">載入中...</div>;
  return dates.map(d=>(
    <MakeupRow key={d} employeeId={employeeId} workDate={d} initialValue={existing[d] || ''} onSaved={onSaved}/>
  ));
}

function MakeupRow({employeeId, workDate, initialValue, onSaved}){
  const [makeupDate, setMakeupDate] = useState(initialValue || '');
  const [saving, setSaving] = useState(false);
  async function save(){
    setSaving(true);
    try{ await apiPost('registerMandatoryRestMakeup', {employeeId, workDate, makeupDate}); onSaved(); }
    catch(e){ alert(e.message); }
    finally{ setSaving(false); }
  }
  return (
    <div className="row-between" style={{marginBottom:8, gap:10}}>
      <div style={{fontSize:13, flexShrink:0}}>出勤日：{workDate}</div>
      <input type="date" value={makeupDate} onChange={e=>setMakeupDate(e.target.value)} style={{flex:1}} />
      <button onClick={save} disabled={saving}>{saving?'儲存中':'儲存'}</button>
    </div>
  );
}

function NumCell({value, onChange, disabled}){
  return <input type="number" value={value} disabled={disabled} onChange={e=>onChange(Number(e.target.value))} />;
}

/* ========================= 薪資計算 / 明細總表 ========================= */
function PayrollTab({employees, rows, setEntry, month, loading, onApply, onSave, dirty, saving, onEditEmployee, onReload}){
  const [subTab, setSubTab] = useState('06');
  const [settleBox, setSettleBox] = useState(null); // {year, items, loading, saving}
  const [lockBox, setLockBox] = useState(null); // {items, loading, saving}
  const [resignRowBox, setResignRowBox] = useState(null); // {employeeId, name, loading, data}
  const [locking, setLocking] = useState(false);
  const scrollRef = useRef(null);
  function scrollToStart(){ if(!scrollRef.current) return; if(scrollRef.current.scrollTo) scrollRef.current.scrollTo({left:0, behavior:'smooth'}); else scrollRef.current.scrollLeft = 0; }
  function scrollToEnd(){ if(!scrollRef.current) return; const w = scrollRef.current.scrollWidth; if(scrollRef.current.scrollTo) scrollRef.current.scrollTo({left:w, behavior:'smooth'}); else scrollRef.current.scrollLeft = w; }
  const totals = useMemo(()=>{
    const t = {base:0, overtime:0, allowance:0, bonus:0, payable:0, labor:0, health:0, leaveDeduct:0, otherDeduct:0, deduct:0, pay06:0, pay26:0, grand:0};
    rows.forEach(({emp, entry, calc})=>{
      t.base += calc.effBaseSalary;
      t.overtime += calc.overtimePay;
      t.allowance += calc.allowanceTotal;
      t.bonus += calc.bonusTotal;
      t.payable += calc.payableTotal;
      t.labor += calc.laborFee;
      t.health += calc.healthFee;
      t.leaveDeduct += calc.leaveDeduct;
      t.otherDeduct += n(entry.otherDeduction);
      t.deduct += calc.deductTotal;
      t.pay06 += calc.pay06;
      t.pay26 += calc.pay26;
      t.grand += calc.grandTotal;
    });
    return t;
  }, [rows]);

  const otCapAlerts = rows.filter(({calc})=>calc.monthlyOtHours > MONTHLY_OT_CAP_DEFAULT);
  const minWageAlerts = rows.filter(({calc})=>calc.belowMinWage);
  const restDayCapAlerts = rows.filter(({calc})=>calc.restDayOverCap);
  const sickCapAlerts = rows.filter(({calc})=>calc.sickCapExceeded);
  const allLocked = rows.length>0 && rows.every(({entry})=>entry.locked);
  const anyLocked = rows.some(({entry})=>entry.locked);

  async function openLockPreview(){
    setLockBox({items:null, loading:true, saving:false});
    try{
      const items = await apiGet('getPayrollLockPreview', {month});
      setLockBox({items, loading:false, saving:false});
    }catch(e){ alert(e.message); setLockBox(null); }
  }
  async function confirmLock(){
    const overrides = {};
    lockBox.items.forEach(it=>{ overrides[it.employeeId] = {laborFee: it.laborFee, healthFee: it.healthFee}; });
    setLockBox(prev=>({...prev, saving:true}));
    try{
      await apiPost('lockPayrollMonth', {month, overrides});
      setLockBox(null);
      await onReload();
      alert('本月薪資已鎖定，欄位改為唯讀。要修改需先按「解除鎖定」。');
    }catch(e){ alert(e.message); setLockBox(prev=>({...prev, saving:false})); }
  }
  async function doUnlock(){
    if(!confirm(`確定要解除 ${month} 的鎖定嗎？解除後這個月的欄位就可以再編輯。`)) return;
    setLocking(true);
    try{
      await apiPost('unlockPayrollMonth', {month});
      await onReload();
    }catch(e){ alert(e.message); } finally{ setLocking(false); }
  }

  async function openSettleEstimate(){
    const viewMonth = Number(String(month).split('-')[1]);
    let msg = '「結算試算」建議只在「年度終了」或「員工離職時」使用。\n\n其他時間使用，可能會把員工之後還會請的特休也一併結算掉，造成金額不準確。';
    if (viewMonth !== 12) {
      msg += `\n\n⚠ 目前試算的是 ${viewMonth} 月，不是年底（12月）。除非是要幫離職員工結算，否則請再次確認這個時機是否正確。`;
    }
    msg += '\n\n確定要繼續試算嗎？';
    if (!confirm(msg)) return;
    const year = String(new Date().getFullYear());
    setSettleBox({year, items:null, loading:true, saving:false});
    try{
      const data = await apiGet('getAnnualLeaveList', {year});
      const items = rows.map(({emp})=>{
        const grantedHours = data.granted[emp.id] ? data.granted[emp.id].hours : 0;
        const usedHours = data.used[emp.id] || 0;
        const rawHours = Math.round((grantedHours - usedHours) * 100) / 100;
        const overUsed = rawHours < 0;
        const remainHours = Math.max(0, rawHours);
        const wageBase = n(emp.baseSalary); // 本薪已包含4項津貼，不重複相加
        const hourly = wageBase > 0 ? wageBase/240 : 0;
        const amount = Math.round(remainHours * hourly);
        return {employeeId: emp.id, name: emp.name, remainHours, hourly: Math.round(hourly*100)/100, amount, overUsed, overHours: overUsed ? Math.abs(rawHours) : 0};
      });
      setSettleBox({year, items, loading:false, saving:false});
    }catch(e){ alert(e.message); setSettleBox(null); }
  }
  function applySettleEstimate(){
    settleBox.items.forEach(it=>{ setEntry(it.employeeId, {annualLeaveSettlement: it.amount}); });
    setSettleBox(null);
    alert('已套用特休結算金額，記得檢查後按「儲存薪資紀錄」。');
  }

  async function openResignRowSettle(emp){
    setResignRowBox({employeeId: emp.id, name: emp.name, loading:true, data:null});
    try{
      const data = await apiGet('calcResignationLeaveSettlement', {employeeId: emp.id, resignDate: emp.resignDate, baseOverride: emp.baseSalary});
      setResignRowBox({employeeId: emp.id, name: emp.name, loading:false, data});
    }catch(e){ alert(e.message); setResignRowBox(null); }
  }
  function applyResignRowSettle(){
    setEntry(resignRowBox.employeeId, {annualLeaveSettlement: resignRowBox.data.settlePay});
    setResignRowBox(null);
  }

  function doExport(){
    const headers = ['公司','部門','姓名','投保級距','本薪','平日加班費','休息日加班費','國定假日加班費','加班費合計','津貼合計','獎金合計','特休結算','應付小計','勞保自付','健保自付','請假扣款','其他扣款','應扣小計','06日應付','26日應付','應付總計'];
    const data = rows.map(({emp, entry, calc})=>[
      emp.company, emp.department, emp.name, emp.insuranceGrade, calc.effBaseSalary,
      Math.round(calc.weekdayOtPay), Math.round(calc.restDayPay), Math.round(calc.holidayPay), Math.round(calc.overtimePay),
      calc.allowanceTotal, calc.bonusTotal, n(entry.annualLeaveSettlement),
      Math.round(calc.payableTotal), calc.laborFee, calc.healthFee, Math.round(calc.leaveDeduct), n(entry.otherDeduction),
      Math.round(calc.deductTotal), Math.round(calc.pay06), Math.round(calc.pay26), Math.round(calc.grandTotal)
    ]);
    exportCSV(`薪資明細_${month}.csv`, headers, data);
  }

  return (
    <div>
      <div className="toolbar no-print">
        <div style={{display:'flex', gap:6}}>
          <button className={subTab==='06'?'':'ghost'} onClick={()=>setSubTab('06')}>06日明細</button>
          <button className={subTab==='26'?'':'ghost'} onClick={()=>setSubTab('26')}>26日明細</button>
        </div>
        <span className="grow"></span>
        {allLocked ? (
          <>
            <span className="badge warn"><span className="material-icons" style={{fontSize:14}}>lock</span>本月已鎖定</span>
            <button className="danger sm" onClick={doUnlock} disabled={locking}>{locking?'處理中...':'解除鎖定'}</button>
          </>
        ) : (
          <button className="ghost sm" onClick={openLockPreview}><span className="material-icons" style={{fontSize:14}}>lock</span>鎖定本月</button>
        )}
        <button className="ghost sm" onClick={scrollToStart} title="跳到最左邊"><span className="material-icons" style={{fontSize:16}}>first_page</span></button>
        <button className="ghost sm" onClick={scrollToEnd} title="跳到最右邊看總計"><span className="material-icons" style={{fontSize:16}}>last_page</span></button>
        <button className="ghost sm" onClick={onApply} disabled={allLocked}>套用出缺勤時數</button>
        <button className="ghost sm" onClick={()=>window.print()}>列印本頁</button>
        <button className="ghost sm" onClick={doExport}>匯出 CSV</button>
        <button onClick={onSave} disabled={saving || !dirty || allLocked}>{saving?'儲存中...':'儲存薪資紀錄'}</button>
      </div>
      <div className="toolbar no-print">
        <span className="hint">加班費依勞基法第24條分類計算：平日前2hr 1.34倍／其後1.67倍；休息日依4/8/12小時級距算1.34/1.67/2.67倍；國定假日加發一日工資（休息日出勤時數與平日加班合計列入每月46小時上限）。請假扣款：事假100%、病假50%、生理假（歷年制，每年前3天全薪、第4天起50%）、災防假0%；病假與生理假(超過3天部分)共用年度30天上限，超過後不給薪</span>
      </div>

      {(otCapAlerts.length>0 || minWageAlerts.length>0 || restDayCapAlerts.length>0 || sickCapAlerts.length>0) && (
        <div className="card no-print" style={{borderColor:'var(--danger)', background:'#fdf2f0'}}>
          <h3 style={{color:'var(--danger)', fontSize:14}}>⚠ 合規提醒</h3>
          {otCapAlerts.length>0 && <div className="hint">平日加班＋休息日出勤合計超過月上限 {MONTHLY_OT_CAP_DEFAULT} 小時：{otCapAlerts.map(r=>r.emp.name).join('、')}（依勞基法第32條，一般上限46小時，經工會或勞資會議同意可延長至54小時，但每3個月不得逾138小時；國定假日與例假加班不列入此上限）</div>}
          {restDayCapAlerts.length>0 && <div className="hint">休息日單日出勤超過12小時：{restDayCapAlerts.map(r=>r.emp.name).join('、')}，請確認是否合法並已依規定辦理</div>}
          {minWageAlerts.length>0 && <div className="hint">經常性給予（本薪＋伙食＋交通＋職務加給）低於2026年最低工資 {money(MIN_WAGE_MONTHLY)} 元：{minWageAlerts.map(r=>r.emp.name).join('、')}，請確認薪資結構是否合法（不含加班費、獎金與全勤獎金）</div>}
          {sickCapAlerts.length>0 && <div className="hint">病假＋生理假(超過3天部分)已達年度30天上限，本月部分時數不給薪：{sickCapAlerts.map(r=>r.emp.name).join('、')}</div>}
        </div>
      )}

      {loading ? <div className="hint">載入中...</div> : rows.length===0 ? <div className="empty card">尚無在職員工，請先至「員工資料」頁面新增。</div> : subTab==='06' ? (
      <div ref={scrollRef} style={{overflowX:'auto'}}>
      <table>
        <thead>
          <tr>
            <th className="freeze-1" rowSpan="2">姓名 / 部門</th>
            <th className="freeze-2" rowSpan="2">本薪</th>
            <th rowSpan="2">伙食津貼</th>
            <th rowSpan="2">交通津貼</th>
            <th rowSpan="2">職務加給</th>
            <th rowSpan="2">全勤獎金</th>
            <th className="col-add" colSpan="4">加班時數</th>
            <th className="col-add" rowSpan="2">加班費</th>
            <th className="col-add" colSpan="4">獎金</th>
            <th className="col-add" rowSpan="2">
              特休結算<br/>
              <button type="button" className="ghost sm no-print" style={{fontWeight:400, marginTop:4}} onClick={openSettleEstimate}>結算試算</button>
            </th>
            <th className="col-add" rowSpan="2">應付小計</th>
            <th className="col-deduct" colSpan="5">請假時數</th>
            <th className="col-deduct" rowSpan="2">勞保</th>
            <th className="col-deduct" rowSpan="2">健保</th>
            <th className="col-deduct" rowSpan="2">其他扣款</th>
            <th className="col-deduct" rowSpan="2">應扣小計</th>
            <th className="col-result" rowSpan="2">06日應付</th>
          </tr>
          <tr>
            <th className="col-add">平日1.34</th><th className="col-add">平日1.67</th><th className="col-add">休息日</th><th className="col-add">國定假日</th>
            <th className="col-add">三節</th><th className="col-add">年終</th><th className="col-add">績效</th><th className="col-add">其他</th>
            <th className="col-deduct">事假</th><th className="col-deduct">病假</th><th className="col-deduct">生理假</th><th className="col-deduct">災防</th><th className="col-deduct">其他</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(({emp, entry, calc})=>(
            <tr key={emp.id}>
              <td className="center freeze-1" style={{cursor:"pointer"}} onClick={()=>onEditEmployee(emp)} title="點擊編輯員工資料"><b>{emp.name}</b><br/><span className="hint">{emp.department}</span></td>
              <td className="freeze-2 center">{money(calc.effBaseSalary)}</td>
              <td className="hint">{money(calc.effMealAllowance)}</td>
              <td className="hint" title={emp.transportAllowanceMode==='daily'?`依出勤天數計算：${entry.presentDays||0}天 × ${money(emp.transportAllowance)}`:''}>{money(calc.effTransportAllowance)}</td>
              <td className="hint">{money(calc.effPositionAllowance)}</td>
              <td className="hint" title={calc.fullAttendanceDeductRatio>0?`依請假/遲到早退比例扣${(calc.fullAttendanceDeductRatio*100).toFixed(1)}%`:(calc.fullAttendanceRatio<1?`依在職天數比例試算（${(calc.fullAttendanceRatio*100).toFixed(0)}%）`:'')} style={calc.fullAttendanceDeductRatio>0?{color:'var(--danger)'}:undefined}>{money(calc.fullAttendanceAdjusted)}</td>
              <td className="col-add"><NumCell value={entry.otWeekday134} onChange={v=>setEntry(emp.id,{otWeekday134:v})} disabled={entry.locked} /></td>
              <td className="col-add"><NumCell value={entry.otWeekday167} onChange={v=>setEntry(emp.id,{otWeekday167:v})} disabled={entry.locked} /></td>
              <td className="col-add"><NumCell value={entry.otRestDayHours} onChange={v=>setEntry(emp.id,{otRestDayHours:v})} disabled={entry.locked} /></td>
              <td className="col-add"><NumCell value={entry.otHolidayHours} onChange={v=>setEntry(emp.id,{otHolidayHours:v})} disabled={entry.locked} /></td>
              <td className="col-add num-pos">{money(calc.overtimePay)}</td>
              <td className="col-add"><NumCell value={entry.festivalBonus} onChange={v=>setEntry(emp.id,{festivalBonus:v})} disabled={entry.locked} /></td>
              <td className="col-add"><NumCell value={entry.yearEndBonus} onChange={v=>setEntry(emp.id,{yearEndBonus:v})} disabled={entry.locked} /></td>
              <td className="col-add"><NumCell value={entry.performanceBonus} onChange={v=>setEntry(emp.id,{performanceBonus:v})} disabled={entry.locked} /></td>
              <td className="col-add"><NumCell value={entry.otherBonus} onChange={v=>setEntry(emp.id,{otherBonus:v})} disabled={entry.locked} /></td>
              <td className="col-add">
                <NumCell value={entry.annualLeaveSettlement} onChange={v=>setEntry(emp.id,{annualLeaveSettlement:v})} disabled={entry.locked} />
                {emp.resignDate && !entry.locked && (
                  <button type="button" className="ghost sm" title="試算離職特休結算（週年制）" style={{marginTop:2, padding:'2px 6px'}} onClick={()=>openResignRowSettle(emp)}>
                    <span className="material-icons" style={{fontSize:14}}>calculate</span>
                  </button>
                )}
              </td>
              <td className="col-add num-pos"><b>{money(calc.payableTotal)}</b></td>
              <td className="col-deduct"><NumCell value={entry.personalLeave} onChange={v=>setEntry(emp.id,{personalLeave:v})} disabled={entry.locked} /></td>
              <td className="col-deduct"><NumCell value={entry.sickLeave} onChange={v=>setEntry(emp.id,{sickLeave:v})} disabled={entry.locked} /></td>
              <td className="col-deduct">
                <NumCell value={entry.menstrualLeave} onChange={v=>setEntry(emp.id,{menstrualLeave:v})} disabled={entry.locked} />
                {n(entry.menstrualLeave)>0 && <div className="hint" style={{fontSize:10, marginTop:2}}>全薪{calc.menstrualPaidHours}／半薪{calc.menstrualHalfHours}</div>}
              </td>
              <td className="col-deduct"><NumCell value={entry.disasterLeave} onChange={v=>setEntry(emp.id,{disasterLeave:v})} disabled={entry.locked} /></td>
              <td className="col-deduct"><NumCell value={entry.otherLeave} onChange={v=>setEntry(emp.id,{otherLeave:v})} disabled={entry.locked} /></td>
              <td className="col-deduct" title={!calc.insFullMonth?`按在職${calc.insLaborDays}天比例計算`:''}>{money(calc.laborFee)}</td>
              <td className="col-deduct" title={!calc.insActiveAtMonthEnd?'月底已離職，本月不收健保費':''}>{money(calc.healthFee)}</td>
              <td className="col-deduct"><NumCell value={entry.otherDeduction} onChange={v=>setEntry(emp.id,{otherDeduction:v})} disabled={entry.locked} /></td>
              <td className="col-deduct num-neg">{money(calc.deductTotal)}</td>
              <td className="col-result mono"><b>{money(calc.pay06)}</b></td>
            </tr>
          ))}
          <tr className="total-row">
            <td className="center freeze-1">合計</td>
            <td className="freeze-2 center">{money(totals.base)}</td>
            <td colSpan="4"></td>
            <td colSpan="4"></td>
            <td className="num-pos">{money(totals.overtime)}</td>
            <td colSpan="4"></td>
            <td></td>
            <td className="num-pos">{money(totals.payable)}</td>
            <td colSpan="5"></td>
            <td>{money(totals.labor)}</td>
            <td>{money(totals.health)}</td>
            <td></td>
            <td className="num-neg">{money(totals.deduct)}</td>
            <td className="mono">{money(totals.pay06)}</td>
          </tr>
        </tbody>
      </table>
      </div>
      ) : (
      <div ref={scrollRef} style={{overflowX:'auto'}}>
      <table>
        <thead>
          <tr>
            <th className="freeze-1">姓名 / 部門</th>
            <th>業務費用</th><th>業績獎金</th><th>其他獎金</th><th>其他費用</th><th>其他扣款</th>
            <th>26日應付</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(({emp, entry, calc})=>(
            <tr key={emp.id}>
              <td className="center freeze-1" style={{cursor:"pointer"}} onClick={()=>onEditEmployee(emp)} title="點擊編輯員工資料"><b>{emp.name}</b><br/><span className="hint">{emp.department}</span></td>
              <td><NumCell value={entry.businessExpense} onChange={v=>setEntry(emp.id,{businessExpense:v})} disabled={entry.locked} /></td>
              <td><NumCell value={entry.salesPerformance} onChange={v=>setEntry(emp.id,{salesPerformance:v})} disabled={entry.locked} /></td>
              <td><NumCell value={entry.salesBonus26} onChange={v=>setEntry(emp.id,{salesBonus26:v})} disabled={entry.locked} /></td>
              <td><NumCell value={entry.otherExpense26} onChange={v=>setEntry(emp.id,{otherExpense26:v})} disabled={entry.locked} /></td>
              <td><NumCell value={entry.deduction26} onChange={v=>setEntry(emp.id,{deduction26:v})} disabled={entry.locked} /></td>
              <td className="col-result mono"><b>{money(calc.pay26)}</b></td>
            </tr>
          ))}
          <tr className="total-row">
            <td className="center freeze-1">合計</td>
            <td colSpan="5"></td>
            <td className="mono">{money(totals.pay26)}</td>
          </tr>
        </tbody>
      </table>
      </div>
      )}
      <div className="hint" style={{marginTop:8}}>「06日明細」與「26日明細」是分開的兩張表，各自獨立編輯。26日相關的業務費用、業績獎金等欄位請切到「26日明細」頁籤編輯。編輯完成別忘了按右上角「儲存薪資紀錄」，否則重新整理或切換月份會遺失變更。</div>
      {settleBox && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:560}}>
            <h3><span className="material-icons">calculate</span>特休結算試算（{settleBox.year}年度）</h3>
            <div className="hint" style={{marginBottom:10}}>依「特休設定」裡的核定時數與已使用時數，試算每位員工剩餘特休折算的金額。確認無誤後按「套用」，會自動填入下方「特休結算」欄位，仍可個別手動調整。</div>
            {settleBox.loading ? <div className="hint">試算中...</div> : (
              <table>
                <thead><tr><th className="left">姓名</th><th>剩餘時數</th><th className="left">算式</th><th>結算金額</th></tr></thead>
                <tbody>
                  {settleBox.items.map(it=>(
                    <tr key={it.employeeId}>
                      <td className="left">{it.name}{it.overUsed && <div className="hint" style={{color:'var(--danger)'}}>⚠ 已超休 {it.overHours} 小時，公司不能扣薪，金額以0計</div>}</td>
                      <td>{it.remainHours}</td>
                      <td className="left hint">{it.remainHours} hr × {it.hourly} 元/hr =</td>
                      <td><b>{money(it.amount)}</b></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setSettleBox(null)}>取消</button>
              <button onClick={applySettleEstimate} disabled={settleBox.loading}>套用全部</button>
            </div>
          </div>
        </div>
      )}
      {lockBox && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:640}}>
            <h3><span className="material-icons">lock</span>鎖定 {month} 薪資</h3>
            <div className="hint" style={{marginBottom:10}}>鎖定後，這個月的本薪、津貼、投保級距與勞健保金額會凍結成下面這份數字，之後不管員工資料怎麼調整都不會變動。勞保費／健保費可以手動修改成正確金額（例如匯入歷史紀錄時）。</div>
            {lockBox.loading ? <div className="hint">載入中...</div> : (
              <table>
                <thead><tr><th className="left">姓名</th><th>本薪</th><th>投保級距</th><th>勞保費</th><th>健保費</th></tr></thead>
                <tbody>
                  {lockBox.items.map((it,idx)=>(
                    <tr key={it.employeeId}>
                      <td className="left">{it.name}{it.alreadyLocked && <span className="hint" style={{marginLeft:4}}>（已鎖定過）</span>}</td>
                      <td>{money(it.baseSalary)}</td>
                      <td>{it.insuranceGrade}</td>
                      <td><NumCell value={it.laborFee} onChange={v=>setLockBox(prev=>{ const items=[...prev.items]; items[idx]={...items[idx], laborFee:v}; return {...prev, items}; })} /></td>
                      <td><NumCell value={it.healthFee} onChange={v=>setLockBox(prev=>{ const items=[...prev.items]; items[idx]={...items[idx], healthFee:v}; return {...prev, items}; })} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setLockBox(null)}>取消</button>
              <button onClick={confirmLock} disabled={lockBox.loading || lockBox.saving}>{lockBox.saving?'鎖定中...':'確認鎖定'}</button>
            </div>
          </div>
        </div>
      )}
      {resignRowBox && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:480}}>
            <h3><span className="material-icons">calculate</span>特休結算試算：{resignRowBox.name}</h3>
            {resignRowBox.loading ? <div className="hint">試算中...</div> : resignRowBox.data && (
              <div>
                <div className="hint" style={{marginBottom:10}}>不論平常特休用歷年制或週年制核定，離職一律改用「週年制」重新計算最後一個未滿的服務年度，已休超過應有天數不倒扣。</div>
                <table>
                  <tbody>
                    <tr><td className="left">重新計算期間</td><td>{resignRowBox.data.periodStart} ～ {resignRowBox.data.periodEnd}</td></tr>
                    <tr><td className="left">應有天數</td><td>{resignRowBox.data.entitledDays} 天</td></tr>
                    <tr><td className="left">已休天數</td><td>{resignRowBox.data.usedDays} 天（{resignRowBox.data.usedHours} 小時）</td></tr>
                    <tr><td className="left">可結算天數</td><td><b>{resignRowBox.data.settleDays} 天</b>（{resignRowBox.data.settleHours} 小時）</td></tr>
                    <tr><td className="left">日薪基準</td><td>{money(resignRowBox.data.dailyWage)}</td></tr>
                    <tr><td className="left">結算金額</td><td><b>{money(resignRowBox.data.settlePay)}</b></td></tr>
                  </tbody>
                </table>
                {resignRowBox.data.overUsed && (
                  <div className="hint" style={{color:'var(--danger)', marginTop:8}}>⚠ 已超休 {resignRowBox.data.overDays} 天，依規定公司不能扣薪，結算金額以0計，僅提醒留意。</div>
                )}
              </div>
            )}
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setResignRowBox(null)}>取消</button>
              <button onClick={applyResignRowSettle} disabled={resignRowBox.loading || !resignRowBox.data}>帶入特休結算欄位</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Payslip({emp, entry, calc, month, payDate06, payDate26, hideZero}){
  const show = v => !hideZero || Number(v) !== 0;
  const hasAnyAllowance = n(calc.effMealAllowance) || n(calc.effTransportAllowance) || n(calc.effPositionAllowance) || n(calc.effFullAttendanceBonus);
  return (
    <div className="payslip">
      <h2>{emp.company || '（未設定公司）'} · 薪資條</h2>
      <div className="meta">
        <div><b>姓名：</b>{emp.name}　<b>部門：</b>{emp.department}</div>
        <div><b>計薪月份：</b>{monthLabel(month)}</div>
      </div>
      <div className="meta"><div><b>到職日：</b>{emp.hireDate||'-'}</div><div><b>投保級距：</b>{emp.insuranceGrade||0}</div>{calc.locked && <div><span className="badge warn"><span className="material-icons" style={{fontSize:12}}>lock</span>已鎖定</span></div>}</div>

      <table style={{marginBottom:8}}>
        <colgroup><col /><col style={{width:100}} /></colgroup>
        <thead><tr><th className="col-add" colSpan="2"><span className="material-icons" style={{fontSize:14, verticalAlign:'middle'}}>add_circle</span> 應發項目</th></tr></thead>
        <tbody>
          <tr><td className="left col-add" style={{fontWeight:600}}>本薪</td><td className="col-add" style={{fontWeight:600}}>{money(calc.effBaseSalary)}</td></tr>
          {(!hideZero || hasAnyAllowance) && <tr><td className="left col-add" colSpan="2" style={{fontSize:11, color:'var(--muted)', paddingLeft:20}}>以下為本薪內含明細，僅供對照，不另外加總</td></tr>}
          {show(n(calc.effMealAllowance)) && <tr><td className="left col-add" style={{paddingLeft:28, fontSize:11, color:'var(--muted)', borderLeft:'2px solid var(--line)'}}>伙食津貼</td><td className="col-add" style={{fontSize:11, color:'var(--muted)'}}>{money(calc.effMealAllowance)}</td></tr>}
          {show(n(calc.effTransportAllowance)) && <tr><td className="left col-add" style={{paddingLeft:28, fontSize:11, color:'var(--muted)', borderLeft:'2px solid var(--line)'}}>交通津貼{emp.transportAllowanceMode==='daily' && <span>（{entry.presentDays||0}天×{money(emp.transportAllowance)}）</span>}</td><td className="col-add" style={{fontSize:11, color:'var(--muted)'}}>{money(calc.effTransportAllowance)}</td></tr>}
          {show(n(calc.effPositionAllowance)) && <tr><td className="left col-add" style={{paddingLeft:28, fontSize:11, color:'var(--muted)', borderLeft:'2px solid var(--line)'}}>職務加給</td><td className="col-add" style={{fontSize:11, color:'var(--muted)'}}>{money(calc.effPositionAllowance)}</td></tr>}
          {show(n(calc.effFullAttendanceBonus)) && <tr><td className="left col-add" style={{paddingLeft:28, fontSize:11, color:'var(--muted)', borderLeft:'2px solid var(--line)'}}>全勤獎金{calc.fullAttendanceDeductRatio>0 && <span style={{color:'var(--danger)'}}>（依比例扣{(calc.fullAttendanceDeductRatio*100).toFixed(1)}%）</span>}{calc.fullAttendanceRatio<1 && <span>（依在職比例{(calc.fullAttendanceRatio*100).toFixed(0)}%）</span>}</td><td className="col-add" style={{fontSize:11, color:'var(--muted)'}}>{money(calc.fullAttendanceAdjusted)}</td></tr>}
          {show(n(entry.festivalBonus)) && <tr><td className="left col-add">三節獎金</td><td className="col-add">{money(entry.festivalBonus)}</td></tr>}
          {show(n(entry.yearEndBonus)) && <tr><td className="left col-add">年終獎金</td><td className="col-add">{money(entry.yearEndBonus)}</td></tr>}
          {show(n(entry.performanceBonus)) && <tr><td className="left col-add">績效獎金</td><td className="col-add">{money(entry.performanceBonus)}</td></tr>}
          {show(n(entry.otherBonus)) && <tr><td className="left col-add">其他獎金</td><td className="col-add">{money(entry.otherBonus)}</td></tr>}
          {show(calc.weekdayOtPay) && <tr><td className="left col-add">平日加班（{n(entry.otWeekday134)}/{n(entry.otWeekday167)} hr）</td><td className="col-add">{money(calc.weekdayOtPay)}</td></tr>}
          {show(calc.restDayPay) && <tr><td className="left col-add">休息日出勤（{n(entry.otRestDayHours)} hr，計{calc.restDayCountedHours}hr）</td><td className="col-add">{money(calc.restDayPay)}</td></tr>}
          {show(calc.holidayPay) && <tr><td className="left col-add">國定假日出勤（{n(entry.otHolidayHours)} hr）</td><td className="col-add">{money(calc.holidayPay)}</td></tr>}
          {n(entry.otMandatoryRestHours)>0 && <tr><td className="left col-add" style={{color:'var(--outcome)'}}>例假日出勤（{n(entry.otMandatoryRestHours)} hr，需補休）</td><td className="col-add">{money(calc.mandatoryRestPay)}</td></tr>}
          {show(n(entry.annualLeaveSettlement)) && <tr><td className="left col-add">特休未休結算</td><td className="col-add">{money(entry.annualLeaveSettlement)}</td></tr>}
          <tr className="total-row"><td className="left">應發合計</td><td>{money(calc.payableTotal)}</td></tr>
        </tbody>
      </table>

      <table style={{marginBottom:8}}>
        <colgroup><col /><col style={{width:100}} /></colgroup>
        <thead><tr><th className="col-deduct" colSpan="2"><span className="material-icons" style={{fontSize:14, verticalAlign:'middle'}}>remove_circle</span> 應扣項目</th></tr></thead>
        <tbody>
          <tr><td className="left col-deduct">勞保費{!calc.insFullMonth && <span style={{fontWeight:400}}>（按{calc.insLaborDays}天計）</span>}</td><td className="col-deduct">{money(calc.laborFee)}</td></tr>
          <tr><td className="left col-deduct">健保費{!calc.insActiveAtMonthEnd && <span style={{fontWeight:400}}>（月底已離職不收）</span>}{calc.insActiveAtMonthEnd && n(emp.dependentCount)>0 && <span style={{fontWeight:400}}>（含眷屬{Math.min(n(emp.dependentCount),3)}人）</span>}</td><td className="col-deduct">{money(calc.healthFee)}</td></tr>
          {show(n(entry.personalLeave)) && <tr><td className="left col-deduct">事假({n(entry.personalLeave)}hr)</td><td className="col-deduct">{money(calc.hourly*n(entry.personalLeave))}</td></tr>}
          {show(n(entry.sickLeave)) && <tr><td className="left col-deduct">病假({n(entry.sickLeave)}hr){calc.sickUnpaidHours>0 && <span style={{fontWeight:400, color:'var(--danger)'}}>（其中{calc.sickUnpaidHours}hr已達年度病假上限不給薪）</span>}</td><td className="col-deduct">{money(calc.hourly*0.5*calc.sickHalfPayHours + calc.hourly*calc.sickUnpaidHours)}</td></tr>}
          {show(n(entry.menstrualLeave)) && <tr><td className="left col-deduct">生理假（半薪{calc.menstrualHalfPayHours}hr／全薪{calc.menstrualPaidHours}hr不扣{calc.menstrualUnpaidHours>0 ? `／已達病假年度上限${calc.menstrualUnpaidHours}hr不給薪` : ''}）</td><td className="col-deduct">{money(calc.hourly*0.5*calc.menstrualHalfPayHours + calc.hourly*calc.menstrualUnpaidHours)}</td></tr>}
          {show(n(entry.disasterLeave)) && <tr><td className="left col-deduct">災防假({n(entry.disasterLeave)}hr)</td><td className="col-deduct">{money(calc.hourly*0*n(entry.disasterLeave))}</td></tr>}
          {show(n(entry.otherDeduction)) && <tr><td className="left col-deduct">其他扣款</td><td className="col-deduct">{money(entry.otherDeduction)}</td></tr>}
          <tr className="total-row"><td className="left">應扣合計</td><td>{money(calc.deductTotal)}</td></tr>
        </tbody>
      </table>

      <table style={{marginBottom:8}}>
        <colgroup><col /><col style={{width:100}} /></colgroup>
        <thead><tr><th className="col-add left"><span className="material-icons" style={{fontSize:14, verticalAlign:'middle'}}>add_circle</span> 業務／獎金加發項目（26日發放）</th><th className="col-add">金額</th></tr></thead>
        <tbody>
          {show(n(entry.businessExpense)) && <tr><td className="left col-add">業務費用</td><td className="col-add">{money(entry.businessExpense)}</td></tr>}
          {show(n(entry.salesPerformance)) && <tr><td className="left col-add">業績獎金</td><td className="col-add">{money(entry.salesPerformance)}</td></tr>}
          {show(n(entry.salesBonus26)) && <tr><td className="left col-add">其他獎金</td><td className="col-add">{money(entry.salesBonus26)}</td></tr>}
          {show(n(entry.otherExpense26)) && <tr><td className="left col-add">其他費用</td><td className="col-add">{money(entry.otherExpense26)}</td></tr>}
          {show(n(entry.deduction26)) && <tr><td className="left col-deduct">其他扣款</td><td className="col-deduct">{money(entry.deduction26)}</td></tr>}
        </tbody>
      </table>

      <div className="grand">
        <div className="grand-item"><span className="grand-label">{payDate06||'06日'}應付</span><span className="grand-num">{money(calc.pay06)}</span></div>
        <div className="grand-item"><span className="grand-label">{payDate26||'26日'}應付</span><span className="grand-num">{money(calc.pay26)}</span></div>
        <div className="grand-item grand-total"><span className="grand-label">合計 NT$</span><span className="grand-num">{money(calc.grandTotal)}</span></div>
      </div>
      <div className="foot-note">如有任何問題請提出，謝謝！本薪資條由系統自動產生，僅供內部核對使用。</div>
    </div>
  );
}

function getActualPayDateJS(year, month, day, holidaySet){
  let d = new Date(year, month-1, day);
  while(true){
    const dow = d.getDay();
    const dateStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(dow!==0 && dow!==6 && !holidaySet[dateStr]) return dateStr;
    d.setDate(d.getDate()-1);
  }
}

/* ========================= 匯款明細表 ========================= */
function TransferTab({rows, month}){
  const [period, setPeriod] = useState('06');
  const byCompany = useMemo(()=>{
    const g = {};
    rows.forEach(r => { const key = r.emp.company||'其他'; (g[key] = g[key]||[]).push(r); });
    return g;
  }, [rows]);

  function exportGroup(company, list){
    const headers = ['項次','姓名','銀行','帳號','金額','備註'];
    const data = list.map((r,idx)=>[idx+1, r.emp.name, r.emp.bankName, r.emp.bankAccount, Math.round(period==='06'?r.calc.pay06:r.calc.pay26), r.emp.note]);
    exportCSV(`匯款明細_${company}_${period}日_${month}.csv`, headers, data);
  }

  const companyEntries = Object.entries(byCompany).map(([company, list])=>{
    const active = list.filter(r => (period==='06'?r.calc.pay06:r.calc.pay26) !== 0);
    const total = active.reduce((s,r)=>s+(period==='06'?r.calc.pay06:r.calc.pay26),0);
    return {company, active, total};
  }).filter(g=>g.active.length>0);

  return (
    <div>
      <div className="toolbar no-print">
        <div style={{display:'flex', gap:6}}>
          <button className={period==='06'?'':'ghost'} onClick={()=>setPeriod('06')}>6號明細</button>

        <span className="grow"></span>
        <span className="hint">依公司分組列出應匯款人員與帳號，金額為 0 者不列出。</span>
        <button className="ghost sm" onClick={()=>window.print()}>列印本頁</button>
      </div>

      {companyEntries.length===0 && <div className="empty card">本期尚無需匯款資料</div>}

      {companyEntries.map(({company, active, total})=>(
        <div className="card" key={company} style={{overflowX:'auto'}}>
          <div className="toolbar" style={{marginBottom:8}}>
            <h3 style={{margin:0}}>{company} — {period}日 薪資轉帳明細表（{monthLabel(month)}）</h3>
            <span className="grow"></span>
            <button className="ghost sm no-print" onClick={()=>exportGroup(company, active)}>匯出 CSV</button>
          </div>
          <table style={{tableLayout:'fixed', width:'100%', minWidth:640}}>
            <colgroup>
              <col style={{width:'8%'}} /><col style={{width:'16%'}} /><col style={{width:'16%'}} />
              <col style={{width:'20%'}} /><col style={{width:'16%'}} /><col style={{width:'24%'}} />
            </colgroup>
            <thead><tr><th>項次</th><th>姓名</th><th>銀行</th><th>帳號</th><th>金額</th><th>備註</th></tr></thead>
            <tbody>
              {active.map((r,idx)=>(
                <tr key={r.emp.id}>
                  <td className="center">{idx+1}</td>
                  <td className="center">{r.emp.name}</td>
                  <td className="center">{r.emp.bankName}</td>
                  <td className="center mono">{r.emp.bankAccount || '（未登錄帳號）'}</td>
                  <td className="mono" style={{textAlign:'right'}}>{money(period==='06'?r.calc.pay06:r.calc.pay26)}</td>
                  <td className="center">{r.emp.note}</td>
                </tr>
              ))}
              <tr className="total-row"><td colSpan="4" className="center">總計</td><td className="mono" style={{textAlign:'right'}}>{money(total)}</td><td></td></tr>
            </tbody>

      ))}
    </div>
  );
}

function ShiftTab({employees}){

  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);

  function openNew(){ setEditing({id:null, name:'', workStart:'09:00', workEnd:'18:00', lunchBreak:60}); setIsNew(true); }

    if(!editing.name.trim()){ alert('請輸入班別名稱'); return; }

      if(isNew) await apiPost('addShift', editing);
      else await apiPost('updateShift', editing);

    finally{ setBusy(false); }

  return (

/* ========================= 特休設定 ========================= */
function AnnualLeaveTab({employees}){
  const [year, setYear] = useState(String(new Date().getFullYear()));
  const [system, setSystem] = useState('calendar');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [edits, setEdits] = useState({});
  const [savingId, setSavingId] = useState(null);
  const [estimatingId, setEstimatingId] = useState(null);
  const [batchBox, setBatchBox] = useState(null); // 批次試算預覽 {items, saving}
  const [batchLoading, setBatchLoading] = useState(false);

  function load(){
    setLoading(true);
    apiGet('getAnnualLeaveList', {year}).then(d=>{ setData(d); setEdits({}); }).catch(e=>alert(e.message)).finally(()=>setLoading(false));
  }
  useEffect(load, [year]);

  async function save(empId){
    const hours = Number(edits[empId]);
    if(isNaN(hours) || hours < 0){ alert('請輸入正確的時數'); return; }
    setSavingId(empId);
    try{
      await apiPost('setAnnualLeave', {employeeId: empId, year, hours});
      await load();
    }catch(e){ alert(e.message); }
    finally{ setSavingId(null); }
  }
  async function estimate(empId){
    setEstimatingId(empId);
    try{
      const r = await apiGet('estimateAnnualLeave', {employeeId: empId, year, system});
      setEdits({...edits, [empId]: r.hours});
    }catch(e){ alert(e.message); }
    finally{ setEstimatingId(null); }
  }

  async function batchEstimate(){
    setBatchLoading(true);
    try{
      const items = await apiGet('batchEstimateAnnualLeave', {year, system});
      setBatchBox({items, saving:false});
    }catch(e){ alert(e.message); }
    finally{ setBatchLoading(false); }
  }
  async function batchApply(){
    setBatchBox({...batchBox, saving:true});
    try{
      const items = batchBox.items.filter(it=>it.hours!==null).map(it=>({employeeId:it.employeeId, hours:it.hours}));
      const r = await apiPost('batchSaveAnnualLeave', {year, items});
      alert(`批次套用完成，共更新 ${r.saved} 位員工，請個別確認後如需微調可在下方表格調整。`);
      setBatchBox(null);
      await load();
    }catch(e){ alert(e.message); setBatchBox({...batchBox, saving:false}); }
  }

  const years = [];
  const thisYear = new Date().getFullYear();
  for(let y = thisYear + 1; y >= thisYear - 2; y--) years.push(String(y));

  return (
    <div>
      <div className="toolbar">
        <label style={{marginBottom:0}}>年度</label>
        <select value={year} onChange={e=>setYear(e.target.value)}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        <label style={{marginBottom:0}}>試算方式</label>
        <select value={system} onChange={e=>setSystem(e.target.value)}>
          <option value="calendar">歷年制（每年1/1~12/31）</option>
          <option value="anniversary">週年制（到職日起算）</option>
        </select>
        <span className="grow"></span>
        <button onClick={batchEstimate} disabled={batchLoading}>{batchLoading?'試算中...':'批次試算全部員工'}</button>
        <button className="ghost sm" onClick={load}><span className="material-icons" style={{fontSize:15}}>refresh</span>重新整理</button>
      </div>
      <div className="hint" style={{marginBottom:12}}>
        核定每位員工當年度的特休「時數」（1天＝8小時）。按「試算」可依到職日自動帶入建議天數，仍可手動調整後再儲存。
        <br/>⚠ 系統試算僅供參考，正式天數請以<a href="https://calcr2.mol.gov.tw/RestDays" target="_blank" rel="noopener" style={{color:'var(--brand)'}}>勞動部特別休假日數試算系統</a>或人資顧問確認為準。
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        {loading || !data ? <div className="hint">載入中...</div> : (
          <table style={{tableLayout:'fixed', minWidth:900}}>
            <colgroup>
              <col style={{width:'11%'}} /><col style={{width:'11%'}} /><col style={{width:'19%'}} />

function CompLedgerTab({employees}){
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [empFilter, setEmpFilter] = useState('');
  const [reminderDays, setReminderDays] = useState(30);

  function load(){
    setLoading(true);
    apiGet('getCompLedger', empFilter ? {employeeId:empFilter} : {}).then(setList).catch(e=>alert(e.message)).finally(()=>setLoading(false));
  }
  useEffect(load, [empFilter]);
  useEffect(()=>{ apiGet('getSettings').then(s=>setReminderDays(Number(s.compExpireReminderDays)||30)).catch(()=>{}); }, []);

  function expireStatus(expireDate){
    if(!expireDate) return '';
    const today = new Date().toISOString().slice(0,10);
    const deadline = new Date(Date.now() + reminderDays*86400000).toISOString().slice(0,10);
    if(expireDate < today) return 'expired';
    if(expireDate <= deadline) return 'soon';
    return '';
  }

  function doExport(){
    const headers = ['姓名','類型','時數','異動後餘額','說明','到期日','建立時間'];
    const rows = list.map(r=>[r.name, r.type, r.hours, r.balanceAfter, r.note, r.expireDate, r.createdAt]);
    exportCSV('加班補休明細表.csv', headers, rows);
  }

  return (
    <div>
      <div className="toolbar">
        <label style={{marginBottom:0}}>員工</label>
        <select value={empFilter} onChange={e=>setEmpFilter(e.target.value)}>
          <option value="">全部員工</option>
          {employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
        </select>
        <span className="grow"></span>
        <button className="ghost sm" onClick={load}><span className="material-icons" style={{fontSize:15}}>refresh</span>重新整理</button>
        <button className="ghost sm" onClick={doExport}><span className="material-icons" style={{fontSize:16}}>download</span>匯出 CSV</button>
      </div>
      <div className="hint" style={{marginBottom:12}}>每筆加班換補休核准後會自動「轉入」，員工請補休假核准後會自動「使用」扣抵，餘額為累計結果。到期日到了仍未使用完的補休，依規定應折算工資發給。到期日欄位：<span style={{color:'var(--danger)'}}>紅字</span>＝已過期，<span style={{color:'#B8860B'}}>橘字</span>＝即將到期（設定頁可調整提醒天數）。</div>
      <div className="card" style={{overflowX:'auto'}}>
        {loading ? <div className="hint">載入中...</div> : (
          <table>
            <thead><tr><th className="left">姓名</th><th className="left">類型</th><th>時數</th><th>異動後餘額</th><th className="left">說明</th><th className="left">到期日</th><th className="left">時間</th></tr></thead>
            <tbody>
              {list.map(r=>{
                const st = expireStatus(r.expireDate);
                return (
                  <tr key={r.id}>
                    <td className="left"><b>{r.name}</b></td>
                    <td className="left">{r.type==='加班轉入' ? <span className="badge">加班轉入</span> : <span className="badge warn">請假使用</span>}</td>
                    <td className={r.hours>=0?'num-pos':'num-neg'}>{r.hours>=0?'+':''}{r.hours}</td>
                    <td>{r.balanceAfter}</td>
                    <td className="left">{r.note}</td>
                    <td className="left" style={st==='expired'?{color:'var(--danger)', fontWeight:700}:st==='soon'?{color:'#B8860B', fontWeight:700}:undefined}>{r.expireDate}</td>
                    <td className="left">{r.createdAt}</td>
                  </tr>
                );
              })}
              {list.length===0 && <tr><td colSpan="7" className="hint" style={{textAlign:'center'}}>尚無補休紀錄</td></tr>}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function RichTextEditor({value, onChange}){
  const editorRef = useRef(null);
  const savedRangeRef = useRef(null);
  const fileInputRef = useRef(null);
  const [uploading, setUploading] = useState(false);

  useEffect(()=>{
    if(editorRef.current) editorRef.current.innerHTML = value || '';
  }, []); // 只在掛載時同步一次，避免打字中被重置游標位置

  function saveSelection(){
    const sel = window.getSelection();
    if(sel && sel.rangeCount > 0 && editorRef.current && editorRef.current.contains(sel.anchorNode)){
      savedRangeRef.current = sel.getRangeAt(0);
    }
  }
  function restoreSelection(){
    if(!savedRangeRef.current) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRangeRef.current);
  }
  function exec(cmd, arg){
    editorRef.current.focus();
    restoreSelection();
    document.execCommand(cmd, false, arg || null);
    onChange(editorRef.current.innerHTML);
  }
  function toggleAccentColor(){
    editorRef.current.focus();
    restoreSelection();
    const current = document.queryCommandValue('foreColor');
    const isAccent = current === 'rgb(161, 61, 61)' || current === '#a13d3d';
    document.execCommand('foreColor', false, isAccent ? '#22242C' : '#a13d3d');
    onChange(editorRef.current.innerHTML);
  }
  function onLink(){
    const url = prompt('請輸入連結網址（需包含 https://）');
    if(!url) return;
    exec('createLink', url);
  }
  function onPickImage(){
    saveSelection();
    fileInputRef.current && fileInputRef.current.click();
  }
  function compressImage(file){
    return new Promise((resolve, reject)=>{
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = ()=>{
        const MAX = 1000;
        let w = img.width, h = img.height;
        if(w > MAX || h > MAX){ const s = MAX/Math.max(w,h); w = Math.round(w*s); h = Math.round(h*s); }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL('image/jpeg', 0.82).split(',')[1]);
      };
      img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('圖片讀取失敗')); };
      img.src = url;
    });
  }
  async function onFileChange(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if(!file) return;
    setUploading(true);
    try{
      const base64 = await compressImage(file);
      const data = await apiPost('uploadAnnouncementImage', {imageBase64: base64, mimeType:'image/jpeg'});
      editorRef.current.focus();
      restoreSelection();
      document.execCommand('insertHTML', false, `<img src="${data.url}" style="max-width:100%;border-radius:8px;margin:6px 0;display:block;" />`);
      onChange(editorRef.current.innerHTML);
    }catch(err){ alert(err.message); }
    finally{ setUploading(false); }
  }

  const btnStyle = {padding:'4px 8px', minWidth:0};
  return (
    <div>
      <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:6, background:'var(--bg-2, #f2f2f2)', padding:6, borderRadius:8}}>
        <button type="button" className="ghost sm" style={btnStyle} title="粗體" onMouseDown={e=>e.preventDefault()} onClick={()=>exec('bold')}><span className="material-icons" style={{fontSize:16}}>format_bold</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="斜體" onMouseDown={e=>e.preventDefault()} onClick={()=>exec('italic')}><span className="material-icons" style={{fontSize:16}}>format_italic</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="底線" onMouseDown={e=>e.preventDefault()} onClick={()=>exec('underline')}><span className="material-icons" style={{fontSize:16}}>format_underlined</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="強調色（先選取文字，再點一下套用，選取後再點一次可以復原）" onMouseDown={e=>e.preventDefault()} onClick={toggleAccentColor}><span className="material-icons" style={{fontSize:16, color:'var(--danger)'}}>format_color_text</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="項目符號" onMouseDown={e=>e.preventDefault()} onClick={()=>exec('insertUnorderedList')}><span className="material-icons" style={{fontSize:16}}>format_list_bulleted</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="編號清單" onMouseDown={e=>e.preventDefault()} onClick={()=>exec('insertOrderedList')}><span className="material-icons" style={{fontSize:16}}>format_list_numbered</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="超連結" onMouseDown={e=>e.preventDefault()} onClick={onLink}><span className="material-icons" style={{fontSize:16}}>link</span></button>
        <button type="button" className="ghost sm" style={btnStyle} title="插入圖片" disabled={uploading} onMouseDown={e=>e.preventDefault()} onClick={onPickImage}><span className="material-icons" style={{fontSize:16}}>{uploading?'hourglass_top':'image'}</span></button>
        <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFileChange} />
      </div>
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        onInput={()=>onChange(editorRef.current.innerHTML)}
        onMouseUp={saveSelection}
        onKeyUp={saveSelection}
        style={{minHeight:120, maxHeight:320, overflowY:'auto', border:'1px solid var(--line)', borderRadius:6, padding:10, fontSize:13, lineHeight:1.7}}
      />
    </div>
  );
}

                  {a.attachments.map((att,idx)=>(
                    <a key={idx} href={att.url} target="_blank" rel="noopener noreferrer" className="hint" style={{display:'flex', alignItems:'center', gap:4, background:'var(--bg-2,#f2f2f2)', padding:'4px 8px', borderRadius:6, fontSize:12}}>
                      <span className="material-icons" style={{fontSize:15}}>{attachIcon(att.name)}</span>{att.name}
                    </a>
                  ))}
                </div>
              )}
              <button className="ghost sm" style={{marginTop:10}} onClick={()=>setExpanded(null)}><span className="material-icons" style={{fontSize:15}}>expand_less</span>收合</button>
            </div>
          ) : (
            <div className="row-between" style={{cursor:'pointer', gap:8}} onClick={()=>setExpanded(a.id)}>
              <div className="hint" style={{fontSize:13, flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{stripHtml(a.content) || '（無內容）'}</div>
              <div style={{display:'flex', alignItems:'center', gap:4, flexShrink:0, color:'var(--muted)'}}>
                {a.attachments && a.attachments.length > 0 && (
                  <span style={{display:'flex', alignItems:'center', gap:2, fontSize:12}}><span className="material-icons" style={{fontSize:15}}>attach_file</span>{a.attachments.length}</span>
                )}
                <span className="material-icons" style={{fontSize:18}}>expand_more</span>
              </div>
            </div>
          )}
        </div>
        );
      })}

      {editing && (
        <div className="modal-bg">
          <div className="modal">
            <h3><span className="material-icons">campaign</span>{isNew?'發布公告':'編輯公告'}</h3>
            <div className="field"><label>標題 *</label><input value={editing.title} onChange={e=>setEditing({...editing,title:e.target.value})} style={{width:'100%'}} /></div>
            <div className="field"><label>內容</label><RichTextEditor value={editing.content} onChange={html=>setEditing(prev=>({...prev, content:html}))} /></div>
            <div className="field">
              <label>附件（PDF、Word、Excel等檔案，非圖片）</label>
              <div style={{display:'flex', flexDirection:'column', gap:6}}>
                {(editing.attachments||[]).map((att,idx)=>(
                  <div className="row-between" key={idx} style={{background:'var(--bg-2, #f2f2f2)', padding:'6px 10px', borderRadius:6}}>
                    <div style={{display:'flex', alignItems:'center', gap:8, minWidth:0}}>
                      <span className="material-icons" style={{fontSize:18, color:'var(--muted)'}}>{attachIcon(att.name)}</span>
                      <a href={att.url} target="_blank" rel="noopener noreferrer" style={{fontSize:13, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{att.name}</a>
                      <span className="hint" style={{fontSize:11, flexShrink:0}}>{fileSizeText(att.size)}</span>
                    </div>
                    <button type="button" className="ghost sm" onClick={()=>removeAttachment(idx)}><span className="material-icons" style={{fontSize:14}}>close</span></button>
                  </div>
                ))}
                <button type="button" className="ghost sm" disabled={attachUploading} onClick={()=>attachInputRef.current && attachInputRef.current.click()} style={{alignSelf:'flex-start'}}>
                  <span className="material-icons" style={{fontSize:15}}>{attachUploading?'hourglass_top':'attach_file'}</span>{attachUploading?'上傳中...':'新增附件'}
                </button>
                <input ref={attachInputRef} type="file" style={{display:'none'}} onChange={onAttachFileChange} />
              </div>
            </div>
            <div className="grid-2">
              <div className="field"><label>發布對象</label>
                <select value={editing.companyId} onChange={e=>setEditing({...editing,companyId:e.target.value})}>
                  <option value="">全公司</option>
                  {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div className="field"><label>狀態</label>
                <select value={editing.status} onChange={e=>setEditing({...editing,status:e.target.value})}>
                  <option value="已發布">已發布</option>
                  <option value="草稿">草稿（員工看不到）</option>
                </select>
              </div>
            </div>
            <label style={{display:'flex', alignItems:'center', gap:6, fontSize:13, color:'var(--ink)'}}>
              <input type="checkbox" checked={editing.pinned} onChange={e=>{ const checked=e.target.checked; setEditing({...editing, pinned:checked, showOnHome: checked ? editing.showOnHome : false}); }} style={{width:'auto'}} />置頂
            </label>
            <label style={{display:'flex', alignItems:'center', gap:6, fontSize:13, color: editing.pinned?'var(--ink)':'var(--muted)', marginTop:6}}>
              <input type="checkbox" checked={!!editing.showOnHome} disabled={!editing.pinned} onChange={e=>setEditing({...editing,showOnHome:e.target.checked})} style={{width:'auto'}} />
              顯示在首頁{!editing.pinned && <span className="hint" style={{marginLeft:4, marginTop:0, fontSize:13}}>（需先勾選「置頂」）</span>}
            </label>
            <div className="field" style={{marginTop:14}}>
              <label>分類（選填）</label>
              <select value={editing.category||''} onChange={e=>{
                const name = e.target.value;
                const cat = categories.find(c=>c.name===name);
                setEditing({...editing, category:name, categoryColor: cat?cat.color:''});
              }}>
                <option value="">無分類</option>
                {categories.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
              </select>
              {editing.category && (
                <div style={{display:'flex', alignItems:'center', gap:6, marginTop:6}}>
                  <span style={{width:14, height:14, borderRadius:'50%', background:editing.categoryColor, display:'inline-block'}}></span>
                  <span className="hint">預覽顏色</span>
                </div>
              )}
              {categories.length===0 && <div className="hint" style={{marginTop:4}}>還沒有建立任何分類，按上方「管理分類」新增。</div>}
            </div>
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setEditing(null)}>取消</button>
              <button onClick={save} disabled={saving}>{saving?'儲存中...':'儲存'}</button>
            </div>
          </div>
        </div>
      )}

      {categoryBox && (
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:420}}>
            <h3><span className="material-icons">sell</span>管理分類</h3>
            {categories.length===0 ? <div className="hint" style={{marginBottom:10}}>還沒有任何分類。</div> : (
              <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
                {categories.map(c=>(
                  <div className="row-between" key={c.id} style={{background:'var(--bg-2,#f2f2f2)', padding:'8px 10px', borderRadius:6}}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <span style={{width:16, height:16, borderRadius:'50%', background:c.color, display:'inline-block'}}></span>
                      <span>{c.name}</span>
                    </div>
                    <button type="button" className="ghost sm" onClick={()=>removeCategoryItem(c.id)}><span className="material-icons" style={{fontSize:14}}>close</span></button>
                  </div>
                ))}
              </div>
            )}
            <div className="field">
              <label>新增分類</label>
              <div style={{display:'flex', gap:8, marginBottom:8}}>
                {CATEGORY_COLORS.map(c=>(
                  <div key={c} onClick={()=>setCategoryBox({...categoryBox, newColor:c})}
                    style={{width:26, height:26, borderRadius:'50%', background:c, cursor:'pointer', border: categoryBox.newColor===c ? '2px solid var(--ink)' : '2px solid transparent'}} />
                ))}
              </div>
              <div style={{display:'flex', gap:8}}>
                <input value={categoryBox.newName} onChange={e=>setCategoryBox({...categoryBox, newName:e.target.value})} placeholder="例如：緊急通知" style={{flex:1}} />
                <button onClick={addCategoryItem} disabled={categoryBox.saving}>{categoryBox.saving?'新增中...':'新增'}</button>
              </div>
            </div>
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setCategoryBox(null)}>關閉</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 系統設定 ========================= */
function SettingsTab({onSaved}){
  const [s, setS] = useState(null);

  const [locating, setLocating] = useState(false);
  const [category, setCategory] = useState('basic');
  const DOW = ['日','一','二','三','四','五','六'];

  function load(){ setLoading(true); apiGet('getSettings').then(setS).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, []);

  async function save(){
    try{ await apiPost('updateSettings', s); alert('設定已儲存'); if(onSaved) onSaved(); }catch(e){ alert(e.message); }
  }
  function useCurrentLocation(){
    setLocating(true);
    navigator.geolocation.getCurrentPosition(
      pos => { setS({...s, lat: pos.coords.latitude, lng: pos.coords.longitude}); setLocating(false); },
      err => { alert('定位失敗：' + err.message); setLocating(false); },

      <div className="field"><label>顯示名稱</label><input value={s.storeName} onChange={e=>setS({...s,storeName:e.target.value})} style={{width:'100%'}} /></div>

      <h3 style={{marginTop:18}}><span className="material-icons">palette</span> 後台介面配色</h3>
      <div className="hint" style={{marginTop:-4, marginBottom:8}}>這裡選的配色，所有登入後台的人看到的都一樣。員工前台有自己獨立的配色選項（在前台右上角自己切換），不會互相影響。</div>
      <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
        {ADMIN_THEME_PALETTES.map(t=>(
          <div key={t.id} onClick={()=>setS({...s, themeColor:t.id})}
            style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6, cursor:'pointer', padding:8, borderRadius:10,
              border: (s.themeColor||'default')===t.id ? '2px solid '+t.accent : '1px solid var(--line)'}}>
            <span style={{width:32, height:32, borderRadius:'50%', background:t.dark, border:'3px solid '+t.accent}}></span>
            <span style={{fontSize:12}}>{t.name}</span>
          </div>
        ))}
      </div>

      <h3 style={{marginTop:18}}><span className="material-icons">wb_sunny</span> 首頁天氣顯示</h3>
      <div className="field">
        <label>資料來源</label>
        <select value={s.weatherSource||'open-meteo'} onChange={e=>setS({...s,weatherSource:e.target.value})}>
          <option value="open-meteo">Open-Meteo（免設定，直接用上方GPS座標）</option>
          <option value="cwa">中央氣象署（需自行申請API Key）</option>
        </select>
      </div>
      {s.weatherSource==='cwa' && (
        <div className="grid-2">
          <div className="field">
            <label>中央氣象署 API Key</label>

          </div>

            <label>所在縣市</label>
            <select value={s.cwaCity||''} onChange={e=>setS({...s,cwaCity:e.target.value})}>

              {['臺北市','新北市','桃園市','臺中市','臺南市','高雄市','基隆市','新竹市','新竹縣','苗栗縣','彰化縣','南投縣','雲林縣','嘉義市','嘉義縣','屏東縣','宜蘭縣','花蓮縣','臺東縣','澎湖縣','金門縣','連江縣'].map(c=><option key={c} value={c}>{c}</option>)}

      <AddressGeocodeField lat={s.lat} lng={s.lng} onFound={(lat,lng)=>setS({...s, lat, lng})} />

        <div className="field"><label>緯度</label><input value={s.lat} onChange={e=>setS({...s,lat:e.target.value})} /></div>

      <h3 style={{marginTop:18}}><span className="material-icons">schedule</span> 預設班表</h3>
      <div className="hint" style={{marginTop:-4, marginBottom:8}}>員工若在「員工資料」未指定班別，會套用這裡的預設班表。</div>
      <div className="grid-2">
        <div className="field"><label>上班時間</label><input type="time" value={s.workStart} onChange={e=>setS({...s,workStart:e.target.value})} /></div>
        <div className="field"><label>下班時間</label><input type="time" value={s.workEnd} onChange={e=>setS({...s,workEnd:e.target.value})} /></div>

          <select value={s.mandatoryRestDay} onChange={e=>setS({...s,mandatoryRestDay:Number(e.target.value)})}>{DOW.map((d,i)=><option key={i} value={i}>星期{d}</option>)}</select>
        </div>
        <div className="field"><label>平日加班月上限（小時）</label><input type="number" value={s.monthlyOtCap} onChange={e=>setS({...s,monthlyOtCap:e.target.value})} /></div>
        <div className="field">
          <label>例假日出勤薪資算法</label>
          <select value={s.mandatoryRestPayMode || 'double'} onChange={e=>setS({...s,mandatoryRestPayMode:e.target.value})}>
            <option value="double">優於勞基法（時薪 × 2倍）</option>
            <option value="legal">依勞基法（加發一日工資＋超過8小時比照平日加班費）</option>
          </select>
          <div className="hint" style={{marginTop:4}}>例假日原則不可出勤，僅天災事變等特殊狀況例外（勞基法第40條），事後仍須完成補休登記。</div>

      </>)}

      {category==='leave' && (<>
      <h3><span className="material-icons">event_available</span> 請假與補休規則</h3>

      <h3 style={{marginTop:18}}><span className="material-icons">verified</span> 全勤獎金比例扣除</h3>
      <div className="hint" style={{marginTop:-4, marginBottom:8}}>依2026年新制《勞工請假規則》第9條，全勤獎金扣發不得「全有全無」，一律按比例計算。病假、事假時數會依比例自動扣（時數÷240）；婚喪公傷病假、公假、生理假等法定假別不受影響。⚠ 目前「事假」尚未區分一般事假／家庭照顧事假，所有事假時數都會列入扣除，如需區分請告知。</div>
      <div className="field"><label>遲到／早退計算方式</label>
        <select value={s.fullAttendanceLateEarlyMode || 'minutes'} onChange={e=>setS({...s,fullAttendanceLateEarlyMode:e.target.value})}>
          <option value="minutes">只算累積分鐘數比例</option>
          <option value="count">只算次數階梯扣除</option>
          <option value="both">兩者都算（分鐘數＋次數）</option>
        </select>
        <div className="hint" style={{marginTop:4}}>遲到、早退合併計算（同一組規則）。分鐘數比例＝全勤獎金÷240小時÷60分鐘×累積分鐘數。</div>
      </div>
      {(s.fullAttendanceLateEarlyMode==='count' || s.fullAttendanceLateEarlyMode==='both') && (
        <div className="grid-2">
          <div className="field"><label>前幾次不扣（遲到+早退合計）</label><input type="number" min="0" value={s.fullAttendanceLateEarlyFreeCount} onChange={e=>setS({...s,fullAttendanceLateEarlyFreeCount:e.target.value})} /></div>
          <div className="field"><label>超過後每次扣全勤獎金（%）</label><input type="number" min="0" max="100" value={s.fullAttendanceLateEarlyPercentPerCount} onChange={e=>setS({...s,fullAttendanceLateEarlyPercentPerCount:e.target.value})} /></div>
        </div>
      )}
      </>)}

      <div style={{marginTop:16}}><button onClick={save}><span className="material-icons" style={{fontSize:16}}>save</span>儲存設定</button></div>
    </div>
    </div>
  );
}

<script>
(function(){
  function showError(msg){
    var box = document.getElementById('boot-error');
    if(box){ box.style.display='block'; box.textContent = msg; }
  }
  window.addEventListener('error', function(e){
    showError('頁面發生錯誤：' + (e.message||e.error) + '\n(檔案:' + (e.filename||'') + ' 行:' + (e.lineno||'') + ')');
  });
  window.addEventListener('unhandledrejection', function(e){
    showError('未處理的錯誤：' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  function loadScript(src){
    return new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = function(){ reject(new Error(src + ' 載入失敗')); };
      document.head.appendChild(s);
    });
  }
  function loadWithFallback(urls, idx){
    idx = idx || 0;
    if(idx >= urls.length) return Promise.reject(new Error('所有來源皆載入失敗：' + urls.join(' / ')));
    return loadScript(urls[idx]).catch(function(){ return loadWithFallback(urls, idx+1); });
  }

  var CDN = {
    react: ['https://unpkg.com/react@18/umd/react.production.min.js', 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'],
    reactDom: ['https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'],
    babel: ['https://unpkg.com/@babel/standalone/babel.min.js', 'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js']
  };

  loadWithFallback(CDN.react)
    .then(function(){ return loadWithFallback(CDN.reactDom); })
    .then(function(){ return loadWithFallback(CDN.babel); })
    .then(function(){
      var src = document.getElementById('app-src').textContent;
      var compiled = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
      var statusEl = document.getElementById('boot-status');
      if(statusEl) statusEl.remove();
      (0, eval)(compiled);
    })
    .catch(function(err){
      showError('必要程式庫載入失敗，畫面因此空白。\n原因：' + err.message + '\n\n最常見情況：瀏覽器擴充功能（例如廣告攔截／隱私保護外掛）封鎖了 unpkg.com 或 jsdelivr.net，或目前網路無法連線到這兩個網域。\n\n請嘗試：\n1. 停用廣告攔截類擴充功能後重新整理本頁\n2. 改用無痕視窗開啟同一網址測試\n3. 確認網路能連上 unpkg.com 與 cdn.jsdelivr.net');
    });
})();
</script>
</body>
</html>
