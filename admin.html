<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>後台管理 · 出缺勤與薪資系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root{
    --ink:#22242C; --paper:#F2F2F2; --paper-2:#ffffff; --line:#DCDCDC;
    --brand:#00ADB5; --brand-dark:#222831; --accent:#00ADB5; --danger:#a13d3d; --muted:#6D7278;
    --income:#00858C; --outcome:#a13d3d;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Noto Sans TC',sans-serif; font-size:14px;}
  h1,h2,h3{font-family:'Noto Sans TC',sans-serif; font-weight:700; margin:0 0 6px 0;}
  .mono{font-family:'Roboto Mono',monospace;}
  .material-icons{font-size:19px; vertical-align:middle; line-height:1;}
  .app-shell{display:flex; min-height:100vh;}
  .sidebar{width:212px; flex-shrink:0; background:var(--brand-dark); color:#EEEEEE; padding:22px 0; display:flex; flex-direction:column;}
  .brand{padding:0 18px 18px 18px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:10px;}
  .brand .mark{font-family:'Noto Sans TC',sans-serif; font-size:19px; font-weight:700; color:#f3ead3;}
  .brand .sub{font-size:11px; color:#b9c9bf; margin-top:2px;}
  .navitem{padding:10px 18px; cursor:pointer; font-size:13px; border-left:3px solid transparent; color:#d9dfd5; display:flex; align-items:center; gap:9px;}
  .navitem:hover{background:rgba(255,255,255,.06);}
  .navitem.active{background:rgba(255,255,255,.1); border-left-color:var(--accent); color:#fff; font-weight:700;}
  .navitem .material-icons{font-size:18px; color:#A6ACB3;}
  .navitem.active .material-icons{color:var(--accent);}
  .nav-group-label{padding:14px 18px 4px 18px; font-size:10.5px; letter-spacing:1px; color:#8fa397; text-transform:uppercase;}
  .main{flex:1; min-width:0;}
  .topbar{background:var(--paper-2); border-bottom:1px solid var(--line); padding:12px 26px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;}
  .topbar h1{font-size:17px; display:flex; align-items:center; gap:8px;}
  .content{padding:22px 26px 60px 26px; overflow-x:auto;}
  button{font-size:13px; background:var(--brand); color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  button:hover{background:var(--brand-dark);}
  button.ghost{background:transparent; color:var(--brand); border:1px solid var(--brand);}
  button.ghost:hover{background:var(--brand); color:#fff;}
  button.danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  button.danger:hover{background:var(--danger); color:#fff;}
  button.sm{padding:4px 9px; font-size:12px;}
  button.icon-btn{background:transparent; color:var(--muted); padding:5px; border-radius:50%;}
  button.icon-btn:hover{background:#EDEDED; color:var(--brand-dark);}
  button:disabled{opacity:.45; cursor:not-allowed;}
  input,select{font-size:13px; border:1px solid var(--line); border-radius:6px; padding:7px 9px; background:#fff; color:var(--ink);}
  input[type=number]{font-family:'Roboto Mono',monospace;}
  input[type=date]::-webkit-calendar-picker-indicator{ margin-right:2px; padding:3px; }
  label{font-size:12px; color:var(--muted); display:block; margin-bottom:3px;}
  .field{margin-bottom:10px;}
  table{border-collapse:collapse; width:100%; background:var(--paper-2); font-size:12.5px;}
  th,td{border:1px solid var(--line); padding:6px 8px; text-align:right; white-space:nowrap;}
  th{background:#EDEDED; color:var(--brand-dark); text-align:center;}
  td.left,th.left{text-align:left;}
  td input[type=number]{width:64px; text-align:right; padding:4px 5px;}
  tr.total-row td{background:#EDEDED; font-weight:700;}
  .num-pos{color:var(--income);}
  .num-neg{color:var(--outcome);}
  .card{background:var(--paper-2); border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:18px;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:0 18px;}
  .badge{display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:2px 9px; border-radius:20px; background:#D6F1F2; color:var(--brand-dark); font-weight:700;}
  .badge.warn{background:#f6d9ce; color:#7a3b1e;}
  .badge .material-icons{font-size:13px;}
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px;}
  .toolbar .grow{flex:1;}
  .hint{font-size:11.5px; color:var(--muted); margin-top:4px;}
  .empty{padding:40px; text-align:center; color:var(--muted);}
  .modal-bg{position:fixed; inset:0; background:rgba(20,26,20,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; z-index:50;}
  .modal{background:#fff; border-radius:10px; padding:22px 26px; width:640px; max-width:100%;}
  .modal h3{margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:16px; border-top:1px solid var(--line); padding-top:14px;}
  .config-warn{background:#3a2317; border:1px solid #6b4326; color:#f0caa0; padding:14px 18px; border-radius:10px; max-width:640px; font-size:13px; margin-bottom:20px;}
  .config-warn code{background:#00000030; padding:1px 5px; border-radius:3px;}
  .flag{color:var(--danger); font-weight:700;}

  .payslip{
    background:#fff; border:1.5px solid var(--brand-dark); padding:18px 20px;
    max-width:640px; margin:0 auto 24px auto; page-break-after:always;
  }
  .payslip h2{font-size:15px; text-align:center; border-bottom:2px solid var(--brand-dark); padding-bottom:8px; margin-bottom:10px;}
  .payslip .meta{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:10px;}
  .payslip table{font-size:12px;}
  .payslip th{background:#EDEDED;}
  .payslip .grand{
    display:flex; justify-content:space-between; align-items:center;
    background:#EDEDED; padding:10px 14px; margin-top:10px; border-radius:4px;
    font-family:'Roboto Mono',monospace; font-size:16px; font-weight:700; color:var(--brand-dark);
  }
  .payslip .foot-note{font-size:11px; color:var(--muted); margin-top:10px;}

  /* 登入畫面 */
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% -10%, #282E38, #1a1e24 65%);
    padding:20px;
  }
  .login-card{
    background:#fff; border-radius:14px; padding:38px 34px; width:360px; max-width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,.35); text-align:center;
  }
  .login-card .mark-icon{
    width:52px; height:52px; border-radius:14px; background:var(--brand); color:#fff;
    display:flex; align-items:center; justify-content:center; margin:0 auto 14px auto;
  }
  .login-card h2{font-size:17px; margin-bottom:4px;}
  .login-card .sub{font-size:12px; color:var(--muted); margin-bottom:22px;}
  .login-card .field{text-align:left;}
  .login-card input{width:100%; padding:11px 12px;}
  .login-card button{width:100%; justify-content:center; padding:11px 0; font-size:14px; margin-top:6px;}
  .login-card .err{color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px;}

  @media print{
    .no-print{display:none !important;}
    .sidebar,.topbar,.toolbar{display:none !important;}
    body{background:#fff;}
    .content{padding:0;}
    .card{border:none;}
  }
</style>
</head>

const {useState, useEffect, useMemo, useRef} = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzW7073VQtPGa9cIn-pBNdfLClDdkEn8eBGVzDSkv26ZZWiHGcD5wikhx7KL5l4mlsC/exec';
const TOKEN_KEY = 'admin_session_token';

let CURRENT_TOKEN = null;
try{ CURRENT_TOKEN = localStorage.getItem(TOKEN_KEY) || null; }catch(e){}
function setToken(t){
  CURRENT_TOKEN = t;
  try{ if(t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }catch(e){}
}
function isSessionError(msg){
  return typeof msg === 'string' && (msg.indexOf('登入已逾時') !== -1 || msg.indexOf('請先登入') !== -1);
}
function forceReLogin(){
  setToken(null);
  try{ location.reload(); }catch(e){}
}

async function apiGet(action, params={}){
  const qs = new URLSearchParams({action, token: CURRENT_TOKEN||'', ...params}).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  const json = await res.json();
  if(json.status !== 'success'){
    if(isSessionError(json.message)) forceReLogin();
    throw new Error(json.message || '發生錯誤');
  }
  return json.data;
}
async function apiPost(action, body={}){
  const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action, token: CURRENT_TOKEN, ...body})});
  const json = await res.json();
  if(json.status !== 'success'){
    if(isSessionError(json.message)) forceReLogin();
    throw new Error(json.message || '發生錯誤');
  }
  return json.data;
}
function todayMonth(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(m){
  if(!m) return '';
  const [y,mo] = m.split('-');
  return (Number(y)-1911) + '年' + Number(mo) + '月 (' + m + ')';
}
function exportCSV(filename, headers, rows){
  const esc = v => '"' + String(v ?? '').replace(/"/g,'""') + '"';
  const lines = [headers.map(esc).join(',')].concat(rows.map(r=>r.map(esc).join(',')));
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}
const n = v => { const x = Number(v); return isNaN(x) ? 0 : x; };
const money = v => Math.round(n(v)).toLocaleString('zh-TW');
function tenureText(hireDate){
  if(!hireDate) return '未設定到職日';
  const h = new Date(hireDate);
  if(isNaN(h.getTime())) return '到職日格式錯誤';
  const now = new Date();
  let months = (now.getFullYear()-h.getFullYear())*12 + (now.getMonth()-h.getMonth());
  if(now.getDate() < h.getDate()) months -= 1;
  const y = Math.floor(months/12), m = months%12;
  let leave = 0;
  const years = months/12;
  if(years >= 10) leave = Math.min(30, 16 + Math.floor(years-10));
  else if(years >= 5) leave = 15;
  else if(years >= 3) leave = 14;
  else if(years >= 2) leave = 10;
  else if(years >= 1) leave = 7;
  else if(months >= 6) leave = 3;
  return `到職年資約 ${y} 年 ${m} 個月，依勞基法第 38 條參考特休天數：約 ${leave} 天（僅供參考，請以實際規定核算）`;
}

function findInsurance(grade){
  if(!grade) return null;
  let exact = INSURANCE_TABLE.find(r => r.grade === Number(grade));
  if(exact) return exact;
  const sorted = [...INSURANCE_TABLE].sort((a,b)=>a.grade-b.grade);
  let candidate = sorted.find(r => r.grade >= Number(grade));
  return candidate || sorted[sorted.length-1];
}
function suggestGrade(salary){
  const s = Number(salary)||0;
  const sorted = [...INSURANCE_TABLE].filter(r=>r.grade>=11100).sort((a,b)=>a.grade-b.grade);
  const c = sorted.find(r => r.grade >= s);
  return c ? c.grade : sorted[sorted.length-1].grade;
}

/* ========================= 台灣勞基法相關常數（115年/2026年適用） ========================= */
const MIN_WAGE_MONTHLY = 29500;
const MIN_WAGE_HOURLY = 196;
const MONTHLY_OT_CAP_DEFAULT = 46;

function emptyEntry(){
  return {
    otWeekday134:0, otWeekday167:0, otRestDayHours:0, otHolidayHours:0, otMandatoryRestHours:0,
    festivalBonus:0, yearEndBonus:0, otherBonus:0, performanceBonus:0,
    personalLeave:0, sickLeave:0, disasterLeave:0, otherLeave:0,
    annualLeaveSettlement:0,
    businessExpense:0, salesPerformance:0, otherExpense26:0, salesBonus26:0, deduction26:0,
    otherDeduction:0, note:''
  };
}
function calcRestDayPay(hourly, hours){
  const h = n(hours);
  if(h<=0) return {pay:0, countedHours:0, overCap:false};
  const counted = h<=4 ? 4 : (h<=8 ? 8 : (h<=12 ? 12 : h));
  const t1 = Math.min(counted,2);
  const t2 = Math.min(Math.max(counted-2,0),6);
  const t3 = Math.max(counted-8,0);
  const pay = hourly*1.34*t1 + hourly*1.67*t2 + hourly*2.67*t3;
  return {pay, countedHours:counted, overCap: h>12};
}
function calcHolidayPay(hourly, dailyWage, hours){
  const h = n(hours);
  if(h<=0) return {pay:0};
  const excess = Math.max(0, h-8);
  const ot134 = Math.min(excess,2);
  const ot167 = Math.max(excess-2,0);
  return {pay: dailyWage + hourly*1.34*ot134 + hourly*1.67*ot167};
}
function calcForEmployee(emp, entryRaw){
  const entry = {...emptyEntry(), ...(entryRaw||{})};
  const base = n(emp.baseSalary);
  const hourly = base>0 ? base/240 : 0;
  const dailyWage = base>0 ? base/30 : 0;

  const weekdayOtPay = hourly*1.34*n(entry.otWeekday134) + hourly*1.67*n(entry.otWeekday167);
  const restDay = calcRestDayPay(hourly, entry.otRestDayHours);
  const holiday = calcHolidayPay(hourly, dailyWage, entry.otHolidayHours);
  const mandatoryRestPay = hourly*2*n(entry.otMandatoryRestHours);
  const overtimePay = weekdayOtPay + restDay.pay + holiday.pay + mandatoryRestPay;
  const monthlyOtHours = n(entry.otWeekday134) + n(entry.otWeekday167);

  const allowanceTotal = n(emp.mealAllowance)+n(emp.transportAllowance)+n(emp.positionAllowance)+n(emp.fullAttendanceBonus);
  const bonusTotal = n(entry.festivalBonus)+n(entry.yearEndBonus)+n(entry.otherBonus)+n(entry.performanceBonus);

  const payableA = base + allowanceTotal + bonusTotal + n(entry.annualLeaveSettlement);
  const payableTotal = payableA + overtimePay;

  const ins = findInsurance(emp.insuranceGrade);
  const laborFee = ins ? ins.empLabor : 0;
  const healthFee = ins ? ins.empHealth : 0;

  const leaveDeduct = hourly*1.0*n(entry.personalLeave) + hourly*0.5*n(entry.sickLeave) + hourly*0*n(entry.disasterLeave) + hourly*1.0*n(entry.otherLeave);
  const deductTotal = laborFee + healthFee + leaveDeduct + n(entry.otherDeduction);

  const pay06 = payableTotal - deductTotal;
  const pay26 = n(entry.businessExpense)+n(entry.salesPerformance)+n(entry.otherExpense26)+n(entry.salesBonus26)-n(entry.deduction26);
  const grandTotal = pay06 + pay26;

  const recurringPay = base + n(emp.mealAllowance)+n(emp.transportAllowance)+n(emp.positionAllowance);
  const belowMinWage = base>0 && recurringPay < MIN_WAGE_MONTHLY;

  return {
    hourly, dailyWage, overtimePay, weekdayOtPay, restDayPay:restDay.pay, holidayPay:holiday.pay, mandatoryRestPay,
    restDayCountedHours: restDay.countedHours, restDayOverCap: restDay.overCap, monthlyOtHours,
    allowanceTotal, bonusTotal, payableA, payableTotal,
    laborFee, healthFee, leaveDeduct, deductTotal, pay06, pay26, grandTotal, belowMinWage
  };
}


/* ========================= 登入畫面 ========================= */
function LoginScreen({onLoggedIn, storeName}){
  const [account, setAccount] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(ev){
    ev.preventDefault();
    setErr(''); setLoading(true);
    try{
      const data = await apiPost('login', {account, password});
      if(data.role !== 'admin'){ setErr('此帳號沒有後台管理權限'); setLoading(false); return; }
      setToken(data.token);
      onLoggedIn(data);
    }catch(e){ setErr(e.message); }
    finally{ setLoading(false); }
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="mark-icon"><span className="material-icons" style={{fontSize:28}}>admin_panel_settings</span></div>
        <h2>後台管理登入</h2>
        <div className="sub">{storeName || '出缺勤與薪資系統'}</div>
        <form onSubmit={submit}>
          <div className="field">
            <label>帳號</label>
            <input value={account} onChange={e=>setAccount(e.target.value)} autoFocus />
          </div>
          <div className="field">
            <label>密碼</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} />
          </div>
          <button type="submit" disabled={loading}>
            <span className="material-icons" style={{fontSize:18}}>login</span>
            {loading ? '登入中...' : '登入'}
          </button>
          <div className="err">{err}</div>
        </form>
      </div>
    </div>
  );
}

            <span className="material-icons" style={{fontSize:16}}>logout</span>登出
          </button>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <h1><span className="material-icons">{NAV.find(x=>x.id===tab)?.icon}</span>{NAV.find(x=>x.id===tab)?.label}</h1>
          <div style={{display:'flex', gap:10, alignItems:'center'}}>
            {dirty && <span className="badge warn"><span className="material-icons">warning</span>尚有未儲存的薪資異動</span>}
            {needsMonth && (
              <>
                <label style={{marginBottom:0}}>月份</label>
                <input type="month" value={month} onChange={e=>setMonth(e.target.value)} />
              </>
            )}
            {dirty && <button className="sm" onClick={savePayroll} disabled={saving}>{saving?'儲存中...':'儲存薪資紀錄'}</button>}
          </div>
        </div>
        <div className="content">
          {tab==='dashboard' && <DashboardTab setTab={setTab}/>}
          {tab==='employees' && <EmployeesTab employees={employees} loading={employeesLoading} reload={reloadEmployees}/>}
          {tab==='records' && <RecordsTab employees={employees} month={month}/>}
          {tab==='requests' && <RequestsTab month={month}/>}
          {tab==='annual' && <AnnualLeaveTab employees={employees}/>}
          {tab==='comp' && <CompLedgerTab employees={employees}/>}
          {tab==='attendance' && <AttendanceTab month={month} onApply={applyAttendanceToPayroll}/>}
          {tab==='payroll' && <PayrollTab employees={employees} rows={rows} setEntry={setEntry} month={month} loading={payrollLoading} onApply={applyAttendanceToPayroll} onSave={savePayroll} dirty={dirty} saving={saving}/>}
          {tab==='payslip' && <PayslipTab employees={employees} payrollEntries={payrollEntries} month={month}/>}
          {tab==='transfer' && <TransferTab rows={rows} month={month}/>}
          {tab==='insurance' && <InsuranceTab/>}
          {tab==='companies' && <CompanyTab/>}
          {tab==='departments' && <DepartmentTab employees={employees}/>}
          {tab==='shifts' && <ShiftTab employees={employees}/>}
          {tab==='holidays' && <HolidaysTab/>}
          {tab==='announcements' && <AnnouncementsTab/>}
          {tab==='accounts' && <AccountsTab employees={employees}/>}
          {tab==='settings' && <SettingsTab/>}
        </div>
      </div>
    </div>
  );
}

/* ========================= 員工資料 ========================= */
function EmployeesTab({employees, loading, reload}){
  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [saving, setSaving] = useState(false);
  const [companies, setCompanies] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [shifts, setShifts] = useState([]);
  const [accountBox, setAccountBox] = useState(null); // {employeeId, name, account, password}

  function loadRefs(){
    Promise.all([apiGet('getCompanies'), apiGet('getDepartments'), apiGet('getShifts')])
      .then(([co,dept,sh])=>{ setCompanies(co); setDepartments(dept); setShifts(sh); })
      .catch(e=>alert(e.message));
  }
  useEffect(loadRefs, []);

  function openNew(){
    setEditing({id:null, name:'', department:'', company:'', status:'在職', hireDate:'', insuranceGrade:0, baseSalary:0,
      mealAllowance:0, transportAllowance:0, positionAllowance:0, fullAttendanceBonus:0, bankName:'', bankAccount:'', note:'',
      companyId:'', departmentId:'', shiftId:'', phone:''});
    setIsNew(true);
  }
  function openEdit(emp){ setEditing({...emp}); setIsNew(false); }
  async function save(){
    if(!editing.name.trim()){ alert('請輸入姓名'); return; }
    setSaving(true);
    try{
      let id = editing.id;
      if(isNew){ const r = await apiPost('addEmployee', editing); id = r.id; }
      else await apiPost('updateEmployee', editing);
      setEditing(null);
      await reload();
      if(isNew){
        if(confirm('員工已新增，要不要現在就幫他建立登入帳號？')){
          setAccountBox({employeeId:id, name:editing.name, account:editing.phone||'', password: Math.random().toString(36).slice(2,8)});
        }
      }
    }catch(e){ alert(e.message); }
    finally{ setSaving(false); }
  }
  async function setLeft(emp){
    if(!confirm(`確定要將 ${emp.name} 設為離職嗎？（歷史打卡與薪資紀錄仍會保留）`)) return;
    try{ await apiPost('deleteEmployee', {...emp}); await reload(); }
    catch(e){ alert(e.message); }
  }
  async function createAccountSubmit(){
    if(!accountBox.account.trim()){ alert('請輸入帳號'); return; }
    try{
      await apiPost('createAccount', {employeeId: accountBox.employeeId, account: accountBox.account, password: accountBox.password, role:'employee'});
      alert(`帳號建立完成！\n帳號：${accountBox.account}\n初始密碼：${accountBox.password}\n請告知員工，登入後可自行修改密碼。`);
      setAccountBox(null);
    }catch(e){ alert(e.message); }
  }

  const companiesByCo = [...new Set(employees.map(e=>e.company).filter(Boolean))];

  return (
    <div>
      <div className="toolbar">
        <button onClick={openNew}><span className="material-icons">person_add</span>新增員工</button>
        <span className="grow"></span>
        <button className="ghost sm" onClick={reload}><span className="material-icons" style={{fontSize:15}}>refresh</span>重新整理</button>
        <span className="hint">共 {employees.length} 位在職員工</span>
      </div>

      {loading ? <div className="hint">載入中...</div> : (
        <>
          {employees.length===0 && <div className="empty card">尚無員工資料，請點擊「＋ 新增員工」開始建立。</div>}
          {companiesByCo.concat(employees.some(e=>!e.company)?['(未分類)']:[]).map(co => (
            <div className="card" key={co}>
              <h3><span className="material-icons" style={{fontSize:17, color:'var(--brand)'}}>business</span> {co} <span className="badge">{employees.filter(e=>(e.company||'(未分類)')===co).length} 人</span></h3>
              <table>
                <thead>
                  <tr>
                    <th className="left">部門</th><th className="left">姓名</th><th className="left">手機</th><th>班別</th><th>到職日</th>
                    <th>投保級距</th><th>本薪</th><th className="left">銀行帳號</th><th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  {employees.filter(e=>(e.company||'(未分類)')===co).map(emp=>(
                    <tr key={emp.id}>
                      <td className="left">{emp.department}</td>
                      <td className="left"><b>{emp.name}</b></td>
                      <td className="left mono">{emp.phone}</td>
                      <td>{emp.shift ? emp.shift.name : <span className="hint">預設</span>}</td>
                      <td>{emp.hireDate || '-'}</td>
                      <td>{emp.insuranceGrade || 0}</td>
                      <td>{money(emp.baseSalary)}</td>
                      <td className="left mono">{emp.bankAccount}</td>
                      <td>
                        <button className="ghost sm" onClick={()=>openEdit(emp)}>編輯</button>{' '}
                        <button className="ghost sm" onClick={()=>setAccountBox({employeeId:emp.id, name:emp.name, account:emp.phone||'', password: Math.random().toString(36).slice(2,8)})}>帳號</button>{' '}
                        <button className="danger sm" onClick={()=>setLeft(emp)}>離職</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ))}
        </>
      )}

      {editing && (
        <div className="modal-bg">
          <div className="modal">
            <h3><span className="material-icons">badge</span>{isNew ? '新增員工' : '編輯員工：' + editing.name}</h3>
            <div className="grid-2">
              <div className="field"><label>所屬公司</label>
                <select value={editing.companyId} onChange={e=>{ const c=companies.find(x=>x.id===e.target.value); setEditing({...editing, companyId:e.target.value, company: c?c.name:''}); }}>
                  <option value="">請選擇</option>
                  {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div className="field"><label>部門</label>
                <select value={editing.departmentId} onChange={e=>{ const d=departments.find(x=>x.id===e.target.value); setEditing({...editing, departmentId:e.target.value, department: d?d.name:''}); }}>
                  <option value="">請選擇</option>
                  {departments.filter(d=>!editing.companyId || d.companyId===editing.companyId).map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                </select>
              </div>
              <div className="field"><label>姓名 *</label><input value={editing.name} onChange={e=>setEditing({...editing, name:e.target.value})} /></div>
              <div className="field"><label>手機</label><input value={editing.phone} onChange={e=>setEditing({...editing, phone:e.target.value})} placeholder="09xxxxxxxx" /></div>
              <div className="field"><label>到職日</label><input type="date" value={editing.hireDate} onChange={e=>setEditing({...editing, hireDate:e.target.value})} /></div>

              <div className="field"><label>班別</label>
                <select value={editing.shiftId} onChange={e=>setEditing({...editing, shiftId:e.target.value})}>
                  <option value="">依系統預設班別</option>
                  {shifts.map(s=><option key={s.id} value={s.id}>{s.name}（{s.workStart}-{s.workEnd}）</option>)}
                </select>
              </div>
              <div className="field">
                <label>投保級距</label>
                <div style={{display:'flex', gap:6}}>
                  <select value={editing.insuranceGrade} onChange={e=>setEditing({...editing, insuranceGrade:Number(e.target.value)})} style={{flex:1}}>
                    <option value={0}>未設定</option>
                    {INSURANCE_TABLE.map(r=><option key={r.grade} value={r.grade}>{r.grade.toLocaleString()}</option>)}
                  </select>
                  <button type="button" className="ghost sm" onClick={()=>setEditing({...editing, insuranceGrade: suggestGrade(editing.baseSalary)})}>依本薪建議</button>
                </div>
              </div>
              <div className="field"><label>本薪</label><input type="number" value={editing.baseSalary} onChange={e=>setEditing({...editing, baseSalary:Number(e.target.value)})} /></div>

              <div className="field"><label>伙食津貼</label><input type="number" value={editing.mealAllowance} onChange={e=>setEditing({...editing, mealAllowance:Number(e.target.value)})} /></div>
              <div className="field"><label>交通津貼</label><input type="number" value={editing.transportAllowance} onChange={e=>setEditing({...editing, transportAllowance:Number(e.target.value)})} /></div>
              <div className="field"><label>職務加給</label><input type="number" value={editing.positionAllowance} onChange={e=>setEditing({...editing, positionAllowance:Number(e.target.value)})} /></div>
              <div className="field"><label>全勤獎金（固定）</label><input type="number" value={editing.fullAttendanceBonus} onChange={e=>setEditing({...editing, fullAttendanceBonus:Number(e.target.value)})} /></div>

              <div className="field"><label>銀行</label><input value={editing.bankName} onChange={e=>setEditing({...editing, bankName:e.target.value})} /></div>
              <div className="field"><label>銀行帳號</label><input value={editing.bankAccount} onChange={e=>setEditing({...editing, bankAccount:e.target.value})} /></div>
            </div>
            {editing.baseSalary>0 && (n(editing.baseSalary)+n(editing.mealAllowance)+n(editing.transportAllowance)+n(editing.positionAllowance)) < MIN_WAGE_MONTHLY && (
              <div className="hint" style={{color:'var(--danger)'}}>⚠ 本薪＋伙食＋交通＋職務加給合計 {money(n(editing.baseSalary)+n(editing.mealAllowance)+n(editing.transportAllowance)+n(editing.positionAllowance))} 元，低於2026年最低工資 {money(MIN_WAGE_MONTHLY)} 元，可能違反《最低工資法》（全勤獎金為條件式給予，不列入計算基準）</div>
            )}
            <div className="hint">依2026年新制，婚假、喪假、公假、產假、陪產假、生理假等法定假別不得作為扣發全勤獎金的理由，僅事假、遲到、曠工等得依公司規定扣發。</div>
            <div className="field"><label>備註</label><input value={editing.note} onChange={e=>setEditing({...editing, note:e.target.value})} style={{width:'100%'}} /></div>
            {editing.hireDate && <div className="hint">{tenureText(editing.hireDate)}</div>}
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setEditing(null)}>取消</button>
              <button onClick={save} disabled={saving}>{saving?'儲存中...':'儲存'}</button>
            </div>
          </div>
        </div>
      )}

      {accountBox && (
        <div className="modal-bg">
          <div className="modal" style={{width:400}}>
            <h3><span className="material-icons">vpn_key</span>建立登入帳號：{accountBox.name}</h3>
            <div className="field"><label>帳號（建議用手機號碼或員工編號）</label><input value={accountBox.account} onChange={e=>setAccountBox({...accountBox, account:e.target.value})} /></div>
            <div className="field"><label>初始密碼</label><input value={accountBox.password} onChange={e=>setAccountBox({...accountBox, password:e.target.value})} /></div>
            <div className="hint">建立後請把帳號密碼告訴員工，員工登入後可自行修改密碼。</div>
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setAccountBox(null)}>取消</button>
              <button onClick={createAccountSubmit}>建立帳號</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RecordsTab({employees, month}){
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [manual, setManual] = useState(null);
  const [editing, setEditing] = useState(null);

  function load(){ setLoading(true); apiGet('getRecords', {month}).then(setRecords).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, [month]);

  async function saveManual(){
    try{ await apiPost('addManualRecord', manual); setManual(null); load(); }catch(e){ alert(e.message); }
  }
  async function saveEdit(){
    try{ await apiPost('adjustRecord', editing); setEditing(null); load(); }catch(e){ alert(e.message); }
  }
  async function removeRecord(id){
    if(!confirm('確定刪除這筆紀錄？')) return;
    try{ await apiPost('deleteRecord', {id}); load(); }catch(e){ alert(e.message); }
  }

  return (
    <div>
      <div className="toolbar">
        <span className="grow"></span>
        <button className="ghost" onClick={()=>setManual({employeeId:'', name:'', date: month+'-01', checkIn:'', checkOut:'', note:''})}>＋ 補登紀錄</button>
        <button className="ghost sm" onClick={load}>重新整理</button>
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        {loading ? <div className="hint">載入中...</div> : (
          <table>
            <thead><tr><th className="left">姓名</th><th className="left">日期</th><th>上班</th><th className="left">上班狀態</th><th>下班</th><th className="left">下班狀態</th><th className="left">來源</th><th className="left">備註</th><th>操作</th></tr></thead>
            <tbody>
              {records.map(r=>(
                <tr key={r.id}>
                  <td className="left"><b>{r.name}</b></td>
                  <td className="left">{r.date}</td>
                  <td className="mono">{(r.checkIn||'').split(' ')[1]||'-'}</td>
                  <td className={'left ' + (String(r.checkInStatus).indexOf('超出')===0?'flag':'')}>{r.checkInStatus}</td>
                  <td className="mono">{(r.checkOut||'').split(' ')[1]||'-'}</td>
                  <td className={'left ' + (String(r.checkOutStatus).indexOf('超出')===0?'flag':'')}>{r.checkOutStatus}</td>
                  <td className="left">{r.source}</td>
                  <td className="left">{r.note}</td>
                  <td><button className="ghost sm" onClick={()=>setEditing({id:r.id, checkIn:r.checkIn, checkOut:r.checkOut, note:r.note})}>修改</button>{' '}
                      <button className="danger sm" onClick={()=>removeRecord(r.id)}>刪除</button></td>
                </tr>
              ))}
              {records.length===0 && <tr><td colSpan="9" className="hint" style={{textAlign:'center'}}>本月尚無打卡紀錄</td></tr>}
            </tbody>
          </table>
        )}
      </div>

      {manual && (
        <div className="modal-bg">
          <div className="modal">
            <h3>補登打卡紀錄</h3>
            <div className="field"><label>員工</label>
              <select value={manual.employeeId} onChange={e=>{ const emp=employees.find(x=>x.id===e.target.value); setManual({...manual, employeeId:e.target.value, name: emp?emp.name:''}); }}>
                <option value="">請選擇</option>
                {employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
            </div>
            <div className="grid-2">
              <div className="field"><label>日期</label><input type="date" value={manual.date} onChange={e=>setManual({...manual,date:e.target.value})} /></div>
              <div className="field"></div>
              <div className="field"><label>上班時間</label><input type="datetime-local" onChange={e=>setManual({...manual, checkIn:e.target.value.replace('T',' ')+':00'})} /></div>
              <div className="field"><label>下班時間</label><input type="datetime-local" onChange={e=>setManual({...manual, checkOut:e.target.value.replace('T',' ')+':00'})} /></div>
            </div>
            <div className="field"><label>備註</label><input value={manual.note} onChange={e=>setManual({...manual,note:e.target.value})} style={{width:'100%'}} /></div>
            <div className="modal-actions"><button className="ghost" onClick={()=>setManual(null)}>取消</button><button onClick={saveManual}>儲存</button></div>
          </div>
        </div>
      )}
      {editing && (
        <div className="modal-bg">
          <div className="modal">
            <h3>修改打卡紀錄</h3>
            <div className="grid-2">
              <div className="field"><label>上班時間</label><input type="datetime-local" defaultValue={(editing.checkIn||'').replace(' ','T').slice(0,16)} onChange={e=>setEditing({...editing, checkIn:e.target.value.replace('T',' ')+':00'})} /></div>
              <div className="field"><label>下班時間</label><input type="datetime-local" defaultValue={(editing.checkOut||'').replace(' ','T').slice(0,16)} onChange={e=>setEditing({...editing, checkOut:e.target.value.replace('T',' ')+':00'})} /></div>
            </div>
            <div className="field"><label>備註</label><input value={editing.note} onChange={e=>setEditing({...editing,note:e.target.value})} style={{width:'100%'}} /></div>
            <div className="modal-actions"><button className="ghost" onClick={()=>setEditing(null)}>取消</button><button onClick={saveEdit}>儲存</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 出缺勤彙總 ========================= */
function AttendanceTab({month, onApply}){
  const [summary, setSummary] = useState([]);
  const [loading, setLoading] = useState(true);
  const [applying, setApplying] = useState(false);

  function load(){ setLoading(true); apiGet('getMonthlySummary', {month}).then(setSummary).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, [month]);

  function doExportCSV(){
    const headers = ['姓名','出勤天數','遲到次數','遲到分鐘','早退次數','早退分鐘','平日1.34倍(hr)','平日1.67倍(hr)','休息日出勤(hr)','國定假日出勤(hr)','例假日出勤(hr)','總工時(hr)','平日加班上限是否超過','定位異常天數'];
    const rows = summary.map(e=>[e.name,e.presentDays,e.lateCount,e.lateMinutes,e.earlyLeaveCount,e.earlyLeaveMinutes,e.otWeekday134,e.otWeekday167,e.otRestDayHours,e.otHolidayHours,e.otMandatoryRestHours,e.workedHoursTotal,e.otCapExceeded?'是':'否',e.flaggedDays]);
    exportCSV(`出缺勤彙總_${month}.csv`, headers, rows);
  }
  async function doApply(){
    setApplying(true);
    try{ await onApply(); } finally { setApplying(false); }
  }

  return (
    <div>
      <div className="toolbar">
        <span className="grow"></span>
        <button className="ghost" onClick={doExportCSV}>匯出 CSV</button>
        <button onClick={doApply} disabled={applying}>{applying?'套用中...':'套用出缺勤時數到薪資計算'}</button>
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        {loading ? <div className="hint">載入中...</div> : (
          <table>
            <thead><tr><th className="left">姓名</th><th>出勤天數</th><th>遲到次數</th><th>遲到分鐘</th><th>早退次數</th><th>早退分鐘</th><th>平日1.34倍(hr)</th><th>平日1.67倍(hr)</th><th>休息日(hr)</th><th>國定假日(hr)</th><th>例假日(hr)</th><th>總工時(hr)</th><th>定位異常</th></tr></thead>
            <tbody>
              {summary.map(e=>(
                <tr key={e.employeeId}>
                  <td className="left"><b>{e.name}</b></td>
                  <td>{e.presentDays}</td><td>{e.lateCount}</td><td>{e.lateMinutes}</td>
                  <td>{e.earlyLeaveCount}</td><td>{e.earlyLeaveMinutes}</td>
                  <td className={e.otCapExceeded?'flag':''}>{e.otWeekday134}</td>
                  <td className={e.otCapExceeded?'flag':''}>{e.otWeekday167}</td>
                  <td>{e.otRestDayHours}</td>
                  <td>{e.otHolidayHours}</td>
                  <td className={e.otMandatoryRestHours>0?'flag':''}>{e.otMandatoryRestHours}</td>
                  <td>{e.workedHoursTotal}</td>
                  <td className={e.flaggedDays>0?'flag':''}>{e.flaggedDays}</td>
                </tr>
              ))}
              {summary.length===0 && <tr><td colSpan="13" className="hint" style={{textAlign:'center'}}>本月尚無資料</td></tr>}
            </tbody>
          </table>
        )}
      </div>
      <div className="hint">

function PayrollTab({employees, rows, setEntry, month, loading, onApply, onSave, dirty, saving}){

    const t = {base:0, overtime:0, allowance:0, bonus:0, payable:0, labor:0, health:0, leaveDeduct:0, otherDeduct:0, deduct:0, pay06:0, pay26:0, grand:0};
    rows.forEach(({emp, entry, calc})=>{
      t.base += n(emp.baseSalary);
      t.overtime += calc.overtimePay;
      t.allowance += calc.allowanceTotal;
      t.bonus += calc.bonusTotal;
      t.payable += calc.payableTotal;
      t.labor += calc.laborFee;
      t.health += calc.healthFee;
      t.leaveDeduct += calc.leaveDeduct;
      t.otherDeduct += n(entry.otherDeduction);
      t.deduct += calc.deductTotal;
      t.pay06 += calc.pay06;
      t.pay26 += calc.pay26;
      t.grand += calc.grandTotal;

function TransferTab({rows, month}){
  const byCompany = useMemo(()=>{
    const g = {};
    rows.forEach(r => { (g[r.emp.company||'(未分類)'] = g[r.emp.company||'(未分類)']||[]).push(r); });
    return g;
  }, [rows]);

  function exportGroup(company, period, list){
    const headers = ['項次','姓名','銀行','帳號','金額','備註'];
    const data = list.map((r,idx)=>[idx+1, r.emp.name, r.emp.bankName, r.emp.bankAccount, Math.round(period==='06'?r.calc.pay06:r.calc.pay26), r.emp.note]);
    exportCSV(`匯款明細_${company}_${period}日_${month}.csv`, headers, data);
  }

  return (
    <div>
      <div className="toolbar no-print">
        <span className="hint">依公司與發薪日（06日／26日）分組列出應匯款人員與帳號，金額為 0 者仍會列出以利核對。</span>
        <span className="grow"></span>
        <button className="ghost" onClick={()=>window.print()}>列印全部</button>
      </div>

      {Object.keys(byCompany).length===0 && <div className="empty card">尚無資料</div>}

      {Object.entries(byCompany).map(([company, list])=>(
        <React.Fragment key={company}>
          {['06','26'].map(period=>{
            const active = list.filter(r => (period==='06'?r.calc.pay06:r.calc.pay26) !== 0);
            if(active.length===0) return null;
            const total = active.reduce((s,r)=>s+(period==='06'?r.calc.pay06:r.calc.pay26),0);
            return (
              <div className="card" key={company+period}>
                <div className="toolbar" style={{marginBottom:8}}>
                  <h3 style={{margin:0}}>{company} — {period}日 薪資轉帳明細表（{monthLabel(month)}）</h3>
                  <span className="grow"></span>
                  <button className="ghost sm no-print" onClick={()=>exportGroup(company, period, active)}>匯出 CSV</button>
                </div>
                <table>
                  <thead><tr><th>項次</th><th className="left">姓名</th><th className="left">銀行</th><th className="left">帳號</th><th>金額</th><th className="left">備註</th></tr></thead>
                  <tbody>
                    {active.map((r,idx)=>(
                      <tr key={r.emp.id}>
                        <td>{idx+1}</td>
                        <td className="left">{r.emp.name}</td>
                        <td className="left">{r.emp.bankName}</td>
                        <td className="left mono">{r.emp.bankAccount || '（未登錄帳號）'}</td>
                        <td className="mono">{money(period==='06'?r.calc.pay06:r.calc.pay26)}</td>
                        <td className="left">{r.emp.note}</td>
                      </tr>
                    ))}
                    <tr className="total-row"><td colSpan="4" className="left">總計</td><td className="mono">{money(total)}</td><td></td></tr>
                  </tbody>
                </table>
              </div>
            );
          })}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ========================= 公司管理 ========================= */
function CompanyTab(){
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);

  function load(){ setLoading(true); apiGet('getCompanies').then(setList).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, []);

  function openNew(){ setEditing({id:null, name:'', taxId:'', address:'', owner:'', phone:''}); setIsNew(true); }
  function openEdit(c){ setEditing({...c}); setIsNew(false); }
  async function save(){
    if(!editing.name.trim()){ alert('請輸入公司名稱'); return; }
    try{
      if(isNew) await apiPost('addCompany', editing);
      else await apiPost('updateCompany', editing);
      setEditing(null); load();
    }catch(e){ alert(e.message); }
  }

function HolidaysTab(){
  const [holidays, setHolidays] = useState([]);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({date:'', name:'', type:'國定假日'});
  const [importing, setImporting] = useState(false);

  function load(){ setLoading(true); apiGet('getHolidays').then(setHolidays).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, []);

  async function add(){
    if(!form.date){ alert('請選擇日期'); return; }
    try{ await apiPost('addHoliday', form); setForm({date:'',name:'',type:'國定假日'}); load(); }
    catch(e){ alert(e.message); }
  }
  async function remove(date){
    try{ await apiPost('deleteHoliday', {date}); load(); }catch(e){ alert(e.message); }
  }
  async function importOfficial(year){
    if(!confirm(`匯入 ${year} 年行政院人事行政總處公告的國定假日（含小年夜、春節、補假等），已存在的日期會自動略過，確定匯入？`)) return;
    setImporting(true);
    try{
      const r = await apiPost('importOfficialHolidays', {year});
      alert(`匯入完成：新增 ${r.added} 筆，略過已存在 ${r.skipped} 筆（共 ${r.total} 筆）`);
      load();
    }catch(e){ alert(e.message); }
    finally{ setImporting(false); }
  }

  return (
    <div>
      <div className="card">
        <h3><span className="material-icons">event_available</span> 匯入台灣行政機關行事曆</h3>
        <div className="hint">依行政院人事行政總處公告的辦公日曆表一鍵匯入國定假日（含小年夜、除夕、春節、和平紀念日等法定補假），資料來源：<a href="https://www.dgpa.gov.tw/information?uid=41&amp;pid=12573" target="_blank" rel="noopener" style={{color:'var(--brand)'}}>行政院人事行政總處</a></div>
        <div className="toolbar" style={{marginTop:10}}>
          <button onClick={()=>importOfficial('2026')} disabled={importing}>{importing?'匯入中...':'匯入 2026 年（115年）行事曆'}</button>
          <button onClick={()=>importOfficial('2027')} disabled={importing}>{importing?'匯入中...':'匯入 2027 年（116年）行事曆'}</button>
        </div>
        <div className="hint">目前系統內建 2026、2027 年資料；未來年度公告後（每年約6月底）請再請開發者更新，或於下方手動新增。</div>
      </div>
      <div className="card">
        <h3><span className="material-icons">event_busy</span> 新增假日</h3>
        <div className="hint">國定假日出勤依法加發一日工資；公司自訂休假日（例如店休日）出勤則比照休息日，依4/8/12小時級距加成計算。</div>
        <div className="toolbar" style={{marginTop:10}}>
          <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="假日名稱（例：中秋節）" />
          <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
            <option value="國定假日">國定假日</option>
            <option value="公司休假日">公司休假日</option>
          </select>
          <button onClick={add}><span className="material-icons" style={{fontSize:16}}>add</span>新增</button>
        </div>
      </div>
      <div className="card">
        {loading ? <div className="hint">載入中...</div> : (
          <table>
            <thead><tr><th className="left">日期</th><th className="left">名稱</th><th className="left">類型</th><th>操作</th></tr></thead>
            <tbody>
              {holidays.sort((a,b)=>a.date.localeCompare(b.date)).map(h=>(
                <tr key={h.date}>
                  <td className="left">{h.date}</td><td className="left">{h.name}</td>
                  <td className="left">{h.type==='公司休假日' ? <span className="badge warn">公司休假日</span> : <span className="badge">國定假日</span>}</td>
                  <td><button className="danger sm" onClick={()=>remove(h.date)}>刪除</button></td>
                </tr>
              ))}
              {holidays.length===0 && <tr><td colSpan="4" className="hint" style={{textAlign:'center'}}>尚未設定假日</td></tr>}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

  function load(){ setLoading(true); apiGet('getAccounts').then(setList).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, []);

  function empName(id){ const e = employees.find(x=>x.id===id); return e ? e.name : (id ? '（已離職員工）' : '（未綁定員工，如：管理者帳號）'); }
  async function toggleStatus(a){
    try{ await apiPost('setAccountStatus', {accountId:a.id, status: a.status==='啟用'?'停用':'啟用'}); load(); }

    setBusy(true);

      setReviewBox(null); load();

    finally{ setBusy(false); }

        )}
      </div>
      {reviewBox && (
        <div className="modal-bg">
          <div className="modal" style={{width:420}}>
            <h3><span className="material-icons">{reviewBox.mode==='approve'?'check_circle':'cancel'}</span>{reviewBox.mode==='approve'?'核准':'駁回'}：{reviewBox.req.name} 的{reviewBox.req.type==='請假'?reviewBox.req.leaveType:'加班換補休'}</h3>
            <div className="field"><label>審核意見（選填）</label><input value={reviewBox.comment} onChange={e=>setReviewBox({...reviewBox, comment:e.target.value})} style={{width:'100%'}} /></div>
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setReviewBox(null)}>取消</button>
              <button onClick={doReview} disabled={busy}>{busy?'處理中...':'確認'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 特休設定 ========================= */
function AnnualLeaveTab({employees}){
  const [year, setYear] = useState(String(new Date().getFullYear()));
  const [system, setSystem] = useState('calendar');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [edits, setEdits] = useState({});
  const [savingId, setSavingId] = useState(null);
  const [estimatingId, setEstimatingId] = useState(null);

  function load(){
    setLoading(true);
    apiGet('getAnnualLeaveList', {year}).then(d=>{ setData(d); setEdits({}); }).catch(e=>alert(e.message)).finally(()=>setLoading(false));
  }
  useEffect(load, [year]);

  async function save(empId){
    const hours = Number(edits[empId]);
    if(isNaN(hours) || hours < 0){ alert('請輸入正確的時數'); return; }
    setSavingId(empId);
    try{
      await apiPost('setAnnualLeave', {employeeId: empId, year, hours});
      await load();
    }catch(e){ alert(e.message); }
    finally{ setSavingId(null); }
  }
  async function estimate(empId){
    setEstimatingId(empId);
    try{
      const r = await apiGet('estimateAnnualLeave', {employeeId: empId, year, system});
      setEdits({...edits, [empId]: r.hours});
    }catch(e){ alert(e.message); }
    finally{ setEstimatingId(null); }
  }

  const years = [];
  const thisYear = new Date().getFullYear();
  for(let y = thisYear + 1; y >= thisYear - 2; y--) years.push(String(y));

  return (
    <div>
      <div className="toolbar">
        <label style={{marginBottom:0}}>年度</label>
        <select value={year} onChange={e=>setYear(e.target.value)}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        <label style={{marginBottom:0}}>試算方式</label>
        <select value={system} onChange={e=>setSystem(e.target.value)}>
          <option value="calendar">歷年制（每年1/1~12/31）</option>
          <option value="anniversary">週年制（到職日起算）</option>
        </select>
        <span className="grow"></span>
        <button className="ghost sm" onClick={load}><span className="material-icons" style={{fontSize:15}}>refresh</span>重新整理</button>
      </div>
      <div className="hint" style={{marginBottom:12}}>
        核定每位員工當年度的特休「時數」（1天＝8小時）。按「試算」可依到職日自動帶入建議天數，仍可手動調整後再儲存。
        <br/>⚠ 系統試算僅供參考，正式天數請以<a href="https://calcr2.mol.gov.tw/RestDays" target="_blank" rel="noopener" style={{color:'var(--brand)'}}>勞動部特別休假日數試算系統</a>或人資顧問確認為準。
      </div>
      <div className="card">
        {loading || !data ? <div className="hint">載入中...</div> : (
          <table>
            <thead><tr><th className="left">姓名</th><th className="left">部門</th><th>到職日</th><th>核定時數</th><th>已用</th><th>剩餘</th><th>操作</th></tr></thead>
            <tbody>
              {employees.map(emp=>{
                const granted = data.granted[emp.id] ? data.granted[emp.id].hours : 0;
                const used = data.used[emp.id] || 0;
                const editVal = edits[emp.id] !== undefined ? edits[emp.id] : granted;
                return (
                  <tr key={emp.id}>
                    <td className="left"><b>{emp.name}</b></td>
                    <td className="left">{emp.department}</td>
                    <td>{emp.hireDate || '-'}</td>
                    <td><input type="number" min="0" value={editVal} onChange={e=>setEdits({...edits, [emp.id]: e.target.value})} style={{width:80}} /></td>
                    <td>{used}</td>
                    <td className={granted-used < 8 ? 'flag' : ''}>{Math.max(0, granted-used)}</td>
                    <td>
                      <button className="ghost sm" onClick={()=>estimate(emp.id)} disabled={estimatingId===emp.id || !emp.hireDate} title={!emp.hireDate?'請先設定到職日':''}>{estimatingId===emp.id?'試算中':'試算'}</button>{' '}
                      <button className="ghost sm" onClick={()=>save(emp.id)} disabled={savingId===emp.id}>{savingId===emp.id?'儲存中':'儲存'}</button>
                    </td>
                  </tr>
                );
              })}
              {employees.length===0 && <tr><td colSpan="7" className="hint" style={{textAlign:'center'}}>尚無員工</td></tr>}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ========================= 公告管理 ========================= */
function AnnouncementsTab(){
  const [list, setList] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [saving, setSaving] = useState(false);

  function load(){
    setLoading(true);
    Promise.all([apiGet('getAnnouncements'), apiGet('getCompanies')])
      .then(([a,c])=>{ setList(a); setCompanies(c); })
      .catch(e=>alert(e.message)).finally(()=>setLoading(false));
  }
  useEffect(load, []);

  function openNew(){ setEditing({id:null, title:'', content:'', companyId:'', pinned:false, status:'已發布'}); setIsNew(true); }
  function openEdit(a){ setEditing({...a}); setIsNew(false); }
  async function save(){
    if(!editing.title.trim()){ alert('請輸入標題'); return; }
    setSaving(true);
    try{
      if(isNew) await apiPost('addAnnouncement', editing);
      else await apiPost('updateAnnouncement', editing);
      setEditing(null); load();
    }catch(e){ alert(e.message); }
    finally{ setSaving(false); }
  }
  async function remove(id){
    if(!confirm('確定刪除這則公告？')) return;
    try{ await apiPost('deleteAnnouncement', {id}); load(); }catch(e){ alert(e.message); }
  }
  function companyName(id){ if(!id) return '全公司'; const c = companies.find(x=>x.id===id); return c?c.name:'-'; }

  return (
    <div>
      <div className="toolbar">
        <button onClick={openNew}><span className="material-icons">campaign</span>發布公告</button>
        <span className="grow"></span>
        <button className="ghost sm" onClick={load}><span className="material-icons" style={{fontSize:15}}>refresh</span>重新整理</button>
      </div>
      {loading ? <div className="hint">載入中...</div> : list.length===0 ? <div className="empty card">尚無公告</div> : list.map(a=>(
        <div className="card" key={a.id}>
          <div className="row-between">
            <h3 style={{display:'flex', alignItems:'center', gap:7, margin:0}}>
              {a.pinned && <span className="material-icons" style={{fontSize:16, color:'var(--accent)'}}>push_pin</span>}
              {a.title}
              {a.status!=='已發布' && <span className="badge warn">草稿</span>}
            </h3>
            <div>
              <button className="ghost sm" onClick={()=>openEdit(a)}>編輯</button>{' '}
              <button className="danger sm" onClick={()=>remove(a.id)}>刪除</button>
            </div>
          </div>
          <div className="hint" style={{margin:'6px 0'}}>{companyName(a.companyId)}　·　{a.author}　·　{a.createdAt}</div>
          <div style={{fontSize:13, whiteSpace:'pre-wrap'}}>{a.content}</div>
        </div>
      ))}

      {editing && (
        <div className="modal-bg">
          <div className="modal">
            <h3><span className="material-icons">campaign</span>{isNew?'發布公告':'編輯公告'}</h3>
            <div className="field"><label>標題 *</label><input value={editing.title} onChange={e=>setEditing({...editing,title:e.target.value})} style={{width:'100%'}} /></div>
            <div className="field"><label>內容</label><textarea rows="5" value={editing.content} onChange={e=>setEditing({...editing,content:e.target.value})} style={{width:'100%', fontFamily:'inherit', fontSize:13, padding:8, borderRadius:6, border:'1px solid var(--line)'}}></textarea></div>
            <div className="grid-2">
              <div className="field"><label>發布對象</label>
                <select value={editing.companyId} onChange={e=>setEditing({...editing,companyId:e.target.value})}>
                  <option value="">全公司</option>
                  {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div className="field"><label>狀態</label>
                <select value={editing.status} onChange={e=>setEditing({...editing,status:e.target.value})}>
                  <option value="已發布">已發布</option>
                  <option value="草稿">草稿（員工看不到）</option>
                </select>
              </div>
            </div>
            <label style={{display:'flex', alignItems:'center', gap:6, fontSize:13, color:'var(--ink)'}}>
              <input type="checkbox" checked={editing.pinned} onChange={e=>setEditing({...editing,pinned:e.target.checked})} style={{width:'auto'}} />置頂
            </label>
            <div className="modal-actions">
              <button className="ghost" onClick={()=>setEditing(null)}>取消</button>
              <button onClick={save} disabled={saving}>{saving?'儲存中...':'儲存'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================= 系統設定 ========================= */
function SettingsTab(){
  const [s, setS] = useState(null);
  const [loading, setLoading] = useState(true);
  const [locating, setLocating] = useState(false);
  const DOW = ['日','一','二','三','四','五','六'];

  function load(){ setLoading(true); apiGet('getSettings').then(setS).catch(e=>alert(e.message)).finally(()=>setLoading(false)); }
  useEffect(load, []);

  async function save(){
    try{ await apiPost('updateSettings', s); alert('設定已儲存'); }catch(e){ alert(e.message); }
  }
  function useCurrentLocation(){
    setLocating(true);
    navigator.geolocation.getCurrentPosition(
      pos => { setS({...s, lat: pos.coords.latitude, lng: pos.coords.longitude}); setLocating(false); },
      err => { alert('定位失敗：' + err.message); setLocating(false); },
      {enableHighAccuracy:true, timeout:8000}
    );
  }

  if(loading || !s) return <div className="hint">載入中...</div>;
  return (
    <div>
    <div className="card" style={{maxWidth:560}}>
      <h3><span className="material-icons">storefront</span> 店家 / 公司資訊</h3>
      <div className="field"><label>顯示名稱</label><input value={s.storeName} onChange={e=>setS({...s,storeName:e.target.value})} style={{width:'100%'}} /></div>

      <h3 style={{marginTop:18}}><span className="material-icons">my_location</span> 地理圍籬（GPS 打卡範圍）</h3>
      <div className="grid-2">
        <div className="field"><label>緯度</label><input value={s.lat} onChange={e=>setS({...s,lat:e.target.value})} /></div>
        <div className="field"><label>經度</label><input value={s.lng} onChange={e=>setS({...s,lng:e.target.value})} /></div>
      </div>
      <button className="ghost sm" onClick={useCurrentLocation} disabled={locating}>{locating?'定位中...':'使用目前裝置位置（建議在店內打開此頁操作一次）'}</button>
      <div className="field" style={{marginTop:10}}><label>允許誤差半徑（公尺）</label><input type="number" value={s.radius} onChange={e=>setS({...s,radius:e.target.value})} /></div>
      <div className="hint">超出範圍不會擋下打卡，但紀錄會標示「超出範圍」讓後台核對，避免員工在店外因訊號誤差被卡住。</div>

      <h3 style={{marginTop:18}}><span className="material-icons">schedule</span> 預設班表</h3>
      <div className="hint" style={{marginTop:-4, marginBottom:8}}>員工若在「員工資料」未指定班別，會套用這裡的預設班表。</div>
      <div className="grid-2">
        <div className="field"><label>上班時間</label><input value={s.workStart} onChange={e=>setS({...s,workStart:e.target.value})} placeholder="09:00" /></div>
        <div className="field"><label>下班時間</label><input value={s.workEnd} onChange={e=>setS({...s,workEnd:e.target.value})} placeholder="18:00" /></div>
        <div className="field"><label>午休扣除（分鐘）</label><input type="number" value={s.lunchBreak} onChange={e=>setS({...s,lunchBreak:e.target.value})} /></div>
        <div className="field"><label>遲到寬限（分鐘）</label><input type="number" value={s.lateGrace} onChange={e=>setS({...s,lateGrace:e.target.value})} /></div>
        <div className="field"><label>早退寬限（分鐘）</label><input type="number" value={s.earlyGrace} onChange={e=>setS({...s,earlyGrace:e.target.value})} /></div>
      </div>

      <h3 style={{marginTop:18}}><span className="material-icons">event_repeat</span> 一例一休（勞基法第36條）</h3>
      <div className="grid-2">
        <div className="field"><label>休息日（可出勤，需依加成給薪）</label>
          <select value={s.restDay} onChange={e=>setS({...s,restDay:Number(e.target.value)})}>{DOW.map((d,i)=><option key={i} value={i}>星期{d}</option>)}</select>
        </div>
        <div className="field"><label>例假日（原則不可出勤）</label>
          <select value={s.mandatoryRestDay} onChange={e=>setS({...s,mandatoryRestDay:Number(e.target.value)})}>{DOW.map((d,i)=><option key={i} value={i}>星期{d}</option>)}</select>
        </div>
        <div className="field"><label>平日加班月上限（小時）</label><input type="number" value={s.monthlyOtCap} onChange={e=>setS({...s,monthlyOtCap:e.target.value})} /></div>
      </div>
      <div className="hint">依勞基法第32條，平日延長工時原則每月不得超過46小時（經工會或無工會則經勞資會議同意可延長至54小時，但每3個月不得逾138小時）；此上限不含國定假日與例假日出勤。</div>

      <h3 style={{marginTop:18}}><span className="material-icons">event_available</span> 請假與補休規則</h3>
      <div className="grid-2">
        <div className="field"><label>請假最小單位</label>
          <select value={s.leaveUnit} onChange={e=>setS({...s,leaveUnit:Number(e.target.value)})}>
            <option value={1}>1 小時</option>
            <option value={0.5}>0.5 小時</option>
            <option value={4}>半天（4 小時）</option>
          </select>
        </div>
        <div className="field"><label>補休使用期限（月）</label><input type="number" min="1" value={s.compTimeExpireMonths} onChange={e=>setS({...s,compTimeExpireMonths:e.target.value})} /></div>
      </div>
      <div className="hint">補休期限自核准日起算，依勞基法第32條之1，補休期限屆滿或契約終止仍未休完的時數，應依原加班費標準折算工資。</div>

      <div style={{marginTop:16}}><button onClick={save}><span className="material-icons" style={{fontSize:16}}>save</span>儲存設定</button></div>
    </div>
    </div>
  );
}

    if(box){ box.style.display='block'; box.textContent = msg; }
  }
  window.addEventListener('error', function(e){
    showError('頁面發生錯誤：' + (e.message||e.error) + '\n(檔案:' + (e.filename||'') + ' 行:' + (e.lineno||'') + ')');
  });
  window.addEventListener('unhandledrejection', function(e){
    showError('未處理的錯誤：' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  function loadScript(src){
    return new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = function(){ reject(new Error(src + ' 載入失敗')); };
      document.head.appendChild(s);
    });
  }
  function loadWithFallback(urls, idx){
    idx = idx || 0;
    if(idx >= urls.length) return Promise.reject(new Error('所有來源皆載入失敗：' + urls.join(' / ')));
    return loadScript(urls[idx]).catch(function(){ return loadWithFallback(urls, idx+1); });
  }

  var CDN = {
    react: ['https://unpkg.com/react@18/umd/react.production.min.js', 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'],
    reactDom: ['https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'],
    babel: ['https://unpkg.com/@babel/standalone/babel.min.js', 'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js']
  };

  loadWithFallback(CDN.react)
    .then(function(){ return loadWithFallback(CDN.reactDom); })
    .then(function(){ return loadWithFallback(CDN.babel); })
    .then(function(){
      var src = document.getElementById('app-src').textContent;
      var compiled = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
      var statusEl = document.getElementById('boot-status');
      if(statusEl) statusEl.remove();
      (0, eval)(compiled);
    })
    .catch(function(err){
      showError('必要程式庫載入失敗，畫面因此空白。\n原因：' + err.message + '\n\n最常見情況：瀏覽器擴充功能（例如廣告攔截／隱私保護外掛）封鎖了 unpkg.com 或 jsdelivr.net，或目前網路無法連線到這兩個網域。\n\n請嘗試：\n1. 停用廣告攔截類擴充功能後重新整理本頁\n2. 改用無痕視窗開啟同一網址測試\n3. 確認網路能連上 unpkg.com 與 cdn.jsdelivr.net');
    });
})();
</script>
</body>
</html>
